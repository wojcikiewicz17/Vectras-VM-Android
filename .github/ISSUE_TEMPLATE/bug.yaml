name: Bug Report
description: Report a reproducible bug.
title: "🐛 [bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version/tag/commit are you running?
      placeholder: ex. 3.5.0 or commit abc123
    validations:
      required: true
  - type: dropdown
    id: device_info
    attributes:
      label: What device are you seeing the problem on?
      multiple: true
      options:
        - Samsung
        - Xiaomi, Redmi, Poco
        - Oppo, OnePlus, Realme
        - Vivo, iQOO
        - Google Pixel
        - Motorola, Lenovo
        - ZTE, RedMagic
        - Sony
        - Huawei, Honor
        - Asus, ROG
        - Other
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List deterministic steps so maintainers can reproduce the issue.
      placeholder: |
        1. Open app
        2. Start VM X
        3. Tap Y
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Duplicate Check
      description: By submitting this issue, you confirm there is no duplicate issue already open.
      options:
        - label: I Agree
          required: true
