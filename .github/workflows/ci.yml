name: vectras-ci

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: vectras-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  host-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate provenance chain-of-custody
        if: ${{ github.event_name == 'workflow_call' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROVENANCE_RUN_ID: ${{ inputs.provenance_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_MANIFEST_HASH: ${{ inputs.provenance_manifest_hash }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" == "$CURRENT_SHA" ]] || { echo "SHA mismatch: expected=$EXPECTED_SHA current=$CURRENT_SHA" >&2; exit 1; }
          python3 - <<'PY'
          import hashlib, io, json, os, urllib.request, zipfile
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          run_id = os.environ["PROVENANCE_RUN_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]
          expected_hash = os.environ["EXPECTED_MANIFEST_HASH"]
          headers = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100", headers=headers)
          with urllib.request.urlopen(req) as r:
              artifacts = json.load(r).get("artifacts", [])
          artifact = next((a for a in artifacts if a.get("name") == "chain-of-custody"), None)
          if not artifact:
              raise SystemExit("Artifact chain-of-custody not found")
          dl_headers = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
          dl_req = urllib.request.Request(artifact["archive_download_url"], headers=dl_headers)
          with urllib.request.urlopen(dl_req) as r:
              blob = r.read()
          with zipfile.ZipFile(io.BytesIO(blob)) as zf:
              raw = zf.read("provenance.json")
          manifest_hash = hashlib.sha256(raw).hexdigest()
          if manifest_hash != expected_hash:
              raise SystemExit(f"Manifest hash mismatch: expected={expected_hash} got={manifest_hash}")
          data = json.loads(raw)
          if data["github"]["sha"] != expected_sha:
              raise SystemExit("Manifest SHA differs from expected SHA")
          if str(data["github"]["run_id"]) != str(run_id):
              raise SystemExit("Manifest run_id differs from provenance_run_id")
          print("Provenance validation passed")
          PY

      - name: Block duplicated overlay ZIP source
        run: bash tools/check_overlay_zip_duplicates.sh

      - name: Block firebasestorage links in web assets
        run: bash tools/check_no_firebasestorage_links.sh

      - name: Validate docs reference commit consistency
        run: bash tools/check_docs_reference_commit.sh

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build make pkg-config python3 graphviz ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 dot rg)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Show hosted engine config
        run: make print-build-config

      - name: Export Make resolved build config
        run: make print-build-config-env

      - name: Build engine with Makefile
        run: make -j"$(nproc)"

      - name: Run engine selftests
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/host-selftest.log


      - name: Build engine with root CMake
        run: |
          cmake -S . -B build-cmake -G Ninja -DRMR_JNI_BUILD=ON -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake -j"$(nproc)"

      - name: Verify link contracts (CMake)
        run: cmake --build build-cmake --target verify_contracts

      - name: Run engine selftests (CMake)
        run: cmake --build build-cmake --target run_selftest

      - name: Upload host logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: host-engine-logs
          path: |
            build
            build-cmake
            bench/results
            reports
