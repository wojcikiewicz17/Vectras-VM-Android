name: host-ci

on:
  push:
    # Removemos paths-ignore para executar em qualquer push
  pull_request:
    # Removemos paths-ignore para executar em qualquer PR
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: host-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate host pipeline directories
        run: ./tools/ci/validate_pipeline_directories.sh --profile host

      - name: Block duplicated overlay ZIP source
        run: bash tools/check_overlay_zip_duplicates.sh

      - name: Block firebasestorage links in web assets
        run: bash tools/check_no_firebasestorage_links.sh

      - name: Validate docs reference commit consistency
        run: bash tools/check_docs_reference_commit.sh

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build make pkg-config python3 ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 rg)
          for tool in "${required_tools[@]}"; do
            command -v "$tool" >/dev/null || { echo "Missing required tool: $tool" >&2; exit 1; }
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Show hosted engine config
        run: make print-build-config

      - name: Build engine with Makefile
        run: make -j"$(nproc)"

      - name: Run engine selftests
        run: make run-selftest

      - name: Run torus flow focused selftest (CMake artifact)
        run: |
          cmake -S . -B build-cmake -G Ninja -DRMR_JNI_BUILD=ON -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake -j"$(nproc)" --target rmr_torus_flow_selftest
          ./build-cmake/rmr_torus_flow_selftest

      - name: Build engine with root CMake
        run: |
          cmake -S . -B build-cmake -G Ninja -DRMR_JNI_BUILD=ON -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake -j"$(nproc)"

      - name: Run torus flow focused selftest (CMake artifact)
        run: ./build-cmake/rmr_torus_flow_selftest

      - name: Verify link contracts (CMake)
        run: cmake --build build-cmake --target verify_contracts

      # ================================================================
      # NOVO: Compactar e enviar artefatos binários (executáveis, libs)
      # ================================================================
      - name: Prepare binary artifacts
        if: always()   # Mesmo se testes falharem, tenta coletar binários
        run: |
          mkdir -p artifacts/bin
          # Copia executáveis gerados pelo Make (ajuste o caminho conforme seu projeto)
          find . -type f -executable -not -path './build-cmake/*' -not -path './.git/*' | head -20 | xargs -I {} cp {} artifacts/bin/ 2>/dev/null || true
          # Copia bibliotecas .so (se houver)
          find . -name "*.so" -not -path './build-cmake/*' -exec cp {} artifacts/bin/ \; 2>/dev/null || true
          # Copia o que foi gerado pelo CMake (executáveis e libs)
          cp -r build-cmake/bin/* artifacts/bin/ 2>/dev/null || true
          cp -r build-cmake/lib/* artifacts/bin/ 2>/dev/null || true
          cp build-cmake/rmr_torus_flow_selftest artifacts/bin/ 2>/dev/null || true
          # Compacta tudo
          tar -czf host-engine-artifacts.tar.gz -C artifacts .
          echo "ARTIFACT_FILE=host-engine-artifacts.tar.gz" >> $GITHUB_ENV

      - name: Upload binary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-engine-binaries-${{ github.run_id }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: warn

      - name: Upload host logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-logs-${{ github.run_id }}
          path: |
            build
            build-cmake
            bench/results
            reports
          if-no-files-found: warn
