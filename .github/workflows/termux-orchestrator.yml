name: Termux Orchestrator Build

on:
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string
      dry_run:
        required: false
        type: string
        default: "true"
      enable_fork_sync:
        required: false
        type: string
        default: "false"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run compliance + orchestration without real Gradle release build"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      enable_fork_sync:
        description: "Enable external fork sync step"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
permissions:
  contents: read
  actions: read

concurrency:
  group: termux-orchestrator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ENABLE_FORK_SYNC: ${{ (inputs.enable_fork_sync || 'false') == 'true' && '1' || '0' }}
      BOOTSTRAP_ANDROID: "1"
      ENABLE_SPILL: "1"
      ALLOW_NETWORK_TOOLCHAIN: "1"
      ALLOW_NETWORK_FORKS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate provenance chain-of-custody
        if: ${{ github.event_name == 'workflow_call' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROVENANCE_RUN_ID: ${{ inputs.provenance_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_MANIFEST_HASH: ${{ inputs.provenance_manifest_hash }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" == "$CURRENT_SHA" ]] || { echo "SHA mismatch: expected=$EXPECTED_SHA current=$CURRENT_SHA" >&2; exit 1; }
          python3 - <<'PY'
          import hashlib, io, json, os, urllib.request, zipfile
          token = os.environ["GITHUB_TOKEN"]; repo = os.environ["REPO"]; run_id = os.environ["PROVENANCE_RUN_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]; expected_hash = os.environ["EXPECTED_MANIFEST_HASH"]
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as r: artifacts = json.load(r).get("artifacts", [])
          artifact = next((a for a in artifacts if a.get("name") == "chain-of-custody"), None)
          if not artifact: raise SystemExit("Artifact chain-of-custody not found")
          with urllib.request.urlopen(urllib.request.Request(artifact["archive_download_url"], headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})) as r: blob = r.read()
          with zipfile.ZipFile(io.BytesIO(blob)) as zf: raw = zf.read("provenance.json")
          got_hash = hashlib.sha256(raw).hexdigest()
          if got_hash != expected_hash: raise SystemExit(f"Manifest hash mismatch: expected={expected_hash} got={got_hash}")
          data = json.loads(raw)
          if data["github"]["sha"] != expected_sha: raise SystemExit("Manifest SHA differs from expected SHA")
          if str(data["github"]["run_id"]) != str(run_id): raise SystemExit("Manifest run_id differs from provenance_run_id")
          print("Provenance validation passed")
          PY

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare release signing env for dry-run
        if: ${{ (inputs.dry_run || 'true') != 'false' }}
        run: |
          set -euo pipefail
          mkdir -p .secrets
          : > .secrets/ci-dry-run.jks
          echo "VECTRAS_RELEASE_STORE_FILE=$PWD/.secrets/ci-dry-run.jks" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_STORE_PASSWORD=ci-dry-run" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_KEY_ALIAS=ci-dry-run" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_KEY_PASSWORD=ci-dry-run" >> "$GITHUB_ENV"
          echo "CI_DRY_RUN=1" >> "$GITHUB_ENV"

      - name: Prepare release signing env for real release build
        if: ${{ (inputs.dry_run || 'true') == 'false' }}
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for var in RELEASE_KEYSTORE_B64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              echo "missing required secret: $var" >&2
              exit 1
            fi
          done

          mkdir -p .secrets
          echo "$RELEASE_KEYSTORE_B64" | base64 -d > .secrets/release.jks

          echo "VECTRAS_RELEASE_STORE_FILE=$PWD/.secrets/release.jks" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "VECTRAS_RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "CI_DRY_RUN=0" >> "$GITHUB_ENV"

      - name: Run termux orchestrator
        run: |
          set -euo pipefail
          bash tools/termux-arm64-orchestrator/run-local-termux-build.sh

      - name: Upload release APK
        if: ${{ (inputs.dry_run || 'true') == 'false' }}
        uses: actions/upload-artifact@v5
        with:
          name: termux-orchestrator-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
