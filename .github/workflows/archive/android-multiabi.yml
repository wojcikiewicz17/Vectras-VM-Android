name: android-multiabi

on:
  workflow_dispatch:
    inputs:
      abi_profile:
        description: "Perfil ABI"
        type: choice
        default: arm32_arm64
        options:
          - arm64_only
          - arm32_arm64
          - all_5abi
      build_variant:
        description: "Variante"
        type: choice
        default: debug
        options: [debug, release]
      signing_mode:
        description: "Assinatura release"
        type: choice
        default: auto
        options: [auto, signed, unsigned]
      run_lint:
        description: "Lint"
        type: boolean
        default: false
      run_native_checks:
        description: "Checks nativos"
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JAVA_VERSION: '17'
  COMPILE_API: '35'
  TARGET_API: '35'
  MIN_API: '16'
  TOOLS_VERSION: '35.0.0'
  NDK_VERSION: '27.2.12479018'
  CMAKE_VERSION: '3.22.1'

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      app_abi_policy: ${{ steps.flags.outputs.app_abi_policy }}
      supported_abis: ${{ steps.flags.outputs.supported_abis }}
      ci_internal_validation: ${{ steps.flags.outputs.ci_internal_validation }}
      artifact_suffix: ${{ steps.flags.outputs.artifact_suffix }}
      effective_min_api: ${{ steps.flags.outputs.effective_min_api }}
      gradle_variant_task: ${{ steps.flags.outputs.gradle_variant_task }}
      ci_release: ${{ steps.flags.outputs.ci_release }}
    steps:
      - id: flags
        shell: bash
        run: |
          set -euo pipefail
          abi="${{ inputs.abi_profile }}"
          variant="${{ inputs.build_variant }}"
          signing_mode="${{ inputs.signing_mode }}"

          case "${abi}" in
            arm64_only)
              policy="arm64-only"
              abis="arm64-v8a"
              ci_val="false"
              suffix="arm64-v8a"
              min_api="21"
              ;;
            arm32_arm64)
              policy="arm32-arm64"
              abis="arm64-v8a,armeabi-v7a"
              ci_val="true"
              suffix="arm32-arm64"
              min_api="16"
              ;;
            all_5abi)
              policy="internal-5abi"
              abis="arm64-v8a,armeabi-v7a,x86,x86_64,riscv64"
              ci_val="true"
              suffix="all-5abi"
              min_api="16"
              ;;
            *)
              echo "abi_profile inválido: ${abi}" >&2
              exit 1
              ;;
          esac

          case "${variant}" in
            debug) task=":app:assembleDebug" ;;
            release) task=":app:assembleRelease" ;;
          esac

          ci_release="false"
          if [[ "${variant}" == "release" ]]; then
            has_signing="false"
            if [[ -n "${{ secrets.VECTRAS_RELEASE_STORE_FILE_B64 || '' }}" && -n "${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD || '' }}" && -n "${{ secrets.VECTRAS_RELEASE_KEY_ALIAS || '' }}" && -n "${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD || '' }}" ]]; then
              has_signing="true"
            fi

            case "${signing_mode}" in
              auto)
                if [[ "${has_signing}" == "true" ]]; then
                  ci_release="true"
                fi
                ;;
              signed)
                if [[ "${has_signing}" != "true" ]]; then
                  echo "signing_mode=signed exige todos os segredos de assinatura configurados." >&2
                  exit 1
                fi
                ci_release="true"
                ;;
              unsigned)
                ci_release="false"
                ;;
              *)
                echo "signing_mode inválido: ${signing_mode}" >&2
                exit 1
                ;;
            esac
          fi

          echo "app_abi_policy=${policy}"          >> "$GITHUB_OUTPUT"
          echo "supported_abis=${abis}"            >> "$GITHUB_OUTPUT"
          echo "ci_internal_validation=${ci_val}"  >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${suffix}"         >> "$GITHUB_OUTPUT"
          echo "effective_min_api=${min_api}"      >> "$GITHUB_OUTPUT"
          echo "gradle_variant_task=${task}"       >> "$GITHUB_OUTPUT"
          echo "ci_release=${ci_release}"          >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK + NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          rc=${PIPESTATUS[1]}
          set -o pipefail
          [[ "${rc}" -eq 0 ]] || exit "${rc}"
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "cmake;${CMAKE_VERSION}" \
            "ndk;${NDK_VERSION}"

      - name: Prepare Android env
        run: |
          ./tools/ci/prepare_android_env.sh \
            --java-version "${{ env.JAVA_VERSION }}" \
            --require-sdkmanager

      - name: Materialize Firebase config
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_firebase_config.sh --policy internal

      - name: Enforce bootstrap contract
        run: ./tools/ci/verify_bootstrap_contract.sh

      - name: Decode release keystore (optional)
        if: ${{ needs.resolve.outputs.ci_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.VECTRAS_RELEASE_STORE_FILE_B64 }}" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Lint (opcional)
        if: ${{ inputs.run_lint == true }}
        run: ./tools/gradle_with_jdk21.sh --no-daemon :app:lintDebug

      - name: Native checks (opcional)
        if: ${{ inputs.run_native_checks == true }}
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-cmake \
            -DRMR_JNI_BUILD=1 \
            -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake --target verify_contracts -j"$(nproc)"

      - name: Build Multi-ABI
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh --no-daemon \
            -PbuildStrict=false \
            -PAPP_ABI_POLICY=${{ needs.resolve.outputs.app_abi_policy }} \
            -PSUPPORTED_ABIS="${{ needs.resolve.outputs.supported_abis }}" \
            -Pcompile.api=${COMPILE_API} \
            -Ptarget.api=${TARGET_API} \
            -Pmin.api=${{ needs.resolve.outputs.effective_min_api }} \
            -Ptools.version=${TOOLS_VERSION} \
            -Pndk.version=${NDK_VERSION} \
            -Pcmake.version=${CMAKE_VERSION} \
            -Pjava.language.version=${JAVA_VERSION} \
            -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
            -PciRelease=${{ needs.resolve.outputs.ci_release }} \
            ${{ needs.resolve.outputs.ci_release == 'true' && format('-Pandroid.injected.signing.store.file={0}/release-keystore.jks -Pandroid.injected.signing.store.password={1} -Pandroid.injected.signing.key.alias={2} -Pandroid.injected.signing.key.password={3}', env.RUNNER_TEMP, secrets.VECTRAS_RELEASE_STORE_PASSWORD, secrets.VECTRAS_RELEASE_KEY_ALIAS, secrets.VECTRAS_RELEASE_KEY_PASSWORD) || '' }} \
            --console=plain --info \
            ${{ needs.resolve.outputs.gradle_variant_task }}

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ needs.resolve.outputs.artifact_suffix }}-${{ github.run_id }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/apk/**/output-metadata.json
          if-no-files-found: warn

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ needs.resolve.outputs.artifact_suffix }}-${{ github.run_id }}
          path: |
            app/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn
