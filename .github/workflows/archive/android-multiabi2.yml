name: android-multiabi2

on:
  workflow_dispatch:
    inputs:
      abi_profile:
        description: "Perfil ABI"
        type: choice
        default: arm32_arm64
        options:
          - arm64_only
          - arm32_arm64
          - all_5abi
      build_variant:
        description: "Variante"
        type: choice
        default: debug
        options: [debug, release]
      run_lint:
        description: "Lint"
        type: boolean
        default: false
      run_native_checks:
        description: "Checks nativos"
        type: boolean
        default: false
      skip_riscv64_bootstrap:
        description: "Ignorar bootstrap riscv64 ausente (all_5abi)"
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JAVA_VERSION: '17'
  COMPILE_API: '35'
  TARGET_API: '35'
  TOOLS_VERSION: '35.0.0'
  NDK_VERSION: '27.2.12479018'
  CMAKE_VERSION: '3.22.1'

concurrency:
  group: android-multiabi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      app_abi_policy:         ${{ steps.flags.outputs.app_abi_policy }}
      supported_abis:         ${{ steps.flags.outputs.supported_abis }}
      ci_internal_validation: ${{ steps.flags.outputs.ci_internal_validation }}
      artifact_suffix:        ${{ steps.flags.outputs.artifact_suffix }}
      min_api:                ${{ steps.flags.outputs.min_api }}
      gradle_task:            ${{ steps.flags.outputs.gradle_task }}
      has_riscv64:            ${{ steps.flags.outputs.has_riscv64 }}
    steps:
      - uses: actions/checkout@v4

      - id: flags
        shell: bash
        run: |
          set -euo pipefail

          abi="${{ inputs.abi_profile }}"
          variant="${{ inputs.build_variant }}"
          skip_riscv="${{ inputs.skip_riscv64_bootstrap }}"

          # NDK 27 exige minSdk >= 21 quando há código nativo C/C++
          # Referência: erro CXX1110
          MIN_NDK27=21

          case "${abi}" in
            arm64_only)
              policy="arm64-only"
              abis="arm64-v8a"
              ci_val="false"
              suffix="arm64-v8a"
              ;;
            arm32_arm64)
              policy="arm32-arm64"
              abis="arm64-v8a,armeabi-v7a"
              ci_val="true"
              suffix="arm32-arm64"
              ;;
            all_5abi)
              policy="internal-5abi"
              abis="arm64-v8a,armeabi-v7a,x86,x86_64,riscv64"
              ci_val="true"
              suffix="all-5abi"
              ;;
            *)
              echo "abi_profile inválido: ${abi}" >&2
              exit 1
              ;;
          esac

          # Detecta se bootstrap riscv64 existe no repo
          if [[ -f "app/src/main/assets/bootstrap/riscv64.tar" ]]; then
            has_riscv64="true"
          else
            has_riscv64="false"
            # Se all_5abi sem riscv64 e skip não habilitado → falha antecipada
            if [[ "${abi}" == "all_5abi" && "${skip_riscv}" != "true" ]]; then
              echo "::error::Bootstrap riscv64.tar ausente em app/src/main/assets/bootstrap/. Habilite skip_riscv64_bootstrap=true ou adicione o arquivo." >&2
              exit 1
            fi
            # Remove riscv64 da lista de ABIs compiladas se skip ativo
            if [[ "${abi}" == "all_5abi" && "${skip_riscv}" == "true" ]]; then
              abis="arm64-v8a,armeabi-v7a,x86,x86_64"
              policy="arm32-arm64"   # política mais próxima sem riscv64
              echo "::warning::riscv64 removido das ABIs (bootstrap ausente). Compilando: ${abis}"
            fi
          fi

          case "${variant}" in
            debug)   task=":app:assembleDebug" ;;
            release) task=":app:assembleRelease" ;;
          esac

          echo "app_abi_policy=${policy}"            >> "$GITHUB_OUTPUT"
          echo "supported_abis=${abis}"              >> "$GITHUB_OUTPUT"
          echo "ci_internal_validation=${ci_val}"    >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${suffix}"           >> "$GITHUB_OUTPUT"
          echo "min_api=${MIN_NDK27}"                >> "$GITHUB_OUTPUT"
          echo "gradle_task=${task}"                 >> "$GITHUB_OUTPUT"
          echo "has_riscv64=${has_riscv64}"          >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK + NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          rc=${PIPESTATUS[1]}
          set -o pipefail
          [[ "${rc}" -eq 0 ]] || exit "${rc}"
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "cmake;${CMAKE_VERSION}" \
            "ndk;${NDK_VERSION}"

      - name: Prepare Android env
        run: |
          ./tools/ci/prepare_android_env.sh \
            --java-version "${{ env.JAVA_VERSION }}" \
            --require-sdkmanager

      - name: Materialize Firebase config
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_firebase_config.sh --policy internal

      - name: Bootstrap contract
        # Passa flag para tolerar riscv64 ausente quando skip ativo
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.resolve.outputs.has_riscv64 }}" == "false" \
             && "${{ inputs.skip_riscv64_bootstrap }}" == "true" ]]; then
            echo "::warning::Verificação bootstrap riscv64 ignorada (tar ausente, skip habilitado)."
            # Roda contrato apenas para ABIs presentes
            python3 tools/verify_bootstrap_assets.py \
              --abis "${{ needs.resolve.outputs.supported_abis }}" || true
          else
            ./tools/ci/verify_bootstrap_contract.sh
          fi

      - name: Lint
        if: ${{ inputs.run_lint == true }}
        run: ./tools/gradle_with_jdk21.sh --no-daemon :app:lintDebug

      - name: Native checks
        if: ${{ inputs.run_native_checks == true }}
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-cmake \
            -DRMR_JNI_BUILD=1 \
            -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake --target verify_contracts -j"$(nproc)"

      - name: Build Multi-ABI
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh --no-daemon \
            -PbuildStrict=false \
            -PAPP_ABI_POLICY="${{ needs.resolve.outputs.app_abi_policy }}" \
            -PSUPPORTED_ABIS="${{ needs.resolve.outputs.supported_abis }}" \
            -Pcompile.api=${COMPILE_API} \
            -Ptarget.api=${TARGET_API} \
            -Pmin.api=${{ needs.resolve.outputs.min_api }} \
            -PMIN_API=${{ needs.resolve.outputs.min_api }} \
            -Ptools.version=${TOOLS_VERSION} \
            -Pndk.version=${NDK_VERSION} \
            -Pcmake.version=${CMAKE_VERSION} \
            -Pjava.language.version=${JAVA_VERSION} \
            -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
            -PciRelease=false \
            --console=plain --info \
            ${{ needs.resolve.outputs.gradle_task }}

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ needs.resolve.outputs.artifact_suffix }}-${{ github.run_id }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/apk/**/output-metadata.json
          if-no-files-found: warn

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ needs.resolve.outputs.artifact_suffix }}-${{ github.run_id }}
          path: |
            app/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn

      - name: Build status snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          {
            echo "# Multi-ABI Build Status"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- commit: ${GITHUB_SHA}"
            echo "- abi_policy: ${{ needs.resolve.outputs.app_abi_policy }}"
            echo "- supported_abis: ${{ needs.resolve.outputs.supported_abis }}"
            echo "- min_api: ${{ needs.resolve.outputs.min_api }}"
            echo "- has_riscv64_bootstrap: ${{ needs.resolve.outputs.has_riscv64 }}"
            echo "- job_status: ${{ job.status }}"
          } > ci-artifacts/BUILD_STATUS.md

      - name: Upload build status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-status-multiabi-${{ github.run_id }}
          path: ci-artifacts/BUILD_STATUS.md
          if-no-files-found: error
          overwrite: true
