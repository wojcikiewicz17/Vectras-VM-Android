name: Engine CI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  engine-build-bench:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Block sensitive artifacts in repository (warn only)
        continue-on-error: true
        run: bash tools/security/block_sensitive_artifacts.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config graphviz python3 ccache clang ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 dot rg)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Prepare compiler + ccache
        run: |
          echo "CC=${{ matrix.compiler }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}" >> "$GITHUB_ENV"
          mkdir -p ~/.ccache
          ccache --max-size=500M

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.compiler }}-

      - name: Prepare output directories
        run: |
          mkdir -p bench/results
          mkdir -p reports/baremetal

      - name: Validate engine source manifest sync
        run: make check-engine-source-manifest

      - name: Build with Make
        run: make clean && make all CC="$CC" CXX="$CXX"

      - name: Run selftests (Make)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/make-selftest.log

      - name: Build with CMake
        run: |
          cmake -S . -B build-cmake -DCMAKE_C_COMPILER="$CC" -DCMAKE_CXX_COMPILER="$CXX"
          cmake --build build-cmake -j"$(nproc)"

      - name: Run BitΩ smoke test (Make)
        run: make run-bitomega-smoketest

      - name: Run BitΩ smoke test (CMake)
        run: cmake --build build-cmake --target run_bitomega_smoketest

      - name: Verify link contracts (CMake)
        run: cmake --build build-cmake --target verify_contracts

      - name: Run selftests (CMake)
        run: cmake --build build-cmake --target run_selftest

      - name: Generate BitΩ transition graph
        run: cmake --build build-cmake --target bitomega_transition_graph
      - name: Run release gate (selftest + bench + summary)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-release-gate 2>&1 | tee bench/results/release-gate.log

      - name: Upload BitΩ smoke artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bitomega-artifacts
          path: |
            bench/results/bitomega_transitions.csv
            reports/bitomega_transition_graph.png
            reports/bitomega_summary.md
          if-no-files-found: warn

      - name: Upload bench summary artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bench-summary
          path: |
            bench/results/summary.json
            bench/results/release-gate.log
            bench/results/make-selftest.log
          if-no-files-found: warn

      - name: Upload baremetal reports artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: baremetal-reports
          path: reports/baremetal/*
          if-no-files-found: warn



  engine-selftest-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config python3 graphviz ripgrep

      - name: Build engine (Make)
        run: make clean && make -j"$(nproc)"

      - name: Run canonical selftest gate (Make)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/selftest-host-arm64.log

      - name: Verify arm64 selftest coverage
        run: |
          set -euo pipefail
          mkdir -p bench/results

          neon_bin="build/demo/rmr_neon_simd_selftest"
          casm_bin="build/demo/rmr_casm_bridge_selftest"

          if [ ! -x "$neon_bin" ]; then
            echo "[arm64-selftest] Missing required NEON selftest binary: $neon_bin" >&2
            exit 1
          fi

          if ! grep -Fq "./$neon_bin" bench/results/selftest-host-arm64.log; then
            echo "[arm64-selftest] Canonical gate did not execute $neon_bin" >&2
            exit 1
          fi

          echo "[arm64-selftest] Explicit run: $neon_bin"
          ./$neon_bin 2>&1 | tee bench/results/rmr_neon_simd_selftest-arm64.log

          arch="$(uname -m)"
          casm_supported=0
          case "$arch" in
            x86_64|amd64|riscv64) casm_supported=1 ;;
          esac

          if [ "$casm_supported" -eq 1 ]; then
            if [ ! -x "$casm_bin" ]; then
              echo "[arm64-selftest] Missing required CASM selftest binary on supported ABI ($arch): $casm_bin" >&2
              exit 1
            fi
            if ! grep -Fq "./$casm_bin" bench/results/selftest-host-arm64.log; then
              echo "[arm64-selftest] Canonical gate did not execute $casm_bin on supported ABI ($arch)" >&2
              exit 1
            fi
            echo "[arm64-selftest] Explicit run: $casm_bin"
            ./$casm_bin 2>&1 | tee bench/results/rmr_casm_bridge_selftest-arm64.log
          else
            echo "[arm64-selftest] CASM selftest not required on ABI: $arch" | tee bench/results/rmr_casm_bridge_selftest-arm64.log
          fi

      - name: Upload arm64 selftest logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: selftest-logs-arm64
          path: |
            bench/results/selftest-host-arm64.log
            bench/results/rmr_neon_simd_selftest-arm64.log
            bench/results/rmr_casm_bridge_selftest-arm64.log
          if-no-files-found: error
  sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build clang ripgrep
      - name: ASAN+UBSAN smoke build
        run: |
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          cmake --build build-sanitizers -j"$(nproc)"
