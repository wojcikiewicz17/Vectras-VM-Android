name: "Android Build (Interoperable & Reliable)"

on:
  push:
    branches: [main, master, dev, release/**]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_variant:
        description: "Build variant"
        type: choice
        options: [debug, release, both]
        default: debug
      build_mode:
        description: "Execution mode (11 níveis)"
        type: choice
        options: [fast, moderado, profundo, ultra_minucioso, diagnostico, interoperavel, confiavel, portavel, hardening, matrix_total, forense]
        default: moderado
      abi_policy:
        description: "ABI policy"
        type: choice
        options: [arm64-only, with-32bit]
        default: arm64-only
      ndk_version:
        description: "NDK version (override)"
        default: "27.2.12479018"
      signing_mode:
        description: "Release signing mode"
        type: choice
        options: [auto, unsigned, signed]
        default: auto
      enable_policy_module:
        description: "Enable RMR policy module"
        type: boolean
        default: true
      enable_bitraf_module:
        description: "Enable BITRAF module"
        type: boolean
        default: true
  workflow_call:
    inputs:
      build_variant:
        required: false
        type: string
        default: "debug"
      build_mode:
        required: false
        type: string
        default: "moderado"
      abi_policy:
        required: false
        type: string
        default: "arm64-only"
      ndk_version:
        required: false
        type: string
        default: "27.2.12479018"
      signing_mode:
        required: false
        type: string
        default: "auto"
      enable_policy_module:
        required: false
        type: boolean
        default: true
      enable_bitraf_module:
        required: false
        type: boolean
        default: true
    secrets:
      VECTRAS_RELEASE_STORE_FILE:
        required: false
      VECTRAS_RELEASE_KEYSTORE_B64:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false
      ANDROID_SIGNING_KEYSTORE:
        required: false

permissions:
  contents: read

concurrency:
  group: android-verified-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  CMAKE_VERSION: "3.22.1"
  COMPILE_API: "35"
  TARGET_API: "35"
  MIN_API: "23"

jobs:
  preflight:
    name: "Preflight"
    runs-on: ubuntu-24.04
    outputs:
      run_debug: ${{ steps.resolve.outputs.run_debug }}
      run_release: ${{ steps.resolve.outputs.run_release }}
      build_mode: ${{ steps.resolve.outputs.build_mode }}
      abi_policy: ${{ steps.resolve.outputs.abi_policy }}
      ndk_version: ${{ steps.resolve.outputs.ndk_version }}
      signing_mode: ${{ steps.resolve.outputs.signing_mode }}
      rmr_policy: ${{ steps.resolve.outputs.rmr_policy }}
      rmr_bitraf: ${{ steps.resolve.outputs.rmr_bitraf }}
      gradle_checks: ${{ steps.mode.outputs.gradle_checks }}
      native_matrix: ${{ steps.mode.outputs.native_matrix }}
      gradle_log_flags: ${{ steps.mode.outputs.gradle_log_flags }}
      collect_deep_diagnostics: ${{ steps.mode.outputs.collect_deep_diagnostics }}
    steps:
      - name: Resolve user inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          get_input() {
            local key="$1"
            local fallback="$2"
            local v=""
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              case "$key" in
                build_variant) v="${{ github.event.inputs.build_variant }}" ;;
                build_mode) v="${{ github.event.inputs.build_mode }}" ;;
                abi_policy) v="${{ github.event.inputs.abi_policy }}" ;;
                ndk_version) v="${{ github.event.inputs.ndk_version }}" ;;
                signing_mode) v="${{ github.event.inputs.signing_mode }}" ;;
                enable_policy_module) v="${{ github.event.inputs.enable_policy_module }}" ;;
                enable_bitraf_module) v="${{ github.event.inputs.enable_bitraf_module }}" ;;
              esac
            elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
              case "$key" in
                build_variant) v="${{ inputs.build_variant }}" ;;
                build_mode) v="${{ inputs.build_mode }}" ;;
                abi_policy) v="${{ inputs.abi_policy }}" ;;
                ndk_version) v="${{ inputs.ndk_version }}" ;;
                signing_mode) v="${{ inputs.signing_mode }}" ;;
                enable_policy_module) v="${{ inputs.enable_policy_module }}" ;;
                enable_bitraf_module) v="${{ inputs.enable_bitraf_module }}" ;;
              esac
            fi
            [[ -n "$v" ]] && echo "$v" || echo "$fallback"
          }

          VARIANT="$(get_input build_variant debug)"
          MODE="$(get_input build_mode moderado)"
          ABI_POLICY="$(get_input abi_policy arm64-only)"
          NDK_VERSION="$(get_input ndk_version 27.2.12479018)"
          SIGNING_MODE="$(get_input signing_mode auto)"
          POLICY_MODULE="$(get_input enable_policy_module true)"
          BITRAF_MODULE="$(get_input enable_bitraf_module true)"

          [[ "$VARIANT" == "both" || "$VARIANT" == "debug" ]] && echo "run_debug=true" >> "$GITHUB_OUTPUT" || echo "run_debug=false" >> "$GITHUB_OUTPUT"
          [[ "$VARIANT" == "both" || "$VARIANT" == "release" ]] && echo "run_release=true" >> "$GITHUB_OUTPUT" || echo "run_release=false" >> "$GITHUB_OUTPUT"

          echo "build_mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "abi_policy=$ABI_POLICY" >> "$GITHUB_OUTPUT"
          echo "ndk_version=$NDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "signing_mode=$SIGNING_MODE" >> "$GITHUB_OUTPUT"
          [[ "$POLICY_MODULE" == "false" ]] && echo "rmr_policy=OFF" >> "$GITHUB_OUTPUT" || echo "rmr_policy=ON" >> "$GITHUB_OUTPUT"
          [[ "$BITRAF_MODULE" == "false" ]] && echo "rmr_bitraf=OFF" >> "$GITHUB_OUTPUT" || echo "rmr_bitraf=ON" >> "$GITHUB_OUTPUT"

      - name: Build mode policy (fast/moderado/profundo + 8)
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ steps.resolve.outputs.build_mode }}"
          case "$MODE" in
            fast)
              echo "gradle_checks=lintDebug" >> "$GITHUB_OUTPUT"
              echo "native_matrix=false" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--console=plain" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=false" >> "$GITHUB_OUTPUT"
              ;;
            moderado)
              echo "gradle_checks=lintDebug testDebugUnitTest" >> "$GITHUB_OUTPUT"
              echo "native_matrix=false" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--stacktrace" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=false" >> "$GITHUB_OUTPUT"
              ;;
            profundo|ultra_minucioso|diagnostico|interoperavel|confiavel|portavel|hardening|matrix_total|forense)
              echo "gradle_checks=lintDebug testDebugUnitTest checkNativeAllMatrix" >> "$GITHUB_OUTPUT"
              echo "native_matrix=true" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--stacktrace --info" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported build_mode: $MODE"
              exit 1
              ;;
          esac

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate Java runtime
        run: |
          JAVA_VER=$(java -version 2>&1 | awk -F '"' '/version/ {print $2}' | cut -d. -f1)
          echo "Detected Java major: $JAVA_VER (expected: $JAVA_VERSION)"
          if [ "$JAVA_VER" != "$JAVA_VERSION" ]; then
            echo "::error::Java version mismatch: expected $JAVA_VERSION got $JAVA_VER"
            exit 1
          fi

  build_debug:
    name: "Build · Debug"
    needs: preflight
    if: needs.preflight.outputs.run_debug == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install NDK + CMake
        run: sdkmanager --install "ndk;${{ needs.preflight.outputs.ndk_version }}" "cmake;${{ env.CMAKE_VERSION }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug with mode policy
        shell: bash
        run: |
          set -euo pipefail
          # Wrapper is the source of truth for JVM policy (17/21) and local.properties bootstrap.
          BASE_FLAGS="-PCOMPILE_API=${{ env.COMPILE_API }} -PTARGET_API=${{ env.TARGET_API }} -PMIN_API=${{ env.MIN_API }} -PNDK_VERSION=${{ needs.preflight.outputs.ndk_version }} -PCMAKE_VERSION=${{ env.CMAKE_VERSION }} -PJAVA_LANGUAGE_VERSION=${{ env.JAVA_VERSION }} -PAPP_ABI_POLICY=${{ needs.preflight.outputs.abi_policy }} -PRMR_ENABLE_POLICY_MODULE=${{ needs.preflight.outputs.rmr_policy }} -PRMR_ENABLE_BITRAF_MODULE=${{ needs.preflight.outputs.rmr_bitraf }}"

          ./tools/gradle_with_jdk21.sh verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS

          for TASK in ${{ needs.preflight.outputs.gradle_checks }}; do
            ./tools/gradle_with_jdk21.sh "$TASK" --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS
          done

          ./tools/gradle_with_jdk21.sh assembleDebug --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS

      - name: Verify native output
        run: |
          SO=$(find app/build -name "libvectra_core_accel.so" 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "::error::libvectra_core_accel.so NOT FOUND — revisar CMake/NDK"
            exit 1
          fi
          file "$SO"

      - name: Upload debug diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-diagnostics-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
            **/build/test-results/**

  build_release:
    name: "Build · Release"
    needs: preflight
    if: needs.preflight.outputs.run_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install NDK + CMake
        run: sdkmanager --install "ndk;${{ needs.preflight.outputs.ndk_version }}" "cmake;${{ env.CMAKE_VERSION }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble release (auto/signed/unsigned)
        shell: bash
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
          ANDROID_SIGNING_KEYSTORE: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}
        run: |
          set -euo pipefail
          BASE_FLAGS="-PCOMPILE_API=${{ env.COMPILE_API }} -PTARGET_API=${{ env.TARGET_API }} -PMIN_API=${{ env.MIN_API }} -PNDK_VERSION=${{ needs.preflight.outputs.ndk_version }} -PCMAKE_VERSION=${{ env.CMAKE_VERSION }} -PJAVA_LANGUAGE_VERSION=${{ env.JAVA_VERSION }} -PAPP_ABI_POLICY=${{ needs.preflight.outputs.abi_policy }} -PRMR_ENABLE_POLICY_MODULE=${{ needs.preflight.outputs.rmr_policy }} -PRMR_ENABLE_BITRAF_MODULE=${{ needs.preflight.outputs.rmr_bitraf }}"
          EXTRA_RELEASE_FLAGS=""
          GENERATED_KEYSTORE_PATH="/tmp/release.keystore"
          KEYSTORE_READY="false"

          has_required_signing_secrets() {
            [[ -n "${VECTRAS_RELEASE_STORE_PASSWORD:-}" && -n "${VECTRAS_RELEASE_KEY_ALIAS:-}" && -n "${VECTRAS_RELEASE_KEY_PASSWORD:-}" ]]
          }

          resolve_keystore_source() {
            if [[ -n "${VECTRAS_RELEASE_STORE_FILE:-}" ]]; then
              if [[ -s "${VECTRAS_RELEASE_STORE_FILE}" ]]; then
                KEYSTORE_READY="true"
              else
                echo "::error::VECTRAS_RELEASE_STORE_FILE foi definido, mas o arquivo não existe ou está vazio: ${VECTRAS_RELEASE_STORE_FILE}"
                return 1
              fi
            elif [[ -n "${VECTRAS_RELEASE_KEYSTORE_B64:-}" ]]; then
              echo "${VECTRAS_RELEASE_KEYSTORE_B64}" | base64 -d > "${GENERATED_KEYSTORE_PATH}"
              if [[ -s "${GENERATED_KEYSTORE_PATH}" ]]; then
                export VECTRAS_RELEASE_STORE_FILE="${GENERATED_KEYSTORE_PATH}"
                KEYSTORE_READY="true"
              else
                echo "::error::VECTRAS_RELEASE_KEYSTORE_B64 foi fornecido, mas não gerou um keystore válido"
                return 1
              fi
            elif [[ -n "${ANDROID_SIGNING_KEYSTORE:-}" ]]; then
              echo "::warning::Usando fallback legado ANDROID_SIGNING_KEYSTORE; prefira VECTRAS_RELEASE_STORE_FILE ou VECTRAS_RELEASE_KEYSTORE_B64"
              echo "${ANDROID_SIGNING_KEYSTORE}" | base64 -d > "${GENERATED_KEYSTORE_PATH}"
              if [[ -s "${GENERATED_KEYSTORE_PATH}" ]]; then
                export VECTRAS_RELEASE_STORE_FILE="${GENERATED_KEYSTORE_PATH}"
                KEYSTORE_READY="true"
              else
                echo "::error::ANDROID_SIGNING_KEYSTORE (fallback legado) não gerou um keystore válido"
                return 1
              fi
            fi
          }

          resolve_keystore_source

          if [[ "${{ needs.preflight.outputs.signing_mode }}" == "unsigned" ]]; then
            EXTRA_RELEASE_FLAGS="-PALLOW_UNSIGNED_RELEASE=true -PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true -PCI_INTERNAL_VALIDATION=true"
          elif [[ "${{ needs.preflight.outputs.signing_mode }}" == "signed" ]]; then
            if ! has_required_signing_secrets; then
              echo "::error::signing_mode=signed requer VECTRAS_RELEASE_STORE_PASSWORD, VECTRAS_RELEASE_KEY_ALIAS e VECTRAS_RELEASE_KEY_PASSWORD"
              exit 1
            fi
            if [[ "${KEYSTORE_READY}" != "true" ]]; then
              echo "::error::signing_mode=signed requer keystore válido via VECTRAS_RELEASE_STORE_FILE ou VECTRAS_RELEASE_KEYSTORE_B64 (fallback legado: ANDROID_SIGNING_KEYSTORE)"
              exit 1
            fi
          else
            if ! has_required_signing_secrets || [[ "${KEYSTORE_READY}" != "true" ]]; then
              EXTRA_RELEASE_FLAGS="-PALLOW_UNSIGNED_RELEASE=true -PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true -PCI_INTERNAL_VALIDATION=true"
            fi
          fi

          if [[ -n "${VECTRAS_GOOGLE_SERVICES_JSON_B64:-}" ]]; then
            echo "${VECTRAS_GOOGLE_SERVICES_JSON_B64}" | base64 --decode > app/google-services.json
            echo "Loaded production Firebase config from VECTRAS_GOOGLE_SERVICES_JSON_B64."
          elif [[ "${EXTRA_RELEASE_FLAGS}" == *"-PCI_INTERNAL_VALIDATION=true"* ]]; then
            cat > app/google-services.json <<'JSON'
            {
              "project_info": {
                "project_number": "0",
                "project_id": "placeholder-internal-validation",
                "storage_bucket": "placeholder-internal-validation.appspot.com"
              },
              "client": [],
              "configuration_version": "1"
            }
            JSON
            echo "Using placeholder Firebase config for unsigned internal validation."
          else
            echo "::error::google-services.json de produção ausente para caminho oficial assinado."
            exit 1
          fi

          if [[ -z "${EXTRA_RELEASE_FLAGS}" ]]; then
            if [[ -z "${VECTRAS_RELEASE_STORE_FILE:-}" || ! -s "${VECTRAS_RELEASE_STORE_FILE}" ]]; then
              echo "::error::Keystore ausente ou vazio antes do assembleRelease"
              exit 1
            fi
            if ! has_required_signing_secrets; then
              echo "::error::Secrets obrigatórios ausentes antes do assembleRelease: VECTRAS_RELEASE_STORE_PASSWORD, VECTRAS_RELEASE_KEY_ALIAS, VECTRAS_RELEASE_KEY_PASSWORD"
              exit 1
            fi
          fi

          if [[ "${{ needs.preflight.outputs.native_matrix }}" == "true" ]]; then
            ./tools/gradle_with_jdk21.sh checkNativeAllMatrix --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS $EXTRA_RELEASE_FLAGS
          fi

          ./tools/gradle_with_jdk21.sh verifyTargetApiBaseline --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} -PTARGET_API=${{ env.TARGET_API }} -PRELEASE_MIN_TARGET_API=35
          ./tools/gradle_with_jdk21.sh assembleRelease --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS $EXTRA_RELEASE_FLAGS

          rm -f "${GENERATED_KEYSTORE_PATH}"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
            app/build/reports/**

  summary:
    name: "Summary"
    needs: [preflight, build_debug, build_release]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: CI summary
        run: |
          echo "=============================================="
          echo " Android Build (Interoperable & Reliable)"
          echo "=============================================="
          echo " mode:      ${{ needs.preflight.outputs.build_mode }}"
          echo " debug:     ${{ needs.build_debug.result }}"
          echo " release:   ${{ needs.build_release.result }}"
          echo "=============================================="
          D="${{ needs.build_debug.result }}"
          R="${{ needs.build_release.result }}"
          for X in "$D" "$R"; do
            if [ "$X" = "failure" ]; then
              echo "::error::Falha crítica detectada. Ver artefatos de diagnóstico para análise holística."
              exit 1
            fi
          done
