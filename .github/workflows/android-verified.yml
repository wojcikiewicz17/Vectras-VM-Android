name: "Android Build (Interoperable & Reliable)"

on:
  push:
    branches: [main, master, dev, release/**]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_variant:
        description: "Build variant"
        type: choice
        options: [debug, release, both]
        default: debug
      mode:
        description: "Execution mode profile"
        type: choice
        options: [fast, moderado, profundo, ultra_minucioso, diagnostico, interoperavel, confiavel, portavel, hardening, matrix_total, forense]
        default: moderado
      run_lint:
        description: "Run lint checks"
        type: boolean
        default: true
      run_native_matrix:
        description: "Run native matrix checks"
        type: boolean
        default: false
      abi_policy:
        description: "ABI policy"
        type: choice
        options: [arm64-only]
        default: arm64-only
      ndk_version:
        description: "NDK version (override)"
        default: "27.2.12479018"
      signing_mode:
        description: "Release signing mode"
        type: choice
        options: [auto, unsigned, signed]
        default: auto
      enable_policy_module:
        description: "Enable RMR policy module"
        type: boolean
        default: true
      enable_bitraf_module:
        description: "Enable BITRAF module"
        type: boolean
        default: true
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string
      build_variant:
        required: false
        type: string
        default: "debug"
      mode:
        required: false
        type: string
        default: "moderado"
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_matrix:
        required: false
        type: boolean
        default: false
      abi_policy:
        required: false
        type: string
        default: "arm64-only"
      ndk_version:
        required: false
        type: string
        default: "27.2.12479018"
      signing_mode:
        required: false
        type: string
        default: "auto"
      enable_policy_module:
        required: false
        type: boolean
        default: true
      enable_bitraf_module:
        required: false
        type: boolean
        default: true
    secrets:
      VECTRAS_RELEASE_STORE_FILE:
        required: false
      VECTRAS_RELEASE_KEYSTORE_B64:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false
      ANDROID_SIGNING_KEYSTORE:
        required: false
permissions:
  contents: read
  actions: read

concurrency:
  group: android-verified-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JAVA_VERSION: "17"
  CMAKE_VERSION: "3.22.1"
  COMPILE_API: "35"
  TARGET_API: "35"
  MIN_API: "23"
  TOOLS_VERSION: "35.0.0"

jobs:
  preflight:
    name: "Preflight"
    runs-on: ubuntu-24.04
    outputs:
      run_debug: ${{ steps.resolve.outputs.run_debug }}
      run_release: ${{ steps.resolve.outputs.run_release }}
      mode: ${{ steps.resolve.outputs.mode }}
      abi_policy: ${{ steps.resolve.outputs.abi_policy }}
      ndk_version: ${{ steps.resolve.outputs.ndk_version }}
      signing_mode: ${{ steps.resolve.outputs.signing_mode }}
      rmr_policy: ${{ steps.resolve.outputs.rmr_policy }}
      rmr_bitraf: ${{ steps.resolve.outputs.rmr_bitraf }}
      run_lint: ${{ steps.resolve.outputs.run_lint }}
      run_native_matrix: ${{ steps.resolve.outputs.run_native_matrix }}
      run_unit_tests: ${{ steps.mode.outputs.run_unit_tests }}
      gradle_log_flags: ${{ steps.mode.outputs.gradle_log_flags }}
      collect_deep_diagnostics: ${{ steps.mode.outputs.collect_deep_diagnostics }}
    steps:
      - name: Validate provenance chain-of-custody
        if: ${{ github.event_name == 'workflow_call' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROVENANCE_RUN_ID: ${{ inputs.provenance_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_MANIFEST_HASH: ${{ inputs.provenance_manifest_hash }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" == "$CURRENT_SHA" ]] || { echo "SHA mismatch: expected=$EXPECTED_SHA current=$CURRENT_SHA" >&2; exit 1; }
          python3 - <<'PY'
          import hashlib, io, json, os, urllib.request, zipfile
          token = os.environ["GITHUB_TOKEN"]; repo = os.environ["REPO"]; run_id = os.environ["PROVENANCE_RUN_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]; expected_hash = os.environ["EXPECTED_MANIFEST_HASH"]
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as r: artifacts = json.load(r).get("artifacts", [])
          artifact = next((a for a in artifacts if a.get("name") == "chain-of-custody"), None)
          if not artifact: raise SystemExit("Artifact chain-of-custody not found")
          with urllib.request.urlopen(urllib.request.Request(artifact["archive_download_url"], headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})) as r: blob = r.read()
          with zipfile.ZipFile(io.BytesIO(blob)) as zf: raw = zf.read("provenance.json")
          got_hash = hashlib.sha256(raw).hexdigest()
          if got_hash != expected_hash: raise SystemExit(f"Manifest hash mismatch: expected={expected_hash} got={got_hash}")
          data = json.loads(raw)
          if data["github"]["sha"] != expected_sha: raise SystemExit("Manifest SHA differs from expected SHA")
          if str(data["github"]["run_id"]) != str(run_id): raise SystemExit("Manifest run_id differs from provenance_run_id")
          print("Provenance validation passed")
          PY

      - name: Resolve user inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          get_input() {
            local key="$1"
            local fallback="$2"
            local v=""
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              case "$key" in
                build_variant) v="${{ github.event.inputs.build_variant }}" ;;
                mode) v="${{ github.event.inputs.mode }}" ;;
                run_lint) v="${{ github.event.inputs.run_lint }}" ;;
                run_native_matrix) v="${{ github.event.inputs.run_native_matrix }}" ;;
                abi_policy) v="${{ github.event.inputs.abi_policy }}" ;;
                ndk_version) v="${{ github.event.inputs.ndk_version }}" ;;
                signing_mode) v="${{ github.event.inputs.signing_mode }}" ;;
                enable_policy_module) v="${{ github.event.inputs.enable_policy_module }}" ;;
                enable_bitraf_module) v="${{ github.event.inputs.enable_bitraf_module }}" ;;
              esac
            elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
              case "$key" in
                build_variant) v="${{ inputs.build_variant }}" ;;
                mode) v="${{ inputs.mode }}" ;;
                run_lint) v="${{ inputs.run_lint }}" ;;
                run_native_matrix) v="${{ inputs.run_native_matrix }}" ;;
                abi_policy) v="${{ inputs.abi_policy }}" ;;
                ndk_version) v="${{ inputs.ndk_version }}" ;;
                signing_mode) v="${{ inputs.signing_mode }}" ;;
                enable_policy_module) v="${{ inputs.enable_policy_module }}" ;;
                enable_bitraf_module) v="${{ inputs.enable_bitraf_module }}" ;;
              esac
            fi
            [[ -n "$v" ]] && echo "$v" || echo "$fallback"
          }

          VARIANT="$(get_input build_variant debug)"
          MODE="$(get_input mode moderado)"
          RUN_LINT="$(get_input run_lint true)"
          RUN_NATIVE_MATRIX="$(get_input run_native_matrix false)"
          ABI_POLICY="$(get_input abi_policy arm64-only)"
          NDK_VERSION="$(get_input ndk_version 27.2.12479018)"
          SIGNING_MODE="$(get_input signing_mode auto)"
          POLICY_MODULE="$(get_input enable_policy_module true)"
          BITRAF_MODULE="$(get_input enable_bitraf_module true)"

          [[ "$VARIANT" == "both" || "$VARIANT" == "debug" ]] && echo "run_debug=true" >> "$GITHUB_OUTPUT" || echo "run_debug=false" >> "$GITHUB_OUTPUT"
          [[ "$VARIANT" == "both" || "$VARIANT" == "release" ]] && echo "run_release=true" >> "$GITHUB_OUTPUT" || echo "run_release=false" >> "$GITHUB_OUTPUT"

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          [[ "$RUN_LINT" == "false" ]] && echo "run_lint=false" >> "$GITHUB_OUTPUT" || echo "run_lint=true" >> "$GITHUB_OUTPUT"
          [[ "$RUN_NATIVE_MATRIX" == "true" ]] && echo "run_native_matrix=true" >> "$GITHUB_OUTPUT" || echo "run_native_matrix=false" >> "$GITHUB_OUTPUT"
          echo "abi_policy=$ABI_POLICY" >> "$GITHUB_OUTPUT"
          echo "ndk_version=$NDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "signing_mode=$SIGNING_MODE" >> "$GITHUB_OUTPUT"
          [[ "$POLICY_MODULE" == "false" ]] && echo "rmr_policy=OFF" >> "$GITHUB_OUTPUT" || echo "rmr_policy=ON" >> "$GITHUB_OUTPUT"
          [[ "$BITRAF_MODULE" == "false" ]] && echo "rmr_bitraf=OFF" >> "$GITHUB_OUTPUT" || echo "rmr_bitraf=ON" >> "$GITHUB_OUTPUT"

      - name: Build mode policy (see docs/ci/android-mode-matrix.md)
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ steps.resolve.outputs.mode }}"
          case "$MODE" in
            fast)
              echo "run_unit_tests=false" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--console=plain" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=false" >> "$GITHUB_OUTPUT"
              ;;
            moderado)
              echo "run_unit_tests=true" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--stacktrace" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=false" >> "$GITHUB_OUTPUT"
              ;;
            profundo|ultra_minucioso|diagnostico|interoperavel|confiavel|portavel|hardening|matrix_total|forense)
              echo "run_unit_tests=true" >> "$GITHUB_OUTPUT"
              echo "gradle_log_flags=--stacktrace --info" >> "$GITHUB_OUTPUT"
              echo "collect_deep_diagnostics=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported mode: $MODE"
              exit 1
              ;;
          esac

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate Java runtime
        run: |
          JAVA_VER=$(java -version 2>&1 | awk -F '"' '/version/ {print $2}' | cut -d. -f1)
          echo "Detected Java major: $JAVA_VER (expected: $JAVA_VERSION)"
          if [ "$JAVA_VER" != "$JAVA_VERSION" ]; then
            echo "::error::Java version mismatch: expected $JAVA_VERSION got $JAVA_VER"
            exit 1
          fi

  build_debug:
    name: "Build Â· Debug"
    needs: preflight
    if: needs.preflight.outputs.run_debug == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${{ env.COMPILE_API }}" \
            "build-tools;${{ env.TOOLS_VERSION }}" \
            "ndk;${{ needs.preflight.outputs.ndk_version }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Generate local.properties
        run: ./tools/ci/prepare_android_env.sh --java-version "${{ env.JAVA_VERSION }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Enforce bootstrap contract (sync -> verify)
        run: ./tools/ci/verify_bootstrap_contract.sh --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }}

      - name: Build debug with mode policy
        shell: bash
        run: |
          set -euo pipefail
          # Wrapper is the source of truth for JVM policy (17/21) and local.properties bootstrap.
          BASE_FLAGS="-PCOMPILE_API=${{ env.COMPILE_API }} -PTARGET_API=${{ env.TARGET_API }} -PMIN_API=${{ env.MIN_API }} -PNDK_VERSION=${{ needs.preflight.outputs.ndk_version }} -PCMAKE_VERSION=${{ env.CMAKE_VERSION }} -PJAVA_LANGUAGE_VERSION=${{ env.JAVA_VERSION }} -PAPP_ABI_POLICY=${{ needs.preflight.outputs.abi_policy }} -PRMR_ENABLE_POLICY_MODULE=${{ needs.preflight.outputs.rmr_policy }} -PRMR_ENABLE_BITRAF_MODULE=${{ needs.preflight.outputs.rmr_bitraf }}"

          ./tools/gradle_with_jdk21.sh verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS

          if [[ "${{ needs.preflight.outputs.run_lint }}" == "true" ]]; then
            ./tools/gradle_with_jdk21.sh lintDebug --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS
          fi

          if [[ "${{ needs.preflight.outputs.run_unit_tests }}" == "true" ]]; then
            ./tools/gradle_with_jdk21.sh testDebugUnitTest --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS
          fi

          if [[ "${{ needs.preflight.outputs.run_native_matrix }}" == "true" ]]; then
            ./tools/gradle_with_jdk21.sh checkNativeAllMatrix --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS
          fi

          ./tools/gradle_with_jdk21.sh assembleDebug --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS

      - name: Verify native output
        run: |
          SO=$(find app/build -name "libvectra_core_accel.so" 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "::error::libvectra_core_accel.so NOT FOUND â€” revisar CMake/NDK"
            exit 1
          fi
          file "$SO"

      - name: Verify delivered compiled artifacts (debug)
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh :app:verifyDeliveredCompiledArtifacts --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} -PartifactVariants=debug
          ./tools/ci/verify_artifact_contract.sh --variants debug

      - name: Upload compiled artifacts report (required)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-compiled-artifacts-report
          path: app/build/reports/artifacts/compiled-artifacts-report.json
          if-no-files-found: error

      - name: Upload compiled outputs bundle
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-compiled-outputs
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/outputs/mapping/**
          if-no-files-found: error

      - name: Upload debug diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: debug-diagnostics-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
            **/build/test-results/**

  build_release:
    name: "Build Â· Release"
    needs: preflight
    if: needs.preflight.outputs.run_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${{ env.COMPILE_API }}" \
            "build-tools;${{ env.TOOLS_VERSION }}" \
            "ndk;${{ needs.preflight.outputs.ndk_version }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Generate local.properties
        run: ./tools/ci/prepare_android_env.sh --java-version "${{ env.JAVA_VERSION }}"

      - uses: gradle/actions/setup-gradle@v4

      - name: Enforce bootstrap contract (sync -> verify)
        run: ./tools/ci/verify_bootstrap_contract.sh --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }}

      - name: Assemble release (auto/signed/unsigned)
        shell: bash
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
          ANDROID_SIGNING_KEYSTORE: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}
        run: |
          set -euo pipefail
          BASE_FLAGS="-PCOMPILE_API=${{ env.COMPILE_API }} -PTARGET_API=${{ env.TARGET_API }} -PMIN_API=${{ env.MIN_API }} -PNDK_VERSION=${{ needs.preflight.outputs.ndk_version }} -PCMAKE_VERSION=${{ env.CMAKE_VERSION }} -PJAVA_LANGUAGE_VERSION=${{ env.JAVA_VERSION }} -PAPP_ABI_POLICY=${{ needs.preflight.outputs.abi_policy }} -PRMR_ENABLE_POLICY_MODULE=${{ needs.preflight.outputs.rmr_policy }} -PRMR_ENABLE_BITRAF_MODULE=${{ needs.preflight.outputs.rmr_bitraf }}"
          ./tools/ci/prepare_release_signing.sh --mode "${{ needs.preflight.outputs.signing_mode }}" --keystore-out "/tmp/release.keystore" --allow-legacy-fallback

          if [[ -n "${VECTRAS_CI_RELEASE_FLAGS:-}" ]]; then
            ./tools/ci/materialize_firebase_config.sh --policy internal
          else
            ./tools/ci/materialize_firebase_config.sh --policy official
          fi

          if [[ "${{ needs.preflight.outputs.run_native_matrix }}" == "true" ]]; then
            ./tools/gradle_with_jdk21.sh checkNativeAllMatrix --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS ${VECTRAS_CI_RELEASE_FLAGS}
          fi

          ./tools/gradle_with_jdk21.sh verifyTargetApiBaseline --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} -PTARGET_API=${{ env.TARGET_API }} -PRELEASE_MIN_TARGET_API=35
          ./tools/gradle_with_jdk21.sh assembleDebug --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS ${VECTRAS_CI_RELEASE_FLAGS} ${VECTRAS_CI_SIGNING_ARGS}
          ./tools/gradle_with_jdk21.sh assembleRelease --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS ${VECTRAS_CI_RELEASE_FLAGS} ${VECTRAS_CI_SIGNING_ARGS}

      - name: Assemble perfRelease
        shell: bash
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
          ANDROID_SIGNING_KEYSTORE: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}
        run: |
          set -euo pipefail
          BASE_FLAGS="-PCOMPILE_API=${{ env.COMPILE_API }} -PTARGET_API=${{ env.TARGET_API }} -PMIN_API=${{ env.MIN_API }} -PNDK_VERSION=${{ needs.preflight.outputs.ndk_version }} -PCMAKE_VERSION=${{ env.CMAKE_VERSION }} -PJAVA_LANGUAGE_VERSION=${{ env.JAVA_VERSION }} -PAPP_ABI_POLICY=${{ needs.preflight.outputs.abi_policy }} -PRMR_ENABLE_POLICY_MODULE=${{ needs.preflight.outputs.rmr_policy }} -PRMR_ENABLE_BITRAF_MODULE=${{ needs.preflight.outputs.rmr_bitraf }}"
          ./tools/ci/prepare_release_signing.sh --mode "${{ needs.preflight.outputs.signing_mode }}" --keystore-out "/tmp/perf-release.keystore" --allow-legacy-fallback
          ./tools/gradle_with_jdk21.sh assemblePerfRelease --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} $BASE_FLAGS ${VECTRAS_CI_RELEASE_FLAGS} ${VECTRAS_CI_SIGNING_ARGS}

      - name: Verify delivered compiled artifacts (debug, release, perfRelease)
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh :app:verifyDeliveredCompiledArtifacts --no-daemon ${{ needs.preflight.outputs.gradle_log_flags }} -PartifactVariants=debug,release,perfRelease
          ./tools/ci/verify_artifact_contract.sh --variants debug,release,perfRelease

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-bundle-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/outputs/mapping/**
            app/build/reports/artifacts/compiled-artifacts-report.json
            app/build/reports/**
            **/*.log

  summary:
    name: "Summary"
    needs: [preflight, build_debug, build_release]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: CI summary
        run: |
          echo "=============================================="
          echo " Android Build (Interoperable & Reliable)"
          echo "=============================================="
          echo " mode:      ${{ needs.preflight.outputs.mode }}"
          echo " debug:     ${{ needs.build_debug.result }}"
          echo " release:   ${{ needs.build_release.result }}"
          echo "=============================================="
          D="${{ needs.build_debug.result }}"
          R="${{ needs.build_release.result }}"
          for X in "$D" "$R"; do
            if [ "$X" = "failure" ]; then
              echo "::error::Falha crĂ­tica detectada. Ver artefatos de diagnĂłstico para anĂˇlise holĂ­stica."
              exit 1
            fi
          done
