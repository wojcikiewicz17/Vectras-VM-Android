name: copilot-setup-steps

on:
  workflow_call:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shell toolchain availability
        shell: bash
        run: |
          set -euo pipefail
          command -v bash
          command -v git
          command -v python3
          command -v cmake
