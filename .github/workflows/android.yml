name: android-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
  push:
    branches: [main, master, dev, 'release/**']
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      run_workfile:
        description: "Perfil de execução Gradle"
        type: choice
        default: unit_loader
        options:
          - smoke_debug
          - unit_loader
          - full_debug
          - compat_matrix_debug
          - release_gate
      build_variant:
        description: "Variante Android"
        type: choice
        default: debug
        options: [debug, release, both]
      signing_mode:
        description: "Assinatura release (não enfraquece trilha oficial)"
        type: choice
        default: auto
        options: [auto, signed, unsigned]
      abi_profile:
        description: "Perfil ABI (trilha oficial)"
        type: choice
        default: official_arm64
        options: [official_arm64, internal_arm32_arm64, internal_4abi]
      native_matrix_profile:
        description: "Cobertura nativa CMake (arquiteturas + bandas de API)"
        type: choice
        default: canonical
        options: [canonical, pilot_android9_16_5arch, android8_16plus_allarch]
      log_level:
        description: "Nível de logs Gradle"
        type: choice
        default: info
        options: [lifecycle, info, debug]
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true
      run_native_checks:
        description: "Executar verificações nativas"
        type: boolean
        default: true
  workflow_call:
    inputs:
      run_workfile:
        required: false
        type: string
        default: unit_loader
      build_variant:
        required: false
        type: string
        default: debug
      signing_mode:
        required: false
        type: string
        default: auto
      abi_profile:
        required: false
        type: string
        default: official_arm64
      native_matrix_profile:
        required: false
        type: string
        default: canonical
      log_level:
        required: false
        type: string
        default: info
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_checks:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      run_debug: ${{ steps.flags.outputs.run_debug }}
      run_release: ${{ steps.flags.outputs.run_release }}
      artifact_variants: ${{ steps.flags.outputs.artifact_variants }}
      expect_app_artifacts: ${{ steps.flags.outputs.expect_app_artifacts }}
      gradle_tasks: ${{ steps.flags.outputs.gradle_tasks }}
      gradle_log_flags: ${{ steps.flags.outputs.gradle_log_flags }}
      log_bundle_name: ${{ steps.flags.outputs.log_bundle_name }}
      app_abi_policy: ${{ steps.flags.outputs.app_abi_policy }}
      supported_abis: ${{ steps.flags.outputs.supported_abis }}
      effective_min_api: ${{ steps.flags.outputs.effective_min_api }}
      ci_internal_validation: ${{ steps.flags.outputs.ci_internal_validation }}
      artifact_name_suffix: ${{ steps.flags.outputs.artifact_name_suffix }}
      ci_release_gradle_arg: ${{ steps.flags.outputs.ci_release_gradle_arg }}
      signing_required: ${{ steps.flags.outputs.signing_required }}
      signing_mode_effective: ${{ steps.flags.outputs.signing_mode_effective }}
      native_matrix_profile: ${{ steps.flags.outputs.native_matrix_profile }}
      native_matrix_specs: ${{ steps.flags.outputs.native_matrix_specs }}
      gradle_extra_args: ${{ steps.flags.outputs.gradle_extra_args }}
    steps:
      - uses: actions/checkout@v4

      - id: canonical
        name: Read canonical API bands from gradle.properties
        shell: bash
        run: |
          set -euo pipefail
          read_prop() {
            local key="$1"
            awk -F= -v key="${key}" '
            /^[[:space:]]*#/ { next }
            $1 ~ /^[[:space:]]*[^#[:space:]].*/ {
              k=$1
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
              if (k == key) {
                sub(/^[^=]*=/, "", $0)
                v=$0
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                print v
                exit
              }
            }
          ' gradle.properties
          }

          min_api="$(read_prop "min.api")"
          compile_api="$(read_prop "compile.api")"

          if [[ -z "${min_api}" ]]; then
            echo "::error::Chave obrigatória ausente em gradle.properties: min.api" >&2
            exit 1
          fi

          if [[ -z "${compile_api}" ]]; then
            echo "::error::Chave obrigatória ausente em gradle.properties: compile.api" >&2
            exit 1
          fi

          echo "min_api=${min_api}" >> "$GITHUB_OUTPUT"
          echo "compile_api=${compile_api}" >> "$GITHUB_OUTPUT"

      - id: flags
        shell: bash
        run: |
          set -euo pipefail

          run_workfile="${{ inputs.run_workfile || 'unit_loader' }}"
          build_variant="${{ inputs.build_variant || 'debug' }}"
          signing_mode="${{ inputs.signing_mode || 'auto' }}"
          abi_profile="${{ inputs.abi_profile || 'official_arm64' }}"
          native_matrix_profile="${{ inputs.native_matrix_profile || 'canonical' }}"
          log_level="${{ inputs.log_level || 'info' }}"

          case "${build_variant}" in
            debug) run_debug=true; run_release=false ;;
            release) run_debug=false; run_release=true ;;
            both) run_debug=true; run_release=true ;;
            *) echo "build_variant inválido: ${build_variant}" >&2; exit 1 ;;
          esac

          case "${run_workfile}" in
            smoke_debug)
              tasks=":app:assembleDebug"
              expect_app_artifacts=true
              gradle_extra_args=""
              ;;
            unit_loader)
              tasks=":shell-loader:testDebugUnitTest"
              expect_app_artifacts=false
              gradle_extra_args=""
              ;;
            full_debug)
              tasks=":app:assembleDebug :app:testDebugUnitTest :terminal-emulator:testDebugUnitTest :shell-loader:testDebugUnitTest"
              expect_app_artifacts=true
              gradle_extra_args=""
              ;;
            compat_matrix_debug)
              tasks=":app:checkNativeExtendedMatrix :app:assembleDebug :app:testDebugUnitTest :terminal-emulator:testDebugUnitTest :shell-loader:testDebugUnitTest"
              expect_app_artifacts=true
              gradle_extra_args="-PENABLE_EXTENDED_ABI_MATRIX=true -PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true"
              ;;
            release_gate)
              tasks=":app:assembleRelease :app:testReleaseUnitTest :shell-loader:testReleaseUnitTest"
              expect_app_artifacts=true
              gradle_extra_args=""
              ;;
            *)
              echo "run_workfile inválido: ${run_workfile}" >&2
              exit 1
              ;;
          esac

          case "${log_level}" in
            lifecycle) log_flags="--console=plain" ;;
            info) log_flags="--console=plain --info" ;;
            debug) log_flags="--console=plain --debug --stacktrace" ;;
            *) echo "log_level inválido: ${log_level}" >&2; exit 1 ;;
          esac

          case "${abi_profile}" in
            official_arm64)
              app_abi_policy="arm64-only"
              supported_abis="arm64-v8a"
              effective_min_api="${{ steps.canonical.outputs.min_api }}"
              ci_internal_validation="false"
              artifact_name_suffix="arm64-only"
              ;;
            internal_arm32_arm64)
              app_abi_policy="arm32-arm64"
              supported_abis="arm64-v8a,armeabi-v7a"
              effective_min_api="${{ steps.canonical.outputs.min_api }}"
              ci_internal_validation="true"
              artifact_name_suffix="internal-arm32-arm64"
              ;;
            internal_4abi)
              app_abi_policy="internal-4abi"
              supported_abis="arm64-v8a,armeabi-v7a,x86,x86_64"
              effective_min_api="${{ steps.canonical.outputs.min_api }}"
              ci_internal_validation="true"
              artifact_name_suffix="internal-4abi"
              ;;
            *)
              echo "abi_profile inválido: ${abi_profile}. Valores suportados: official_arm64, internal_arm32_arm64, internal_4abi." >&2
              exit 1
              ;;
          esac

          case "${native_matrix_profile}" in
            canonical)
              native_matrix_specs="26:arm64-v8a"
              ;;
            pilot_android9_16_5arch)
              native_matrix_specs="28:armeabi-v7a arm64-v8a x86 x86_64;35:riscv64"
              ;;
            android8_16plus_allarch)
              native_matrix_specs="26:armeabi-v7a arm64-v8a x86 x86_64;28:armeabi-v7a arm64-v8a x86 x86_64;35:riscv64;${{ steps.canonical.outputs.compile_api }}:arm64-v8a x86_64 riscv64"
              ;;
            *)
              echo "native_matrix_profile inválido: ${native_matrix_profile}. Valores suportados: canonical, pilot_android9_16_5arch, android8_16plus_allarch." >&2
              exit 1
              ;;
          esac

          if [[ "${run_release}" == "true" && "${abi_profile}" != "official_arm64" ]]; then
            echo "release bloqueado para abi_profile=${abi_profile}. A trilha oficial de release aceita apenas official_arm64." >&2
            exit 1
          fi

          signing_required="false"
          signing_mode_effective="${signing_mode}"
          if [[ "${run_release}" == "true" ]]; then
            case "${signing_mode}" in
              signed)
                signing_required="true"
                ;;
              unsigned)
                signing_required="false"
                ;;
              auto)
                signing_required="true"
                signing_mode_effective="signed"
                ;;
              *)
                echo "signing_mode inválido: ${signing_mode}" >&2
                exit 1
                ;;
            esac
          fi

          artifact_variants=()
          if [[ "${run_debug}" == "true" ]]; then
            artifact_variants+=("debug")
          fi
          if [[ "${run_release}" == "true" ]]; then
            artifact_variants+=("release")
          fi

          echo "run_debug=${run_debug}" >> "$GITHUB_OUTPUT"
          echo "run_release=${run_release}" >> "$GITHUB_OUTPUT"
          echo "artifact_variants=$(IFS=,; echo "${artifact_variants[*]}")" >> "$GITHUB_OUTPUT"
          echo "expect_app_artifacts=${expect_app_artifacts}" >> "$GITHUB_OUTPUT"
          echo "gradle_tasks=${tasks}" >> "$GITHUB_OUTPUT"
          echo "gradle_log_flags=${log_flags}" >> "$GITHUB_OUTPUT"
          echo "log_bundle_name=android-logs-${run_workfile}-${log_level}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "app_abi_policy=${app_abi_policy}" >> "$GITHUB_OUTPUT"
          echo "supported_abis=${supported_abis}" >> "$GITHUB_OUTPUT"
          echo "effective_min_api=${effective_min_api}" >> "$GITHUB_OUTPUT"
          echo "ci_internal_validation=${ci_internal_validation}" >> "$GITHUB_OUTPUT"
          echo "artifact_name_suffix=${artifact_name_suffix}" >> "$GITHUB_OUTPUT"
          if [[ "${run_release}" == "true" && "${signing_required}" == "true" ]]; then
            echo "ci_release_gradle_arg=-PciRelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_release_gradle_arg=-PciRelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "signing_required=${signing_required}" >> "$GITHUB_OUTPUT"
          echo "signing_mode_effective=${signing_mode_effective}" >> "$GITHUB_OUTPUT"
          echo "native_matrix_profile=${native_matrix_profile}" >> "$GITHUB_OUTPUT"
          echo "native_matrix_specs=${native_matrix_specs}" >> "$GITHUB_OUTPUT"
          echo "gradle_extra_args=${gradle_extra_args}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - name: Resolve canonical build versions
        shell: bash
        run: |
          set -euo pipefail

          declare -A required_keys=(
            ["compile.api"]="COMPILE_API"
            ["target.api"]="TARGET_API"
            ["min.api"]="MIN_API"
            ["tools.version"]="TOOLS_VERSION"
            ["ndk.version"]="NDK_VERSION"
            ["cmake.version"]="CMAKE_VERSION"
            ["java.language.version"]="JAVA_VERSION"
          )

          extract_property() {
            local key="$1"
            awk -F= -v key="${key}" '
              /^[[:space:]]*#/ { next }
              $1 ~ /^[[:space:]]*[^#[:space:]].*/ {
                k=$1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
                if (k == key) {
                  sub(/^[^=]*=/, "", $0)
                  v=$0
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                  print v
                  exit
                }
              }
            ' gradle.properties
          }

          missing=()
          for key in "${!required_keys[@]}"; do
            value="$(extract_property "${key}")"
            if [[ -z "${value}" ]]; then
              missing+=("${key}")
              continue
            fi
            env_key="${required_keys[${key}]}"
            echo "${env_key}=${value}" >> "$GITHUB_ENV"
            echo "${env_key}=${value}"
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Contrato canônico violado: chaves obrigatórias ausentes em gradle.properties: ${missing[*]}" >&2
            exit 1
          fi

      - name: Validate Android pipeline directories
        run: ./tools/ci/validate_pipeline_directories.sh --profile android

      - name: Validate Java source contracts
        run: python3 ./tools/ci/check_java_contracts.py

      - name: Validate Android SDK/build path alignment
        run: ./tools/ci/validate_android_sdk_alignment.sh

      - name: Validate release signing secrets (distribution context)
        if: ${{ needs.resolve.outputs.run_release == 'true' && needs.resolve.outputs.signing_required == 'true' }}
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${VECTRAS_RELEASE_KEYSTORE_B64:-}" ]] || missing+=("VECTRAS_RELEASE_KEYSTORE_B64")
          [[ -n "${VECTRAS_RELEASE_STORE_PASSWORD:-}" ]] || missing+=("VECTRAS_RELEASE_STORE_PASSWORD")
          [[ -n "${VECTRAS_RELEASE_KEY_ALIAS:-}" ]] || missing+=("VECTRAS_RELEASE_KEY_ALIAS")
          [[ -n "${VECTRAS_RELEASE_KEY_PASSWORD:-}" ]] || missing+=("VECTRAS_RELEASE_KEY_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Release job requer assinatura oficial e segredos obrigatórios. Ausentes: ${missing[*]}" >&2
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager_license_rc=${PIPESTATUS[1]}
          set -o pipefail
          if [[ "${sdkmanager_license_rc}" -ne 0 ]]; then
            echo "sdkmanager --licenses failed with exit code ${sdkmanager_license_rc}" >&2
            exit "${sdkmanager_license_rc}"
          fi
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Prepare Android env
        run: ./tools/ci/prepare_android_env.sh --java-version "${{ env.JAVA_VERSION }}" --ndk-version "${{ env.NDK_VERSION }}" --require-sdkmanager

      - name: Enforce local.properties Android contract
        run: ./tools/ci/verify_android_local_properties_contract.sh

      - name: Validate Android toolchain contract
        run: ./tools/check_android_toolchain.sh --quick

      - name: Materialize Firebase config (internal)
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_firebase_config.sh --policy internal

      - name: Prepare release signing (distribution context)
        if: ${{ needs.resolve.outputs.run_release == 'true' && needs.resolve.outputs.signing_required == 'true' }}
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: ./tools/ci/prepare_release_signing.sh --mode signed

      - name: Enforce bootstrap contract
        run: ./tools/ci/verify_bootstrap_contract.sh

      - name: Lint (optional)
        if: ${{ inputs.run_lint != false }}
        run: ./tools/gradle_with_jdk21.sh --no-daemon :app:lintDebug

      - name: Native checks (optional)
        if: ${{ inputs.run_native_checks != false }}
        shell: bash
        run: |
          set -euo pipefail
          make print-build-config-env
          cmake -S . -B build-cmake \
            -DRMR_JNI_BUILD=1 \
            -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake --target verify_contracts -j"$(nproc)"
          ./tools/ci/assert_make_cmake_build_config.sh
          matrix_specs="${{ needs.resolve.outputs.native_matrix_specs }}"
          IFS=';' read -r -a matrix_entries <<< "${matrix_specs}"
          append_flag=""
          for entry in "${matrix_entries[@]}"; do
            [[ -n "${entry}" ]] || continue
            min_api="${entry%%:*}"
            abis="${entry#*:}"
            if [[ -z "${min_api}" || -z "${abis}" || "${min_api}" == "${entry}" ]]; then
              echo "native_matrix_specs inválido: '${entry}' (esperado '<min_api>:<abi-list>')." >&2
              exit 1
            fi
            echo "Executando matriz nativa: profile=${{ needs.resolve.outputs.native_matrix_profile }} min_api=${min_api} abis=${abis}"
            ./tools/ci/build_android_cmake_matrix.sh \
              --sdk "${ANDROID_SDK_ROOT}" \
              --ndk-version "${NDK_VERSION}" \
              --cmake-version "${CMAKE_VERSION}" \
              --min-api "${min_api}" \
              --abis "${abis}" \
              ${append_flag}
            append_flag="--append-artifacts"
          done

      - name: Execute selected Android workfile
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh --no-daemon \
            -PbuildStrict=true \
            -PAPP_ABI_POLICY=${{ needs.resolve.outputs.app_abi_policy }} \
            -PSUPPORTED_ABIS=${{ needs.resolve.outputs.supported_abis }} \
            -Pcompile.api=${COMPILE_API} \
            -Ptarget.api=${TARGET_API} \
            -Pmin.api=${{ needs.resolve.outputs.effective_min_api }} \
            -Ptools.version=${TOOLS_VERSION} \
            -Pndk.version=${NDK_VERSION} \
            -Pcmake.version=${CMAKE_VERSION} \
            -Pjava.language.version=${JAVA_VERSION} \
            -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
            ${{ needs.resolve.outputs.ci_release_gradle_arg }} \
            ${VECTRAS_CI_RELEASE_FLAGS:-} \
            ${VECTRAS_CI_SIGNING_ARGS:-} \
            ${{ needs.resolve.outputs.gradle_extra_args }} \
            ${{ needs.resolve.outputs.gradle_log_flags }} \
            ${{ needs.resolve.outputs.gradle_tasks }}

          if [[ "${{ needs.resolve.outputs.expect_app_artifacts }}" == "true" ]]; then
          ./tools/gradle_with_jdk21.sh --no-daemon \
              -PbuildStrict=true \
              -PAPP_ABI_POLICY=${{ needs.resolve.outputs.app_abi_policy }} \
              -PSUPPORTED_ABIS=${{ needs.resolve.outputs.supported_abis }} \
              -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
              ${{ needs.resolve.outputs.ci_release_gradle_arg }} \
              -PartifactVariants="${{ needs.resolve.outputs.artifact_variants }}" \
              ${{ needs.resolve.outputs.gradle_log_flags }} \
              :app:verifyDeliveredCompiledArtifacts
          fi

      - name: Validate expected artifacts
        if: ${{ always() && needs.resolve.outputs.expect_app_artifacts == 'true' }}
        run: ./tools/ci/validate_expected_android_artifacts.sh "${{ needs.resolve.outputs.artifact_variants }}"

      - name: Generate canonical build status snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts
          snapshot="ci-artifacts/CANONICAL_BUILD_STATUS.md"
          source_report="reports/CANONICAL_BUILD_STATUS.md"
          if [[ ! -f "${source_report}" ]]; then
            {
              echo "# Canonical build status source missing"
              echo
              echo "- generated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              echo "- reason: reports/CANONICAL_BUILD_STATUS.md não foi gerado; mantendo causa-raiz original do job."
            } > "${source_report}"
          fi
          {
            echo "# CI Snapshot — Canonical Build Status"
            echo
            echo "- generated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- run_attempt: ${GITHUB_RUN_ATTEMPT}"
            echo "- repository: ${GITHUB_REPOSITORY}"
            echo "- ref: ${GITHUB_REF}"
            echo "- commit_sha: ${GITHUB_SHA}"
            echo "- selected_tasks: ${{ needs.resolve.outputs.gradle_tasks }}"
            echo "- artifact_variants: ${{ needs.resolve.outputs.artifact_variants }}"
            echo "- ci_internal_validation: ${{ needs.resolve.outputs.ci_internal_validation }}"
            echo "- job_status: ${{ job.status }}"
            echo
            echo "---"
            echo
            cat "${source_report}"
          } > "${snapshot}"

      - name: Upload canonical build status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-build-status
          path: ci-artifacts/CANONICAL_BUILD_STATUS.md
          if-no-files-found: error
          overwrite: true

      - name: Materialize deterministic Android artifact manifests
        if: always()
        run: ./tools/ci/materialize_android_ci_artifacts.sh

      - name: Upload Android outputs
        if: ${{ always() && needs.resolve.outputs.expect_app_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-outputs-${{ needs.resolve.outputs.artifact_name_suffix }}-${{ github.run_id }}
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/reports/**
            **/build/test-results/**
          if-no-files-found: error
          overwrite: true

      - name: Upload Android CMake matrix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-cmake-matrix-${{ needs.resolve.outputs.artifact_name_suffix }}-${{ needs.resolve.outputs.signing_mode_effective }}-${{ github.run_id }}
          path: |
            ci-artifacts/android-cmake-matrix
            ci-artifacts/android-cmake-matrix/ARTIFACT_MANIFEST.md
          if-no-files-found: error
          overwrite: true

      - name: Upload Android logs bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve.outputs.log_bundle_name }}
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/build/test-results/**
            ci-artifacts/android-logs/ARTIFACT_MANIFEST.md
          if-no-files-found: error
