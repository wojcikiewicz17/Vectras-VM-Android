name: Android CI

on:
  push:
    branches: [main, master, dev, release/**]
    paths:
      - 'app/**'
      - 'app/src/main/cpp/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'local.properties.example'
      - 'engine/**'
      - 'tools/check_android_toolchain.sh'
      - 'docs/OPERATIONS.md'
      - 'docs/BUILD_ENV_ALIGNMENT.md'
      - 'docs/DOCUMENTATION_STANDARDS.md'
      - 'README.md'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'app/src/main/cpp/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'local.properties.example'
      - 'engine/**'
      - 'tools/check_android_toolchain.sh'
      - 'docs/OPERATIONS.md'
      - 'docs/BUILD_ENV_ALIGNMENT.md'
      - 'docs/DOCUMENTATION_STANDARDS.md'
      - 'README.md'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      build_selection:
        description: 'Selecionar artefatos para compilar: debug, release ou ambos'
        required: false
        type: choice
        default: both
        options:
          - debug
          - release
          - both
      build_debug:
        description: 'Build debug APK (assembleDebug)'
        required: false
        type: boolean
        default: true
      build_release:
        description: 'Build release APK (assembleRelease)'
        required: false
        type: boolean
        default: true
      sign_release:
        description: 'Sign release APK with CI keystore secrets (requires build_release=true)'
        required: false
        type: boolean
        default: false
      upload_telegram:
        description: 'Send Telegram notifications and upload release artifacts to Telegram'
        required: false
        type: boolean
        default: false
      compile_api:
        description: 'Android compileSdk/targetSdk API level (e.g. 35)'
        required: false
        type: string
        default: '35'
      tools_version:
        description: 'Android Build Tools version (e.g. 35.0.0)'
        required: false
        type: string
        default: '35.0.0'
      ndk_version:
        description: 'Android NDK version (e.g. 27.2.12479018)'
        required: false
        type: string
        default: '27.2.12479018'
      cmake_version:
        description: 'CMake version from SDK manager (e.g. 3.22.1)'
        required: false
        type: string
        default: '3.22.1'
      java_version:
        description: 'Java version used by setup-java and Gradle toolchain property'
        required: false
        type: string
        default: '17'
      diagnostic_mode:
        description: 'Modo de execução/diagnóstico (11 níveis)'
        required: false
        type: choice
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - diagnostico
          - compatibilidade
          - interoperabilidade
          - confiabilidade
          - release_hardening
          - forense
          - maximo
      allow_unsigned_release:
        description: 'Permitir fallback para release unsigned (evita assinatura não intencional)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  COMPILE_API: '35'
  TARGET_API: '35'
  RELEASE_MIN_TARGET_API: '35'
  TOOLS_VERSION: '35.0.0'
  CMAKE_VERSION: '3.22.1'
  NDK_VERSION: '27.2.12479018'
  GRADLE_ARGS: >-
    -PCOMPILE_API=35 -PTARGET_API=35 -PRELEASE_MIN_TARGET_API=35
    -PTOOLS_VERSION=35.0.0 -PJAVA_LANGUAGE_VERSION=17
    -PCMAKE_VERSION=3.22.1 -PNDK_VERSION=27.2.12479018

jobs:
  preflight:
    name: '01 • Preflight Checks'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      has_signing_secrets: ${{ steps.release_mode.outputs.has_signing_secrets }}
      has_telegram_secrets: ${{ steps.release_mode.outputs.has_telegram_secrets }}
      selected_build_debug: ${{ steps.dispatch_controls.outputs.selected_build_debug }}
      selected_build_release: ${{ steps.dispatch_controls.outputs.selected_build_release }}
      diagnostic_mode: ${{ steps.dispatch_controls.outputs.diagnostic_mode }}
      deep_diagnostics: ${{ steps.dispatch_controls.outputs.deep_diagnostics }}

    steps:
      - uses: actions/checkout@v4

      - name: Block sensitive artifacts in repository (warn only)
        continue-on-error: true
        run: bash tools/security/block_sensitive_artifacts.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK state
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-${{ env.COMPILE_API }}-${{ env.TOOLS_VERSION }}-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}
          restore-keys: |
            android-sdk-${{ runner.os }}-${{ env.COMPILE_API }}-${{ env.TOOLS_VERSION }}-
            android-sdk-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          licenses_input_file="$(mktemp)"
          trap 'rm -f "${licenses_input_file}"' EXIT
          for _ in $(seq 1 200); do
            echo 'y'
          done > "${licenses_input_file}"

          sdkmanager --licenses < "${licenses_input_file}" > /dev/null
          echo "Android SDK licenses accepted"

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            'platform-tools' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'platforms;android-34' \
            'build-tools;34.0.0' \
            'ndk;27.2.12479018' \
            'cmake;3.22.1'

      - name: Generate local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Materialize Firebase config (optional fallback for debug/tests)
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_google_services_placeholder.sh

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Print Java and Gradle runtime versions
        run: |
          java -version
          ./gradlew --version

      - name: Detect release signing mode
        id: release_mode
        run: |
          if [[ -n "${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}" \
            && -n "${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}" \
            && -n "${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}" \
            && -n "${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}" ]]; then
            echo "has_signing_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing_secrets=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            && ( -n "${{ secrets.TELEGRAM_CHAT_ID }}" || -n "${{ secrets.TELEGRAM_CHAT_ID_VEC }}" ) ]]; then
            echo "has_telegram_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_telegram_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve dispatch controls and diagnostic profile
        id: dispatch_controls
        shell: bash
        run: |
          set -euo pipefail

          selected_build_debug='true'
          selected_build_release='true'
          diagnostic_mode='moderado'

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            build_selection='${{ github.event.inputs.build_selection }}'
            build_debug_input='${{ github.event.inputs.build_debug }}'
            build_release_input='${{ github.event.inputs.build_release }}'

            case "${build_selection}" in
              debug) selected_build_release='false' ;;
              release) selected_build_debug='false' ;;
            esac

            if [[ "${build_debug_input}" != 'true' ]]; then
              selected_build_debug='false'
            fi

            if [[ "${build_release_input}" != 'true' ]]; then
              selected_build_release='false'
            fi

            diagnostic_mode='${{ github.event.inputs.diagnostic_mode }}'
          fi

          deep_diagnostics='false'
          case "${diagnostic_mode}" in
            profundo|ultra_minucioso|diagnostico|compatibilidade|interoperabilidade|confiabilidade|release_hardening|forense|maximo)
              deep_diagnostics='true'
              ;;
          esac

          echo "selected_build_debug=${selected_build_debug}" >> "$GITHUB_OUTPUT"
          echo "selected_build_release=${selected_build_release}" >> "$GITHUB_OUTPUT"
          echo "diagnostic_mode=${diagnostic_mode}" >> "$GITHUB_OUTPUT"
          echo "deep_diagnostics=${deep_diagnostics}" >> "$GITHUB_OUTPUT"

          echo "Resolved profile => build_debug=${selected_build_debug}, build_release=${selected_build_release}, diagnostic_mode=${diagnostic_mode}, deep_diagnostics=${deep_diagnostics}"

      - name: Validate release version metadata consistency
        run: |
          set -euo pipefail
          changelog_version="$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | grep -v '^Unreleased$' | head -n1)"
          gradle_version="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle | head -n1)"

          if [[ -z "${changelog_version}" || -z "${gradle_version}" ]]; then
            echo "Unable to extract version from CHANGELOG.md or app/build.gradle" >&2
            exit 1
          fi

          echo "CHANGELOG version: ${changelog_version}"
          echo "Gradle versionName: ${gradle_version}"

          if [[ "${changelog_version}" != "${gradle_version}" ]]; then
            echo "Version mismatch: CHANGELOG.md (${changelog_version}) != app/build.gradle (${gradle_version})" >&2
            exit 1
          fi

      - name: Enforce release target API baseline
        run: ./tools/check_target_api_baseline.sh gradle.properties

      - name: Validate local markdown links (optional)
        continue-on-error: true
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          md_files = [Path('README.md'), *Path('docs').rglob('*.md')]
          link_pattern = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          failures = []

          for md_file in md_files:
            content = md_file.read_text(encoding='utf-8')
            for raw_target in link_pattern.findall(content):
              target = raw_target.strip()
              if not target or target.startswith(('http://', 'https://', 'mailto:', '#')):
                continue
              target = target.split('#', 1)[0]
              if not target:
                continue
              if target.startswith('/'):
                resolved = Path(target.lstrip('/'))
              else:
                resolved = (md_file.parent / target).resolve().relative_to(Path.cwd().resolve())
              if not Path(resolved).exists():
                failures.append(f"{md_file}: missing -> {raw_target}")

          if failures:
            print('Local markdown link validation failures:')
            for failure in failures:
              print(f' - {failure}')
            raise SystemExit(1)

          print(f'Validated local markdown links in {len(md_files)} files.')
          PY

  test_and_verify:
    name: '02 • Test and Verify'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK state
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-${{ env.COMPILE_API }}-${{ env.TOOLS_VERSION }}-${{ env.NDK_VERSION }}-${{ env.CMAKE_VERSION }}
          restore-keys: |
            android-sdk-${{ runner.os }}-${{ env.COMPILE_API }}-${{ env.TOOLS_VERSION }}-
            android-sdk-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          licenses_input_file="$(mktemp)"
          trap 'rm -f "${licenses_input_file}"' EXIT
          for _ in $(seq 1 200); do
            echo 'y'
          done > "${licenses_input_file}"

          sdkmanager --licenses < "${licenses_input_file}" > /dev/null
          echo "Android SDK licenses accepted"

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            'platform-tools' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'platforms;android-34' \
            'build-tools;34.0.0' \
            'ndk;27.2.12479018' \
            'cmake;3.22.1'

      - name: Generate local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ProotCommandBuilder unit tests
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace --info --tests com.vectras.vm.core.ProotCommandBuilderTest ${{ env.GRADLE_ARGS }}

      - name: Upload ProotCommandBuilder unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-test_and_verify
          path: |
            app/build/reports/tests/**
            app/build/test-results/**
          if-no-files-found: ignore

      - name: Upload ProotCommandBuilder failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs-test_and_verify
          path: ./**/*.log
          if-no-files-found: ignore

      - name: Verify repository file dependencies
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew verifyRepoFileDependencies ${{ env.GRADLE_ARGS }}

      - name: Verify bootstrap assets and non-Markdown inventory
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew verifyBootstrapAssets auditNonMdInventory ${{ env.GRADLE_ARGS }}

      - name: Native ABI matrix gate
        if: ${{ needs.preflight.outputs.diagnostic_mode != 'fast' }}
        run: ./gradlew checkNativeAllMatrix ${{ env.GRADLE_ARGS }}

      - name: Deep diagnostics bundle
        if: ${{ needs.preflight.outputs.deep_diagnostics == 'true' }}
        continue-on-error: true
        run: |
          mkdir -p diagnostics
          ./gradlew tasks --all > diagnostics/gradle-tasks.txt
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath > diagnostics/debug-dependencies.txt
          ./gradlew :app:androidDependencies > diagnostics/android-dependencies.txt

      - name: Upload diagnostics bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-diagnostics-test_and_verify
          path: |
            diagnostics/**
            app/build/reports/**
            app/build/test-results/**
          if-no-files-found: warn

  build_debug:
    name: '03 • Build Debug APK'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - test_and_verify
      - preflight
    environment: BuildAPK
    env:
      COMPILE_API: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.compile_api || vars.COMPILE_API || '35' }}
      TARGET_API: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.compile_api || vars.TARGET_API || '35' }}
      RELEASE_MIN_TARGET_API: ${{ vars.RELEASE_MIN_TARGET_API || '35' }}
      TOOLS_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tools_version || vars.TOOLS_VERSION || '35.0.0' }}
      NDK_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ndk_version || vars.NDK_VERSION || '27.2.12479018' }}
      CMAKE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cmake_version || vars.CMAKE_VERSION || '3.22.1' }}
      JAVA_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.java_version || vars.JAVA_VERSION || '17' }}
      GRADLE_ARGS: >-
        -PCOMPILE_API=${COMPILE_API} -PTARGET_API=${TARGET_API} -PRELEASE_MIN_TARGET_API=${RELEASE_MIN_TARGET_API}
        -PTOOLS_VERSION=${TOOLS_VERSION} -PJAVA_LANGUAGE_VERSION=${JAVA_VERSION}
        -PCMAKE_VERSION=${CMAKE_VERSION} -PNDK_VERSION=${NDK_VERSION}

    steps:
    - uses: actions/checkout@v4

    - name: Print selected inputs
      run: |
        echo "event_name=${GITHUB_EVENT_NAME}"
        echo "build_debug=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_debug || 'true' }}"
        echo "build_release=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_release || 'true' }}"
        echo "sign_release=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sign_release || 'false' }}"
        echo "upload_telegram=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_telegram || 'false' }}"
        echo "compile_api=${COMPILE_API}"
        echo "tools_version=${TOOLS_VERSION}"
        echo "ndk_version=${NDK_VERSION}"
        echo "cmake_version=${CMAKE_VERSION}"
        echo "java_version=${JAVA_VERSION}"

    - name: Block sensitive artifacts in repository (warn only)
      continue-on-error: true
      run: bash tools/security/block_sensitive_artifacts.sh

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: false

    - name: Accept Android SDK licenses (non-interactive)
      run: |
        licenses_input_file="$(mktemp)"
        trap 'rm -f "${licenses_input_file}"' EXIT
        for _ in $(seq 1 200); do
          echo 'y'
        done > "${licenses_input_file}"

        sdkmanager --licenses < "${licenses_input_file}" > /dev/null
        echo "Android SDK licenses accepted"

    - name: Install Android SDK packages
      run: |
        sdkmanager --install \
          'platform-tools' \
          'platforms;android-${{ env.COMPILE_API }}' \
          'build-tools;${{ env.TOOLS_VERSION }}' \
          'platforms;android-34' \
          'build-tools;34.0.0' \
          'ndk;${{ env.NDK_VERSION }}' \
          'cmake;${{ env.CMAKE_VERSION }}'

    - name: Generate local.properties
      run: |
        echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

    - name: Materialize Firebase config (optional fallback for debug/tests)
      env:
        VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
      run: ./tools/ci/materialize_google_services_placeholder.sh

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Print Java and Gradle runtime versions
      run: |
        java -version
        ./gradlew --version

    - name: Run ProotCommandBuilder unit tests
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew :app:testDebugUnitTest --tests com.vectras.vm.core.ProotCommandBuilderTest ${{ env.GRADLE_ARGS }}

    - name: Verify repository file dependencies
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew verifyRepoFileDependencies ${{ env.GRADLE_ARGS }}

    - name: Validate release version metadata consistency
      run: |
        set -euo pipefail
        changelog_version="$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | grep -v '^Unreleased$' | head -n1)"
        gradle_version="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle | head -n1)"

        if [[ -z "${changelog_version}" || -z "${gradle_version}" ]]; then
          echo "Unable to extract version from CHANGELOG.md or app/build.gradle" >&2
          exit 1
        fi

        echo "CHANGELOG version: ${changelog_version}"
        echo "Gradle versionName: ${gradle_version}"

        if [[ "${changelog_version}" != "${gradle_version}" ]]; then
          echo "Version mismatch: CHANGELOG.md (${changelog_version}) != app/build.gradle (${gradle_version})" >&2
          exit 1
        fi

    - name: Enforce release target API baseline
      run: ./tools/check_target_api_baseline.sh gradle.properties

    - name: Validate local markdown links (optional)
      continue-on-error: true
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import re

        md_files = [Path('README.md'), *Path('docs').rglob('*.md')]
        link_pattern = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
        failures = []

        for md_file in md_files:
          content = md_file.read_text(encoding='utf-8')
          for raw_target in link_pattern.findall(content):
            target = raw_target.strip()
            if not target or target.startswith(('http://', 'https://', 'mailto:', '#')):
              continue
            target = target.split('#', 1)[0]
            if not target:
              continue
            if target.startswith('/'):
              resolved = Path(target.lstrip('/'))
            else:
              resolved = (md_file.parent / target).resolve().relative_to(Path.cwd().resolve())
            if not Path(resolved).exists():
              failures.append(f"{md_file}: missing -> {raw_target}")

        if failures:
          print('Local markdown link validation failures:')
          for failure in failures:
            print(f' - {failure}')
          raise SystemExit(1)

        print(f'Validated local markdown links in {len(md_files)} files.')
        PY

    - name: Build Debug APK
      if: ${{ needs.preflight.outputs.selected_build_debug == 'true' }}
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew assembleDebug -PCOMPILE_API=${COMPILE_API} -PTOOLS_VERSION=${TOOLS_VERSION} -PJAVA_LANGUAGE_VERSION=${JAVA_VERSION} -PCMAKE_VERSION=${CMAKE_VERSION} -PNDK_VERSION=${NDK_VERSION}

    - name: Validate native binaries are arm64-v8a
      if: ${{ needs.preflight.outputs.selected_build_debug == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        NDK_ROOT="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
        READELF="${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
        if [[ ! -x "${READELF}" ]]; then
          READELF="$(command -v readelf || true)"
        fi
        if [[ -z "${READELF}" ]]; then
          echo "No readelf implementation found for ELF validation." >&2
          exit 1
        fi

        mapfile -t native_libs < <(find app/build -type f -path '*/obj/arm64-v8a/*.so' | sort)
        if [[ ${#native_libs[@]} -eq 0 ]]; then
          echo "No arm64-v8a native binaries found under app/build/**/obj/arm64-v8a/*.so" >&2
          exit 1
        fi

        for lib in "${native_libs[@]}"; do
          echo "Validating ELF machine for ${lib}"
          "${READELF}" -h "${lib}" | tee /tmp/elf_header.txt
          grep -q 'Machine:.*AArch64' /tmp/elf_header.txt || {
            echo "Unexpected ELF machine for ${lib}; expected AArch64." >&2
            exit 1
          }
        done

        if find app/build -type f -path '*/obj/*/*.so' | grep -qv '/obj/arm64-v8a/'; then
          echo "Unexpected non-arm64 native output detected in obj directory." >&2
          find app/build -type f -path '*/obj/*/*.so' | grep -v '/obj/arm64-v8a/' >&2
          exit 1
        fi


    - name: Materialize Firebase config for release
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' && secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 != '' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > app/google-services.json
        echo "Firebase config loaded from VECTRAS_GOOGLE_SERVICES_JSON_B64 for release build"

    - name: Materialize placeholder Firebase config for unsigned internal validation
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' && secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 == '' && !((github.event_name == 'workflow_dispatch' && github.event.inputs.sign_release == 'true') || needs.preflight.outputs.has_signing_secrets == 'true') }}
      shell: bash
      run: |
        set -euo pipefail
        cat > app/google-services.json <<'JSON'
        {
          "project_info": {
            "project_number": "0",
            "project_id": "placeholder-internal-validation",
            "storage_bucket": "placeholder-internal-validation.appspot.com"
          },
          "client": [],
          "configuration_version": "1"
        }
        JSON
        echo "VECTRAS_GOOGLE_SERVICES_JSON_B64 is not configured."
        echo "Using placeholder google-services.json for unsigned internal validation path."

    - name: Validate Firebase release config
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' }}
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: |
        EXTRA_VALIDATE_FLAGS=""
        if [[ -z "${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}" && !(("${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.sign_release }}" == "true") || "${{ needs.preflight.outputs.has_signing_secrets }}" == "true") ]]; then
          EXTRA_VALIDATE_FLAGS="-PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true"
        fi
        ./gradlew :app:validateFirebaseReleaseConfig ${{ env.GRADLE_ARGS }} ${EXTRA_VALIDATE_FLAGS}

    - name: Build Release APK (unsigned fallback)
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' && !((github.event_name == 'workflow_dispatch' && github.event.inputs.sign_release == 'true') || needs.preflight.outputs.has_signing_secrets == 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.allow_unsigned_release == 'true') }}
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew assembleRelease -PCOMPILE_API=${COMPILE_API} -PTOOLS_VERSION=${TOOLS_VERSION} -PJAVA_LANGUAGE_VERSION=${JAVA_VERSION} -PCMAKE_VERSION=${CMAKE_VERSION} -PNDK_VERSION=${NDK_VERSION} -PALLOW_UNSIGNED_RELEASE=true -PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true

    - name: Build Release APK (signed via CI secrets)
      if: ${{ github.event_name != 'pull_request' && needs.preflight.outputs.selected_build_release == 'true' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.sign_release == 'true') || needs.preflight.outputs.has_signing_secrets == 'true') }}
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        VECTRAS_RELEASE_STORE_FILE: ${{ runner.temp }}/vectras-release.jks
        VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
        VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
        VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
      run: |
        echo "${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}" | base64 --decode > "$VECTRAS_RELEASE_STORE_FILE"
        ./gradlew assembleRelease \
          -PCOMPILE_API=${COMPILE_API} -PTOOLS_VERSION=${TOOLS_VERSION} -PJAVA_LANGUAGE_VERSION=${JAVA_VERSION} -PCMAKE_VERSION=${CMAKE_VERSION} -PNDK_VERSION=${NDK_VERSION} \
          -Pandroid.injected.signing.store.file="$VECTRAS_RELEASE_STORE_FILE" \
          -Pandroid.injected.signing.store.password="$VECTRAS_RELEASE_STORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$VECTRAS_RELEASE_KEY_ALIAS" \
          -Pandroid.injected.signing.key.password="$VECTRAS_RELEASE_KEY_PASSWORD"

    - name: Resolve release artifact path
      id: release_artifact
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        signed_apk="app/build/outputs/apk/release/app-release.apk"
        unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"

        if [[ -f "${signed_apk}" ]]; then
          echo "path=${signed_apk}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ -f "${unsigned_apk}" ]]; then
          echo "path=${unsigned_apk}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No release APK found after release build" >&2
        exit 1

    - name: Upload Debug APK as artifact
      if: ${{ needs.preflight.outputs.selected_build_debug == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK as artifact
      if: ${{ needs.preflight.outputs.selected_build_release == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: ${{ steps.release_artifact.outputs.path }}

    - name: Stage Release APKs for Telegram upload
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_telegram == 'true' && needs.preflight.outputs.selected_build_release == 'true' && needs.preflight.outputs.has_telegram_secrets == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob
        mkdir -p artifacts/release
        release_apks=(app/build/outputs/apk/release/*.apk)
        if [[ ${#release_apks[@]} -eq 0 ]]; then
          echo "No APK files found under app/build/outputs/apk/release for Telegram staging." >&2
          exit 1
        fi
        cp app/build/outputs/apk/release/*.apk artifacts/release/

    - name: Upload to Telegram
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_telegram == 'true' && needs.preflight.outputs.selected_build_release == 'true' && needs.preflight.outputs.has_telegram_secrets == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" || ( -z "${{ secrets.TELEGRAM_CHAT_ID }}" && -z "${{ secrets.TELEGRAM_CHAT_ID_VEC }}" ) ]]; then
          echo "Telegram secrets/chat IDs are not configured; skipping Telegram upload gracefully."
          exit 0
        fi

        shopt -s nullglob
        release_apks=(artifacts/release/*.apk)
        if [[ ${#release_apks[@]} -eq 0 ]]; then
          echo "Upload requested but no staged release APK found in artifacts/release/*.apk." >&2
          exit 1
        fi

        caption="Done! Note that this is a version that is automatically built when there are changes in the GitHub repository, not the official version. Please only install it if you really want to see what is new.\nExplore beta releases here: https://github.com/AnBui2004/Vectras-VM-Emu-Android/releases\nRun ID: ${GITHUB_RUN_ID}"

        for file in "${release_apks[@]}"; do
          if [[ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]]; then
            curl --fail --silent --show-error --retry 3 --retry-all-errors -o /dev/null \
              -F "document=@${file}" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "message_thread_id=8" \
              -F "caption=${caption}" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
          fi

          if [[ -n "${{ secrets.TELEGRAM_CHAT_ID_VEC }}" ]]; then
            curl --fail --silent --show-error --retry 3 --retry-all-errors -o /dev/null \
              -F "document=@${file}" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID_VEC }}" \
              -F "caption=${caption}" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
          fi
        done
