name: android-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
  push:
    branches: [main, master, dev, 'release/**']
    paths:
      - 'app/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      run_workfile:
        description: "Perfil de execução Gradle"
        type: choice
        default: unit_loader
        options:
          - smoke_debug
          - unit_loader
          - full_debug
          - release_gate
      build_variant:
        description: "Variante Android"
        type: choice
        default: debug
        options: [debug, release, both]
      signing_mode:
        description: "Assinatura release (não enfraquece trilha oficial)"
        type: choice
        default: auto
        options: [auto, signed, unsigned]
      abi_profile:
        description: "Perfil ABI (oficial arm64 ou validação interna multi-ABI)"
        type: choice
        default: official_arm64
        options: [official_arm64, internal_5abi]
      log_level:
        description: "Nível de logs Gradle"
        type: choice
        default: info
        options: [lifecycle, info, debug]
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true
      run_native_checks:
        description: "Executar verificações nativas"
        type: boolean
        default: true
  workflow_call:
    inputs:
      run_workfile:
        required: false
        type: string
        default: unit_loader
      build_variant:
        required: false
        type: string
        default: debug
      signing_mode:
        required: false
        type: string
        default: auto
      abi_profile:
        required: false
        type: string
        default: official_arm64
      log_level:
        required: false
        type: string
        default: info
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_checks:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JAVA_VERSION: '17'
  COMPILE_API: '35'
  TARGET_API: '35'
  MIN_API: '23'
  TOOLS_VERSION: '35.0.0'
  NDK_VERSION: '27.2.12479018'
  CMAKE_VERSION: '3.22.1'
  SUPPORTED_ABIS: 'arm64-v8a'

concurrency:
  group: android-ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      run_debug: ${{ steps.flags.outputs.run_debug }}
      run_release: ${{ steps.flags.outputs.run_release }}
      artifact_variants: ${{ steps.flags.outputs.artifact_variants }}
      expect_app_artifacts: ${{ steps.flags.outputs.expect_app_artifacts }}
      gradle_tasks: ${{ steps.flags.outputs.gradle_tasks }}
      gradle_log_flags: ${{ steps.flags.outputs.gradle_log_flags }}
      should_sign_release: ${{ steps.flags.outputs.should_sign_release }}
      log_bundle_name: ${{ steps.flags.outputs.log_bundle_name }}
      app_abi_policy: ${{ steps.flags.outputs.app_abi_policy }}
      supported_abis: ${{ steps.flags.outputs.supported_abis }}
      effective_min_api: ${{ steps.flags.outputs.effective_min_api }}
      ci_internal_validation: ${{ steps.flags.outputs.ci_internal_validation }}
      artifact_name_suffix: ${{ steps.flags.outputs.artifact_name_suffix }}
    steps:
      - id: flags
        shell: bash
        run: |
          set -euo pipefail

          run_workfile="${{ inputs.run_workfile || 'unit_loader' }}"
          build_variant="${{ inputs.build_variant || 'debug' }}"
          signing_mode="${{ inputs.signing_mode || 'auto' }}"
          abi_profile="${{ inputs.abi_profile || 'official_arm64' }}"
          log_level="${{ inputs.log_level || 'info' }}"

          case "${build_variant}" in
            debug) run_debug=true; run_release=false ;;
            release) run_debug=false; run_release=true ;;
            both) run_debug=true; run_release=true ;;
            *) echo "build_variant inválido: ${build_variant}" >&2; exit 1 ;;
          esac

          case "${run_workfile}" in
            smoke_debug)
              tasks=":app:assembleDebug"
              expect_app_artifacts=true
              ;;
            unit_loader)
              tasks=":shell-loader:testDebugUnitTest"
              expect_app_artifacts=false
              ;;
            full_debug)
              tasks=":app:assembleDebug :app:testDebugUnitTest :terminal-emulator:testDebugUnitTest :shell-loader:testDebugUnitTest"
              expect_app_artifacts=true
              ;;
            release_gate)
              tasks=":app:assembleRelease :app:testReleaseUnitTest :shell-loader:testReleaseUnitTest"
              expect_app_artifacts=true
              ;;
            *)
              echo "run_workfile inválido: ${run_workfile}" >&2
              exit 1
              ;;
          esac

          case "${log_level}" in
            lifecycle) log_flags="--console=plain" ;;
            info) log_flags="--console=plain --info" ;;
            debug) log_flags="--console=plain --debug --stacktrace" ;;
            *) echo "log_level inválido: ${log_level}" >&2; exit 1 ;;
          esac

          case "${abi_profile}" in
            official_arm64)
              app_abi_policy="arm64-only"
              supported_abis="arm64-v8a"
              effective_min_api="${MIN_API}"
              ci_internal_validation="false"
              artifact_name_suffix="arm64-only"
              ;;
            internal_5abi)
              app_abi_policy="internal-5abi"
              supported_abis="arm64-v8a,armeabi-v7a,x86,x86_64,riscv64"
              effective_min_api="${COMPILE_API}"
              ci_internal_validation="true"
              artifact_name_suffix="internal-5abi"
              if [[ "${signing_mode}" == "signed" ]]; then
                echo "abi_profile=internal_5abi não permite signing_mode=signed (uso interno apenas)." >&2
                exit 1
              fi
              ;;
            *)
              echo "abi_profile inválido: ${abi_profile}" >&2
              exit 1
              ;;
          esac

          should_sign_release=false
          if [[ "${run_release}" == "true" ]]; then
            if [[ "${signing_mode}" == "signed" && "${ci_internal_validation}" != "true" ]]; then
              should_sign_release=true
            elif [[ "${signing_mode}" == "auto" && -n "${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 || '' }}" && "${ci_internal_validation}" != "true" ]]; then
              should_sign_release=true
            fi
          fi

          artifact_variants=()
          if [[ "${run_debug}" == "true" ]]; then
            artifact_variants+=("debug")
          fi
          if [[ "${run_release}" == "true" ]]; then
            artifact_variants+=("release")
          fi

          echo "run_debug=${run_debug}" >> "$GITHUB_OUTPUT"
          echo "run_release=${run_release}" >> "$GITHUB_OUTPUT"
          echo "artifact_variants=$(IFS=,; echo "${artifact_variants[*]}")" >> "$GITHUB_OUTPUT"
          echo "expect_app_artifacts=${expect_app_artifacts}" >> "$GITHUB_OUTPUT"
          echo "gradle_tasks=${tasks}" >> "$GITHUB_OUTPUT"
          echo "gradle_log_flags=${log_flags}" >> "$GITHUB_OUTPUT"
          echo "should_sign_release=${should_sign_release}" >> "$GITHUB_OUTPUT"
          echo "log_bundle_name=android-logs-${run_workfile}-${log_level}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "app_abi_policy=${app_abi_policy}" >> "$GITHUB_OUTPUT"
          echo "supported_abis=${supported_abis}" >> "$GITHUB_OUTPUT"
          echo "effective_min_api=${effective_min_api}" >> "$GITHUB_OUTPUT"
          echo "ci_internal_validation=${ci_internal_validation}" >> "$GITHUB_OUTPUT"
          echo "artifact_name_suffix=${artifact_name_suffix}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager_license_rc=${PIPESTATUS[1]}
          set -o pipefail
          if [[ "${sdkmanager_license_rc}" -ne 0 ]]; then
            echo "sdkmanager --licenses failed with exit code ${sdkmanager_license_rc}" >&2
            exit "${sdkmanager_license_rc}"
          fi
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Prepare Android env
        run: ./tools/ci/prepare_android_env.sh --java-version "${{ env.JAVA_VERSION }}" --require-sdkmanager

      - name: Materialize Firebase config (internal)
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_firebase_config.sh --policy internal

      - name: Prepare release signing (only when selected)
        if: ${{ needs.resolve.outputs.run_release == 'true' }}
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: ./tools/ci/prepare_release_signing.sh --mode "${{ inputs.signing_mode || 'auto' }}" --allow-legacy-fallback

      - name: Enforce bootstrap contract
        run: ./tools/ci/verify_bootstrap_contract.sh

      - name: Lint (optional)
        if: ${{ inputs.run_lint != false }}
        run: ./tools/gradle_with_jdk21.sh --no-daemon :app:lintDebug

      - name: Native checks (optional)
        if: ${{ inputs.run_native_checks != false }}
        shell: bash
        run: |
          set -euo pipefail
          make print-build-config-env
          cmake -S . -B build-cmake \
            -DRMR_JNI_BUILD=1 \
            -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake --target verify_contracts -j"$(nproc)"
          ./tools/ci/assert_make_cmake_build_config.sh

      - name: Execute selected Android workfile
        shell: bash
        run: |
          set -euo pipefail
          ./tools/gradle_with_jdk21.sh --no-daemon \
            -PbuildStrict=true \
            -PAPP_ABI_POLICY=${{ needs.resolve.outputs.app_abi_policy }} \
            -PSUPPORTED_ABIS=${{ needs.resolve.outputs.supported_abis }} \
            -Pcompile.api=${COMPILE_API} \
            -Ptarget.api=${TARGET_API} \
            -Pmin.api=${{ needs.resolve.outputs.effective_min_api }} \
            -Ptools.version=${TOOLS_VERSION} \
            -Pndk.version=${NDK_VERSION} \
            -Pcmake.version=${CMAKE_VERSION} \
            -Pjava.language.version=${JAVA_VERSION} \
            -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
            ${VECTRAS_CI_RELEASE_FLAGS:-} \
            ${VECTRAS_CI_SIGNING_ARGS:-} \
            ${{ needs.resolve.outputs.gradle_log_flags }} \
            ${{ needs.resolve.outputs.gradle_tasks }}

          if [[ "${{ needs.resolve.outputs.expect_app_artifacts }}" == "true" ]]; then
          ./tools/gradle_with_jdk21.sh --no-daemon \
              -PbuildStrict=true \
              -PAPP_ABI_POLICY=${{ needs.resolve.outputs.app_abi_policy }} \
              -PSUPPORTED_ABIS=${{ needs.resolve.outputs.supported_abis }} \
              -PCI_INTERNAL_VALIDATION=${{ needs.resolve.outputs.ci_internal_validation }} \
              -PartifactVariants="${{ needs.resolve.outputs.artifact_variants }}" \
              ${{ needs.resolve.outputs.gradle_log_flags }} \
              :app:verifyDeliveredCompiledArtifacts
          fi

      - name: Validate expected artifacts
        if: ${{ always() && needs.resolve.outputs.expect_app_artifacts == 'true' }}
        run: ./tools/ci/validate_expected_android_artifacts.sh "${{ needs.resolve.outputs.artifact_variants }}"

      - name: Upload Android outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-outputs-${{ needs.resolve.outputs.artifact_name_suffix }}-${{ github.run_id }}
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn

      - name: Upload Android logs bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve.outputs.log_bundle_name }}
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/build/test-results/**
          if-no-files-found: warn
