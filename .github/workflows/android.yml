name: Android CI

on:
  push:
    paths:
      - 'app/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'local.properties.example'
      - 'docs/OPERATIONS.md'
      - 'docs/BUILD_ENV_ALIGNMENT.md'
      - 'docs/DOCUMENTATION_STANDARDS.md'
      - 'README.md'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'local.properties.example'
      - 'docs/OPERATIONS.md'
      - 'docs/BUILD_ENV_ALIGNMENT.md'
      - 'docs/DOCUMENTATION_STANDARDS.md'
      - 'README.md'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    environment: BuildAPK

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: |
        sdkmanager --install \
          'platform-tools' \
          'platforms;android-35' \
          'build-tools;35.0.0' \
          'platforms;android-34' \
          'build-tools;34.0.0' \
          'ndk;27.2.12479018' \
          'cmake;3.22.1'

    - name: Generate local.properties
      run: |
        echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify repository file dependencies
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew verifyRepoFileDependencies -PCOMPILE_API=35 -PTOOLS_VERSION=35.0.0 -PJAVA_LANGUAGE_VERSION=17 -PCMAKE_VERSION=3.22.1 -PNDK_VERSION=27.2.12479018

    - name: Validate local markdown links (optional)
      continue-on-error: true
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import re

        md_files = [Path('README.md'), *Path('docs').rglob('*.md')]
        link_pattern = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
        failures = []

        for md_file in md_files:
          content = md_file.read_text(encoding='utf-8')
          for raw_target in link_pattern.findall(content):
            target = raw_target.strip()
            if not target or target.startswith(('http://', 'https://', 'mailto:', '#')):
              continue
            target = target.split('#', 1)[0]
            if not target:
              continue
            if target.startswith('/'):
              resolved = Path(target.lstrip('/'))
            else:
              resolved = (md_file.parent / target).resolve().relative_to(Path.cwd().resolve())
            if not Path(resolved).exists():
              failures.append(f"{md_file}: missing -> {raw_target}")

        if failures:
          print('Local markdown link validation failures:')
          for failure in failures:
            print(f' - {failure}')
          raise SystemExit(1)

        print(f'Validated local markdown links in {len(md_files)} files.')
        PY

    - name: Send notification to Telegram
      run: |
        if [[ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]]; then
          for chat in \
            "-d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d message_thread_id=8" \
            "-d chat_id=${{ secrets.TELEGRAM_CHAT_ID_VEC }}"; do
            curl -s -o /dev/null -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                 $chat \
                 -d $'text=New update available on GitHub repository and building APK.\nPlease wait about 5 minutes.\nRun ID: '${GITHUB_RUN_ID}
          done
        fi

    - name: Build Debug APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew assembleDebug -PCOMPILE_API=35 -PTOOLS_VERSION=35.0.0 -PJAVA_LANGUAGE_VERSION=17 -PCMAKE_VERSION=3.22.1 -PNDK_VERSION=27.2.12479018

    - name: Build Release APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      run: ./gradlew assembleRelease -PCOMPILE_API=35 -PTOOLS_VERSION=35.0.0 -PJAVA_LANGUAGE_VERSION=17 -PCMAKE_VERSION=3.22.1 -PNDK_VERSION=27.2.12479018

    - name: Upload Debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload to Telegram 
      run: |
          if [[ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]]; then
            success=true

            for file in app/build/outputs/apk/release/*.apk; do
              echo "Uploading $(basename "$file")"
              tries=0
              success_file=false
              until [ $tries -ge 5 ]; do
                success_targets=false
                for target in \
                  "-F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -F message_thread_id=8" \
                  "-F chat_id=${{ secrets.TELEGRAM_CHAT_ID_VEC }}"; do

                  if curl -s -o /dev/null -F document=@"$file" $target \
                          -F $'caption=Done! Note that this is a version that is automatically built when there are changes in the GitHub repository, not the official version. Please only install it if you really want to see what is new.\nExplore beta releases here: https://github.com/AnBui2004/Vectras-VM-Emu-Android/releases\nRun ID: '${GITHUB_RUN_ID} \
                          https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument; then
                    success_targets=true
                  else
                    echo "Retrying upload for $file to target..."
                    sleep 2
                  fi
                done

                if $success_targets; then
                  success_file=true
                  break
                fi
                tries=$((tries+1))
              done

              if ! $success_file; then
                echo "Upload failed for $file"
                success=false
              fi
            done

            if [ "$success" = false ]; then
              for chat in \
                "-d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d message_thread_id=8" \
                "-d chat_id=${{ secrets.TELEGRAM_CHAT_ID_VEC }}"; do
                curl -s -o /dev/null -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                     $chat \
                    -d $'text=Something went wrong and the APK file could not be uploaded.\nExplore beta releases here: https://github.com/AnBui2004/Vectras-VM-Emu-Android/releases\nRun ID: '${GITHUB_RUN_ID}
              done
            fi
          fi
