name: android-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'tools/**'
      - '.github/actions/android-build-base/**'
      - 'docs/ci/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
      - '.github/workflows/android-ci.yml'
  push:
    branches: [main, master, dev, 'release/**']
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'tools/**'
      - '.github/actions/android-build-base/**'
      - 'docs/ci/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:
    inputs:
      run_workfile:
        description: "Perfil de execução Gradle"
        type: choice
        default: smoke_debug
        options:
          - smoke_debug
          - unit_loader
          - full_debug
          - compat_matrix_debug
          - release_gate
      build_variant:
        description: "Variante Android"
        type: choice
        default: debug
        options: [debug, release, both]
      signing_mode:
        description: "Assinatura release (não enfraquece trilha oficial)"
        type: choice
        default: auto
        options: [auto, signed, unsigned]
      abi_profile:
        description: "Perfil ABI (trilha oficial)"
        type: choice
        default: official_arm64
        options: [official_arm64, official_arm32_arm64, internal_arm64, internal_arm32_arm64, internal_4abi, internal_5abi, internal_riscv64, generic]
      native_matrix_profile:
        description: "Cobertura nativa CMake (arquiteturas + bandas de API)"
        type: choice
        default: canonical
        options: [canonical, pilot_android9_16_5arch, android8_16plus_allarch]
      log_level:
        description: "Nível de logs Gradle"
        type: choice
        default: info
        options: [lifecycle, info, debug]
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true
      run_native_checks:
        description: "Executar verificações nativas"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: android-ci-wrapper-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android-ci:
    name: Android CI (canonical)
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: ${{ github.event.inputs.run_workfile || 'smoke_debug' }}
      build_variant: ${{ github.event.inputs.build_variant || 'debug' }}
      signing_mode: ${{ github.event.inputs.signing_mode || 'auto' }}
      abi_profile: ${{ github.event.inputs.abi_profile || 'official_arm64' }}
      native_matrix_profile: ${{ github.event.inputs.native_matrix_profile || 'canonical' }}
      log_level: ${{ github.event.inputs.log_level || 'info' }}
      run_lint: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_lint == 'true' }}
      run_native_checks: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_native_checks == 'true' }}
    secrets: inherit
