name: android-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'tools/**'
      - '.github/actions/android-build-base/**'
      - 'docs/ci/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
      - '.github/workflows/android-ci.yml'
      - '.github/workflows/compile-matrix.yml'
  push:
    branches: [main, master, dev, 'release/**']
    paths:
      - 'app/**'
      - 'engine/**'
      - 'engine/**/*.cmake'
      - 'engine/**/*.mk'
      - 'CMakeLists.txt'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'tools/**'
      - '.github/actions/android-build-base/**'
      - 'docs/ci/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android.yml'
      - '.github/workflows/android-ci.yml'
      - '.github/workflows/compile-matrix.yml'
  workflow_dispatch:
    inputs:
      run_workfile:
        description: "Perfil de execução Gradle"
        type: choice
        default: smoke_debug
        options:
          - smoke_debug
          - unit_loader
          - full_debug
          - compat_matrix_debug
          - release_gate
      build_variant:
        description: "Variante Android"
        type: choice
        default: debug
        options: [debug, release, both]
      signing_mode:
        description: "Assinatura release (não enfraquece trilha oficial)"
        type: choice
        default: auto
        options: [auto, signed, unsigned]
      abi_profile:
        description: "Perfil ABI (trilha oficial)"
        type: choice
        default: official_arm64
        options: [official_arm64, internal_arm32_arm64, internal_4abi]
      native_matrix_profile:
        description: "Cobertura nativa CMake (arquiteturas + bandas de API)"
        type: choice
        default: canonical
        options: [canonical, pilot_android9_16_5arch, android8_16plus_allarch]
      log_level:
        description: "Nível de logs Gradle"
        type: choice
        default: lifecycle
        options: [lifecycle, info, debug]
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true
      run_native_checks:
        description: "Executar verificações nativas"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: android-ci-wrapper-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve-inputs:
    name: Resolve wrapper inputs
    runs-on: ubuntu-latest
    outputs:
      run_workfile: ${{ steps.resolve.outputs.run_workfile }}
      build_variant: ${{ steps.resolve.outputs.build_variant }}
      signing_mode: ${{ steps.resolve.outputs.signing_mode }}
      abi_profile: ${{ steps.resolve.outputs.abi_profile }}
      native_matrix_profile: ${{ steps.resolve.outputs.native_matrix_profile }}
      log_level: ${{ steps.resolve.outputs.log_level }}
      run_lint: ${{ steps.resolve.outputs.run_lint }}
      run_native_checks: ${{ steps.resolve.outputs.run_native_checks }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          run_workfile="${{ github.event.inputs.run_workfile || 'smoke_debug' }}"
          build_variant="${{ github.event.inputs.build_variant || 'debug' }}"
          signing_mode="${{ github.event.inputs.signing_mode || 'auto' }}"
          abi_profile="${{ github.event.inputs.abi_profile || 'official_arm64' }}"
          native_matrix_profile="${{ github.event.inputs.native_matrix_profile || 'canonical' }}"
          log_level="${{ github.event.inputs.log_level || 'lifecycle' }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            run_lint="${{ github.event.inputs.run_lint == 'true' }}"
            run_native_checks="${{ github.event.inputs.run_native_checks == 'true' }}"
          else
            run_lint="true"
            run_native_checks="false"
          fi

          echo "run_workfile=${run_workfile}" >> "$GITHUB_OUTPUT"
          echo "build_variant=${build_variant}" >> "$GITHUB_OUTPUT"
          echo "signing_mode=${signing_mode}" >> "$GITHUB_OUTPUT"
          echo "abi_profile=${abi_profile}" >> "$GITHUB_OUTPUT"
          echo "native_matrix_profile=${native_matrix_profile}" >> "$GITHUB_OUTPUT"
          echo "log_level=${log_level}" >> "$GITHUB_OUTPUT"
          echo "run_lint=${run_lint}" >> "$GITHUB_OUTPUT"
          echo "run_native_checks=${run_native_checks}" >> "$GITHUB_OUTPUT"

  android-ci:
    name: Android CI (canonical)
    needs: resolve-inputs
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: ${{ needs.resolve-inputs.outputs.run_workfile }}
      build_variant: ${{ needs.resolve-inputs.outputs.build_variant }}
      signing_mode: ${{ needs.resolve-inputs.outputs.signing_mode }}
      abi_profile: ${{ needs.resolve-inputs.outputs.abi_profile }}
      native_matrix_profile: ${{ needs.resolve-inputs.outputs.native_matrix_profile }}
      log_level: ${{ needs.resolve-inputs.outputs.log_level }}
      run_lint: ${{ needs.resolve-inputs.outputs.run_lint == 'true' }}
      run_native_checks: ${{ needs.resolve-inputs.outputs.run_native_checks == 'true' }}
    secrets: inherit

  compile-matrix-gate:
    name: Compile Matrix (adaptive gate)
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_workfile == 'compat_matrix_debug' || startsWith(github.event.inputs.abi_profile, 'internal_')) }}
    uses: ./.github/workflows/compile-matrix.yml
    with:
      run_workfile: ${{ github.event.inputs.run_workfile || 'smoke_debug' }}
      abi_profile: ${{ github.event.inputs.abi_profile || 'official_arm64' }}
    secrets: inherit

  adaptive-gates:
    name: Adaptive Gates
    runs-on: ubuntu-latest
    needs: [android-ci, compile-matrix-gate]
    if: always()
    steps:
      - name: Enforce canonical android-ci gate
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ needs.android-ci.result }}" == "success" ]]

      - name: Enforce compile-matrix adaptive gate
        if: ${{ needs.compile-matrix-gate.result != 'skipped' }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ needs.compile-matrix-gate.result }}" == "success" ]]
