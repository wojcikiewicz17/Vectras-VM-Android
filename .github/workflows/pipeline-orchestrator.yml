name: Orchestrator - Build Matrix

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      pipeline_profile:
        description: 'Combobox: escolhe quais trilhas executar (host/android/full).'
        type: choice
        required: true
        default: full
        options:
          - full
          - host_only
          - android_only
      run_workfile:
        description: 'Combobox: perfil didático de execução Android.'
        type: choice
        required: true
        default: smoke_debug
        options:
          - smoke_debug
          - unit_loader
          - full_debug
          - compat_matrix_debug
          - upstream-debug-compat
          - release_gate
      ci_lane:
        description: 'Combobox: lane explícita (evita erro de digitação).'
        type: choice
        required: true
        default: auto
        options:
          - auto
          - debug-local
          - debug-internal-arm32-arm64
          - release-unsigned-internal
          - release-signed-official
      build_variant:
        description: 'Combobox: variante de build Android.'
        type: choice
        required: true
        default: debug
        options:
          - debug
          - release
          - both
      abi_profile:
        description: 'Combobox: perfil ABI (oficial/interno/universal_guarded).'
        type: choice
        required: true
        default: official_arm64
        options:
          - official_arm64
          - official_arm32_arm64
          - internal_arm32_arm64
          - internal_4abi
          - internal_5abi
          - universal_guarded
      log_level:
        description: 'Combobox: nível de log Gradle.'
        type: choice
        required: true
        default: lifecycle
        options:
          - lifecycle
          - info
          - debug

env:
  GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"
  CI: true

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build:
    name: Determine Matrix
    runs-on: ubuntu-latest
    outputs:
      should_run_host: ${{ steps.profile.outputs.should_run_host }}
      should_run_android: ${{ steps.profile.outputs.should_run_android }}
      profile: ${{ steps.profile.outputs.profile }}
    steps:
      - name: Resolve profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.pipeline_profile || 'full' }}"
          case "$PROFILE" in
            host_only)
              echo "should_run_host=true" >> "$GITHUB_OUTPUT"
              echo "should_run_android=false" >> "$GITHUB_OUTPUT"
              ;;
            android_only)
              echo "should_run_host=false" >> "$GITHUB_OUTPUT"
              echo "should_run_android=true" >> "$GITHUB_OUTPUT"
              ;;
            full|*)
              echo "should_run_host=true" >> "$GITHUB_OUTPUT"
              echo "should_run_android=true" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

  abi-preflight:
    name: ABI Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate consolidated lowlevel ABI guard
        run: ./tools/ci/validate_lowlevel_abi.sh

  host-ci:
    name: Host CI
    needs: [matrix-build, abi-preflight]
    if: needs.matrix-build.outputs.should_run_host == 'true'
    uses: ./.github/workflows/host-ci.yml

  android-ci:
    name: Android CI
    needs: [matrix-build, abi-preflight, host-ci]
    if: ${{ always() && needs.matrix-build.outputs.should_run_android == 'true' && (needs.host-ci.result == 'success' || needs.host-ci.result == 'skipped') }}
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: ${{ github.event.inputs.run_workfile || 'smoke_debug' }}
      ci_lane: ${{ github.event.inputs.ci_lane || 'auto' }}
      build_variant: ${{ github.event.inputs.build_variant || 'debug' }}
      signing_mode: auto
      abi_profile: ${{ github.event.inputs.abi_profile || 'official_arm64' }}
      native_matrix_profile: canonical
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
      run_lint: true
      run_native_checks: false
    secrets: inherit

  android-release-binaries-arm32-arm64:
    name: Android Release Binaries (unsigned/signed arm32+arm64)
    needs: [matrix-build, abi-preflight, host-ci]
    if: ${{ always() && needs.matrix-build.outputs.should_run_android == 'true' && (needs.host-ci.result == 'success' || needs.host-ci.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: release-unsigned-internal
            signing_mode: unsigned
            label: unsigned
          - lane: auto
            signing_mode: signed
            label: signed
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: release_gate
      ci_lane: ${{ matrix.lane }}
      build_variant: release
      signing_mode: ${{ matrix.signing_mode }}
      abi_profile: internal_arm32_arm64
      native_matrix_profile: canonical
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
      run_lint: false
      run_native_checks: false
    secrets: inherit

  quality-gates:
    name: Quality Gates
    needs: [matrix-build, abi-preflight, host-ci, android-ci, android-release-binaries-arm32-arm64]
    if: always()
    uses: ./.github/workflows/quality-gates.yml
    with:
      run_host: ${{ needs.matrix-build.outputs.should_run_host == 'true' }}
      run_android: ${{ needs.matrix-build.outputs.should_run_android == 'true' }}
      host_result: ${{ needs.host-ci.result }}
      android_result: ${{ needs.android-ci.result == 'success' && needs.android-release-binaries-arm32-arm64.result == 'success' && 'success' || 'failure' }}
      profile: ${{ needs.matrix-build.outputs.profile }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      perf_margin: 0.03
