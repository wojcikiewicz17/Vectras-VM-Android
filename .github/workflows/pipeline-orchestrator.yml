name: Pipeline Orchestrator

on:
  push:
    branches: [main, master, dev, release/**]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:
    inputs:
      run_host_ci:
        description: "Executar validações de host/engine"
        type: boolean
        required: false
        default: true
      run_android_ci:
        description: "Executar trilha Android canônica"
        type: boolean
        required: false
        default: true
      promote_android_minimal:
        description: "Promover estágio Android minimal após verified"
        type: boolean
        required: false
        default: false
      run_termux_orchestrator:
        description: "Executar pipeline Termux"
        type: boolean
        required: false
        default: false
      mode:
        description: "Perfil Android (docs/ci/android-mode-matrix.md)"
        type: choice
        required: false
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - diagnostico
          - interoperavel
          - confiavel
          - portavel
          - hardening
          - matrix_total
          - forense

permissions:
  contents: read

concurrency:
  group: pipeline-orchestrator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.filter.outputs.host }}
      android_canonical: ${{ steps.filter.outputs.android_canonical }}
      termux: ${{ steps.filter.outputs.termux }}
      baremetal: ${{ steps.filter.outputs.baremetal }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            host:
              - 'engine/**'
              - 'bench/**'
              - 'demo_cli/**'
              - 'tools/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.github/workflows/engine-ci.yml'
              - '.github/workflows/proof-build.yml'
            android_canonical:
              - 'app/**'
              - 'terminal-emulator/**'
              - 'terminal-view/**'
              - 'shell-loader/**'
              - 'gradle/**'
              - '**/*.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - '.github/workflows/android-verified.yml'
              - '.github/workflows/pipeline-orchestrator.yml'
              - 'docs/ci/android-mode-matrix.md'
            termux:
              - 'tools/termux-arm64-orchestrator/**'
              - '.github/workflows/termux-orchestrator.yml'
            baremetal:
              - 'tools/baremetal/rafcode_phi/**'
              - '.github/workflows/rafcode-phi-baremetal-ci.yml'

  host-ci:
    name: 01 · Host CI
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true')
    uses: ./.github/workflows/ci.yml

  engine-ci:
    name: 02 · Engine CI
    needs: [changes, host-ci]
    if: >-
      always() && needs.host-ci.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true'))
    uses: ./.github/workflows/engine-ci.yml

  proof-build:
    name: 03 · Proof Build
    needs: [changes, engine-ci]
    if: >-
      always() && needs.engine-ci.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true'))
    uses: ./.github/workflows/proof-build.yml

  android-baseline:
    name: 04 · Android Baseline (canônico)
    needs: [changes, proof-build]
    if: >-
      always() && needs.proof-build.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_android_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.android_canonical == 'true'))
    uses: ./.github/workflows/android-verified.yml
    with:
      build_variant: debug
      mode: fast
      run_lint: false
      run_native_matrix: false
      abi_policy: arm64-only
      signing_mode: unsigned
      enable_policy_module: true
      enable_bitraf_module: true
    secrets: inherit

  android-verified:
    name: 05 · Android Verified (promoção após baseline)
    needs: [changes, android-baseline]
    if: >-
      always() && needs.android-baseline.result == 'success' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_android_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.android_canonical == 'true'))
    uses: ./.github/workflows/android-verified.yml
    with:
      build_variant: debug
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'moderado' }}
      run_lint: true
      run_native_matrix: true
      abi_policy: arm64-only
      signing_mode: auto
      enable_policy_module: true
      enable_bitraf_module: true
    secrets: inherit

  android-minimal:
    name: 06 · Android Minimal (opcional, promoção após verified)
    needs: [changes, android-verified]
    if: >-
      always() && needs.android-verified.result == 'success' && (
      (github.event_name == 'workflow_dispatch' && inputs.promote_android_minimal)
      || (github.event_name != 'workflow_dispatch' && false))
    uses: ./.github/workflows/android-verified.yml
    with:
      build_variant: debug
      mode: fast
      run_lint: false
      run_native_matrix: false
      abi_policy: arm64-only
      signing_mode: unsigned
      enable_policy_module: true
      enable_bitraf_module: true
    secrets: inherit

  baremetal-rafcode:
    name: 07 · Baremetal Rafcode Phi
    needs: [changes, android-verified]
    if: >-
      always() && needs.android-verified.result != 'failure' && (
      github.event_name == 'workflow_dispatch'
      || needs.changes.outputs.baremetal == 'true')
    uses: ./.github/workflows/rafcode-phi-baremetal-ci.yml

  termux-orchestrator:
    name: 08 · Termux Orchestrator
    needs: [changes, baremetal-rafcode]
    if: >-
      always() && needs.baremetal-rafcode.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_termux_orchestrator)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.termux == 'true'))
    uses: ./.github/workflows/termux-orchestrator.yml
    with:
      dry_run: "true"
      enable_fork_sync: "false"
