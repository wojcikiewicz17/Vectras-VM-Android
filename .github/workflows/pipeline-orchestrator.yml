name: Pipeline Orchestrator

on:
  push:
    branches: [main, master, dev, release/**]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:
    inputs:
      run_host_ci:
        description: "Executar validações de host/engine"
        type: boolean
        required: false
        default: true
      run_android_ci:
        description: "Executar trilha Android canônica"
        type: boolean
        required: false
        default: true
      promote_android_minimal:
        description: "Solicita promoção do estágio Android minimal (somente workflow_dispatch; push/PR permanece desabilitado)"
        type: boolean
        required: false
        default: false
      run_termux_orchestrator:
        description: "Executar pipeline Termux"
        type: boolean
        required: false
        default: false
      mode:
        description: "Perfil Android (docs/ci/android-mode-matrix.md)"
        type: choice
        required: false
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - diagnostico
          - interoperavel
          - confiavel
          - portavel
          - hardening
          - matrix_total
          - forense

permissions:
  contents: read
  actions: read

concurrency:
  group: pipeline-orchestrator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  provenance:
    name: 00 · Provenance
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.meta.outputs.run_id }}
      expected_sha: ${{ steps.meta.outputs.expected_sha }}
      manifest_hash: ${{ steps.meta.outputs.manifest_hash }}
    steps:
      - name: Generate provenance manifest
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          timestamp_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > provenance.json <<JSON
          {
            "github": {
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}",
              "workflow": "${{ github.workflow }}",
              "actor": "${{ github.actor }}",
              "ref": "${{ github.ref }}"
            },
            "timestamp_utc": "${timestamp_utc}"
          }
          JSON
          manifest_hash="$(sha256sum provenance.json | awk '{print $1}')"
          echo "run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "expected_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "manifest_hash=${manifest_hash}" >> "$GITHUB_OUTPUT"
      - name: Upload provenance artifact
        uses: actions/upload-artifact@v5
        with:
          name: chain-of-custody
          path: provenance.json
          if-no-files-found: error

  changes:
    name: Detect Changes
    needs: provenance
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.filter.outputs.host }}
      android_canonical: ${{ steps.filter.outputs.android_canonical }}
      termux: ${{ steps.filter.outputs.termux }}
      baremetal: ${{ steps.filter.outputs.baremetal }}
    steps:
      - uses: actions/checkout@v5

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            host:
              - 'engine/**'
              - 'bench/**'
              - 'demo_cli/**'
              - 'tools/**'
              - 'CMakeLists.txt'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.github/workflows/engine-ci.yml'
              - '.github/workflows/proof-build.yml'
            android_canonical:
              - 'app/**'
              - 'terminal-emulator/**'
              - 'terminal-view/**'
              - 'shell-loader/**'
              - 'gradle/**'
              - '**/*.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - '.github/workflows/android-verified.yml'
              - '.github/workflows/pipeline-orchestrator.yml'
              - 'docs/ci/android-mode-matrix.md'
            termux:
              - 'tools/termux-arm64-orchestrator/**'
              - '.github/workflows/termux-orchestrator.yml'
            baremetal:
              - 'tools/baremetal/rafcode_phi/**'
              - '.github/workflows/rafcode-phi-baremetal-ci.yml'

  host-ci:
    name: 01 · Host CI
    needs: [provenance, changes]
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true')
    uses: ./.github/workflows/ci.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}

  engine-ci:
    name: 02 · Engine CI
    needs: [changes, host-ci]
    if: >-
      always() && needs.host-ci.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true'))
    uses: ./.github/workflows/engine-ci.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}

  proof-build:
    name: 03 · Proof Build
    needs: [changes, engine-ci]
    if: >-
      always() && needs.engine-ci.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_host_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.host == 'true'))
    uses: ./.github/workflows/proof-build.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}

  android-baseline:
    name: 04 · Android Internal Validation (canônico unsigned)
    needs: [changes, proof-build]
    if: >-
      always() && needs.proof-build.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_android_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.android_canonical == 'true'))
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'moderado' }}
      build_variant: both
      run_lint: true
      run_native_matrix: true
      signing_mode: unsigned
      abi_policy: arm64-only
    secrets: inherit

  android-verified:
    name: 05 · Android Verified Official (promoção após validação interna)
    needs: [changes, android-baseline]
    if: >-
      always() && needs.android-baseline.result == 'success' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_android_ci)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.android_canonical == 'true'))
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}
      build_variant: both
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'moderado' }}
      run_lint: true
      run_native_matrix: true
      abi_policy: arm64-only
      signing_mode: auto
      enable_policy_module: true
      enable_bitraf_module: true
    secrets: inherit

  android-minimal:
    name: 06 · Android Minimal (opcional, promoção após verified)
    needs: [changes, android-verified]
    if: >-
      always() && needs.android-verified.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.run_android_ci &&
      inputs.promote_android_minimal
    uses: ./.github/workflows/android-minimal-debug.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}

  baremetal-rafcode:
    name: 07 · Baremetal Rafcode Phi
    needs: [changes, android-verified]
    if: >-
      always() && needs.android-verified.result != 'failure' && (
      github.event_name == 'workflow_dispatch'
      || needs.changes.outputs.baremetal == 'true')
    uses: ./.github/workflows/rafcode-phi-baremetal-ci.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}

  termux-orchestrator:
    name: 08 · Termux Orchestrator
    needs: [changes, baremetal-rafcode]
    if: >-
      always() && needs.baremetal-rafcode.result != 'failure' && (
      (github.event_name == 'workflow_dispatch' && inputs.run_termux_orchestrator)
      || (github.event_name != 'workflow_dispatch' && needs.changes.outputs.termux == 'true'))
    uses: ./.github/workflows/termux-orchestrator.yml
    with:
      provenance_run_id: ${{ needs.provenance.outputs.run_id }}
      expected_sha: ${{ needs.provenance.outputs.expected_sha }}
      provenance_manifest_hash: ${{ needs.provenance.outputs.manifest_hash }}
      dry_run: "true"
      enable_fork_sync: "false"

  summary:
    name: 09 · Consolidated Summary
    runs-on: ubuntu-latest
    needs:
      - provenance
      - changes
      - host-ci
      - engine-ci
      - proof-build
      - android-baseline
      - android-verified
      - android-minimal
      - baremetal-rafcode
      - termux-orchestrator
    if: always()
    steps:
      - name: Write consolidated run summary
        shell: bash
        run: |
          {
            echo "## Pipeline status consolidado"
            echo ""
            echo "- Manifest hash inicial: \`${{ needs.provenance.outputs.manifest_hash }}\`"
            echo "- Provenance: \`${{ needs.provenance.result }}\`"
            echo "- Detect Changes: \`${{ needs.changes.result }}\`"
            echo "- Host CI: \`${{ needs.host-ci.result }}\`"
            echo "- Engine CI: \`${{ needs.engine-ci.result }}\`"
            echo "- Proof Build: \`${{ needs.proof-build.result }}\`"
            echo "- Android Baseline (canônico unsigned): \`${{ needs.android-baseline.result }}\`"
            echo "- Android Verified: \`${{ needs.android-verified.result }}\`"
            echo "- Política de promoção Android Minimal em push/PR: \`desabilitada por padrão (somente workflow_dispatch)\`"
            echo "- Promoção Android Minimal solicitada: \`${{ github.event_name == 'workflow_dispatch' && inputs.promote_android_minimal || false }}\`"
            echo "- Android Minimal Debug (promoção executada): \`${{ needs.android-minimal.result }}\`"
            echo "- Baremetal Rafcode Phi: \`${{ needs.baremetal-rafcode.result }}\`"
            echo "- Termux Orchestrator: \`${{ needs.termux-orchestrator.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
