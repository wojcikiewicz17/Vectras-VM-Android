name: Orchestrator - Build Matrix

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      pipeline_profile:
        description: 'Build profile: host_only, android_only, full'
        required: false
        default: 'full'
      run_workfile:
        description: 'Android profile: smoke_debug, unit_loader, full_debug, release_gate'
        required: false
        default: 'smoke_debug'
      build_variant:
        description: 'Android variant: debug, release, both'
        required: false
        default: 'debug'
      abi_profile:
        description: 'ABI profile: official_arm64, internal_arm32_arm64'
        required: false
        default: 'official_arm64'
      log_level:
        description: 'Gradle log level: lifecycle, info, debug'
        required: false
        default: 'lifecycle'

env:
  GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"
  CI: true

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build:
    name: Determine Matrix
    runs-on: ubuntu-latest
    outputs:
      should_run_host: ${{ steps.profile.outputs.should_run_host }}
      should_run_android: ${{ steps.profile.outputs.should_run_android }}
      profile: ${{ steps.profile.outputs.profile }}
    steps:
      - name: Resolve profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.pipeline_profile || 'full' }}"
          case "$PROFILE" in
            host_only)
              echo "should_run_host=true" >> "$GITHUB_OUTPUT"
              echo "should_run_android=false" >> "$GITHUB_OUTPUT"
              ;;
            android_only)
              echo "should_run_host=false" >> "$GITHUB_OUTPUT"
              echo "should_run_android=true" >> "$GITHUB_OUTPUT"
              ;;
            full|*)
              echo "should_run_host=true" >> "$GITHUB_OUTPUT"
              echo "should_run_android=true" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

  abi-preflight:
    name: ABI Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate consolidated lowlevel ABI guard
        run: ./tools/ci/validate_lowlevel_abi.sh

  host-ci:
    name: Host CI
    needs: [matrix-build, abi-preflight]
    if: needs.matrix-build.outputs.should_run_host == 'true'
    uses: ./.github/workflows/host-ci.yml

  android-ci:
    name: Android CI
    needs: [matrix-build, abi-preflight, host-ci]
    if: ${{ always() && needs.matrix-build.outputs.should_run_android == 'true' && (needs.host-ci.result == 'success' || needs.host-ci.result == 'skipped') }}
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: ${{ github.event.inputs.run_workfile || 'smoke_debug' }}
      build_variant: ${{ github.event.inputs.build_variant || 'debug' }}
      signing_mode: auto
      abi_profile: ${{ github.event.inputs.abi_profile || 'official_arm64' }}
      native_matrix_profile: canonical
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
      run_lint: true
      run_native_checks: false
    secrets: inherit

  quality-gates:
    name: Quality Gates
    needs: [matrix-build, abi-preflight, host-ci, android-ci]
    if: always()
    uses: ./.github/workflows/quality-gates.yml
    with:
      run_host: ${{ needs.matrix-build.outputs.should_run_host == 'true' }}
      run_android: ${{ needs.matrix-build.outputs.should_run_android == 'true' }}
      host_result: ${{ needs.host-ci.result }}
      android_result: ${{ needs.android-ci.result }}
      profile: ${{ needs.matrix-build.outputs.profile }}
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
      head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      perf_margin: 0.03
