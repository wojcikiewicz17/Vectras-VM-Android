name: android-build-manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Perfil de execução"
        required: true
        type: choice
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - interoperabilidade
          - confiabilidade
          - diagnostico
          - release_ready
          - hardware_focus
          - matrix_total
          - holistico
      build_debug:
        description: "Gerar APK debug"
        required: false
        type: boolean
        default: true
      build_release:
        description: "Gerar APK release (sem assinatura por padrão)"
        required: false
        type: boolean
        default: false
      sign_release:
        description: "Assinar release (requer segredos)"
        required: false
        type: boolean
        default: false
      run_lint:
        description: "Executar lint"
        required: false
        type: boolean
        default: true
      run_native_matrix:
        description: "Executar matriz nativa"
        required: false
        type: boolean
        default: true
      run_unit_tests:
        description: "Executar testes unitários"
        required: false
        type: boolean
        default: false
      android_api:
        description: "Android API (compile/target)"
        required: false
        type: string
        default: "35"
      build_tools:
        description: "Android Build Tools"
        required: false
        type: string
        default: "35.0.0"
      ndk_version:
        description: "NDK version"
        required: false
        type: string
        default: "27.2.12479018"
      cmake_version:
        description: "CMake version"
        required: false
        type: string
        default: "3.22.1"
      java_version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      gradle_module:
        description: "Módulo gradle principal (ex: app)"
        required: false
        type: string
        default: "app"
      gradle_extra_args:
        description: "Args extras para gradle"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: moderado
      build_debug:
        required: false
        type: boolean
        default: true
      build_release:
        required: false
        type: boolean
        default: false
      sign_release:
        required: false
        type: boolean
        default: false
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_matrix:
        required: false
        type: boolean
        default: true
      run_unit_tests:
        required: false
        type: boolean
        default: false
      android_api:
        required: false
        type: string
        default: "35"
      build_tools:
        required: false
        type: string
        default: "35.0.0"
      ndk_version:
        required: false
        type: string
        default: "27.2.12479018"
      cmake_version:
        required: false
        type: string
        default: "3.22.1"
      java_version:
        required: false
        type: string
        default: "17"
      gradle_module:
        required: false
        type: string
        default: "app"
      gradle_extra_args:
        required: false
        type: string
        default: ""
    secrets:
      VECTRAS_RELEASE_KEYSTORE_B64:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JAVA_VERSION: ${{ inputs.java_version || '17' }}
      COMPILE_API: ${{ inputs.android_api || '35' }}
      TARGET_API: ${{ inputs.android_api || '35' }}
      TOOLS_VERSION: ${{ inputs.build_tools || '35.0.0' }}
      NDK_VERSION: ${{ inputs.ndk_version || '27.2.12479018' }}
      CMAKE_VERSION: ${{ inputs.cmake_version || '3.22.1' }}
      MODE: ${{ inputs.mode || 'moderado' }}
      GRADLE_MODULE: ${{ inputs.gradle_module || 'app' }}
      GRADLE_EXTRA_ARGS: ${{ inputs.gradle_extra_args || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Configure mode profile
        id: mode
        run: |
          set -euo pipefail
          case "${MODE}" in
            fast)
              echo "native_strict=false" >> "$GITHUB_OUTPUT"
              echo "native_matrix_cmd=checkNativeAllMatrix -PbuildStrict=false" >> "$GITHUB_OUTPUT"
              echo "run_repo_checks=false" >> "$GITHUB_OUTPUT"
              ;;
            moderado)
              echo "native_strict=false" >> "$GITHUB_OUTPUT"
              echo "native_matrix_cmd=checkNativeAllMatrix -PbuildStrict=false" >> "$GITHUB_OUTPUT"
              echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
              ;;
            profundo|ultra_minucioso|interoperabilidade|confiabilidade|diagnostico|release_ready|hardware_focus|matrix_total|holistico)
              echo "native_strict=true" >> "$GITHUB_OUTPUT"
              echo "native_matrix_cmd=checkNativeAllMatrix -PbuildStrict=true" >> "$GITHUB_OUTPUT"
              echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Modo inválido: ${MODE}" >&2
              exit 1
              ;;
          esac

      - name: Validate Android and native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(java javac sdkmanager cmake ninja make python3)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Verify Gradle baseline
        id: baseline
        if: steps.mode.outputs.run_repo_checks == 'true'
        run: |
          set -euo pipefail
          case "${MODE}" in
            fast)
              TASKS="verifyGradleRuntimeJvm :app:assembleDebug"
              ;;
            moderado)
              TASKS="verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets lintDebug :app:assembleDebug"
              ;;
            profundo|ultra_minucioso|interoperabilidade|confiabilidade|diagnostico|release_ready|hardware_focus|matrix_total|holistico)
              TASKS="verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets verifyRepoFileDependencies checkNativeAllMatrix lintDebug testDebugUnitTest connectedDebugAndroidTest :app:assembleDebug"
              ;;
            *)
              echo "Modo inválido: ${MODE}" >&2
              exit 1
              ;;
          esac

          echo "tasks=${TASKS}" >> "$GITHUB_OUTPUT"
          echo "profile=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Build local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Decode release keystore
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_KEYSTORE_B64:-}" ]]; then
            echo "Assinatura solicitada, mas segredo do keystore não foi fornecido." >&2
            exit 1
          fi
          echo "$VECTRAS_RELEASE_KEYSTORE_B64" | base64 -d > vectras-release.jks

      - name: Run selected Gradle tasks
        env:
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          TASKS="${{ steps.baseline.outputs.tasks }}"
          if [[ -z "${TASKS// }" ]]; then
            TASKS="verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets verifyRepoFileDependencies"
          fi
          ./gradlew --no-daemon --stacktrace ${TASKS} ${GRADLE_EXTRA_ARGS}

      - name: Build Debug APK
        if: inputs.build_debug
        run: |
          set -euo pipefail
          tasks=()
          if [[ "${{ inputs.run_lint }}" == 'true' ]]; then
            tasks+=("lintDebug")
          fi
          if [[ "${{ inputs.run_unit_tests }}" == 'true' ]]; then
            tasks+=("testDebugUnitTest")
          fi
          tasks+=(":${GRADLE_MODULE}:assembleDebug")
          ./gradlew --no-daemon --stacktrace "${tasks[@]}" -PcheckVariant=debug ${GRADLE_EXTRA_ARGS}

      - name: Build Release APK (unsigned by default)
        if: inputs.build_release
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace ":${GRADLE_MODULE}:assembleRelease" ${GRADLE_EXTRA_ARGS}

      - name: Sign Release APK
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_KEYSTORE_B64}" || -z "${VECTRAS_RELEASE_STORE_PASSWORD}" || -z "${VECTRAS_RELEASE_KEY_ALIAS}" || -z "${VECTRAS_RELEASE_KEY_PASSWORD}" ]]; then
            echo "Signing requested, but signing secrets are missing." >&2
            exit 1
          fi
          mkdir -p .ci-keystore
          echo "${VECTRAS_RELEASE_KEYSTORE_B64}" | base64 -d > .ci-keystore/release.jks
          ./gradlew --no-daemon --stacktrace \
            -PVECTRAS_RELEASE_STORE_FILE=.ci-keystore/release.jks \
            -PVECTRAS_RELEASE_STORE_PASSWORD="${VECTRAS_RELEASE_STORE_PASSWORD}" \
            -PVECTRAS_RELEASE_KEY_ALIAS="${VECTRAS_RELEASE_KEY_ALIAS}" \
            -PVECTRAS_RELEASE_KEY_PASSWORD="${VECTRAS_RELEASE_KEY_PASSWORD}" \
            ":${GRADLE_MODULE}:assembleRelease" ${GRADLE_EXTRA_ARGS}

      - name: Cleanup signing material
        if: always()
        run: rm -rf .ci-keystore

      - name: Run native matrix
        if: inputs.run_native_matrix
        run: ./gradlew --no-daemon --stacktrace ${{ steps.mode.outputs.native_matrix_cmd }} ${GRADLE_EXTRA_ARGS}

      - name: Generate diagnostics summary
        if: always()
        run: |
          {
            echo "## Android Build Diagnostics"
            echo ""
            echo "- Mode: ${MODE}"
            echo "- Module: ${GRADLE_MODULE}"
            echo "- Build debug: ${{ inputs.build_debug }}"
            echo "- Build release: ${{ inputs.build_release }}"
            echo "- Sign release: ${{ inputs.sign_release }}"
            echo "- Run lint: ${{ inputs.run_lint }}"
            echo "- Run unit tests: ${{ inputs.run_unit_tests }}"
            echo "- Run native matrix: ${{ inputs.run_native_matrix }}"
            echo "- API: ${COMPILE_API}, Build Tools: ${TOOLS_VERSION}, NDK: ${NDK_VERSION}, CMake: ${CMAKE_VERSION}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK and diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-manual-artifacts-${{ github.run_number }}
          path: |
            ${{ env.GRADLE_MODULE }}/build/outputs/**/*.apk
            **/build/reports/**
            **/build/test-results/**
            **/*.log
          if-no-files-found: warn
