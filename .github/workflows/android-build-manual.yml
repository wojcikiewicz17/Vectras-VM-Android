name: android-build-manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Perfil de execução"
        required: true
        type: choice
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - interoperabilidade
          - confiabilidade
          - diagnostico
          - release_ready
          - hardware_focus
          - matrix_total
          - holistico
      build_debug:
        description: "Gerar APK debug"
        required: false
        type: boolean
        default: true
      build_release:
        description: "Gerar APK release/perfRelease"
        required: false
        type: boolean
        default: false
      sign_release:
        description: "Assinar release (requer segredos)"
        required: false
        type: boolean
        default: false
      run_lint:
        description: "Executar lint"
        required: false
        type: boolean
        default: true
      run_native_matrix:
        description: "Executar matriz nativa"
        required: false
        type: boolean
        default: true
      run_unit_tests:
        description: "Executar testes unitários"
        required: false
        type: boolean
        default: false
      android_api:
        description: "Android API (compile/target)"
        required: false
        type: string
        default: "35"
      build_tools:
        description: "Android Build Tools"
        required: false
        type: string
        default: "35.0.0"
      ndk_version:
        description: "NDK version"
        required: false
        type: string
        default: "27.2.12479018"
      cmake_version:
        description: "CMake version"
        required: false
        type: string
        default: "3.22.1"
      java_version:
        description: "JDK version"
        required: false
        type: string
        default: "17"
      gradle_extra_args:
        description: "Args extras para gradle"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string
      mode:
        required: false
        type: string
        default: moderado
      build_debug:
        required: false
        type: boolean
        default: true
      build_release:
        required: false
        type: boolean
        default: false
      sign_release:
        required: false
        type: boolean
        default: false
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_matrix:
        required: false
        type: boolean
        default: true
      run_unit_tests:
        required: false
        type: boolean
        default: false
      android_api:
        required: false
        type: string
        default: "35"
      build_tools:
        required: false
        type: string
        default: "35.0.0"
      ndk_version:
        required: false
        type: string
        default: "27.2.12479018"
      cmake_version:
        required: false
        type: string
        default: "3.22.1"
      java_version:
        required: false
        type: string
        default: "17"
      gradle_extra_args:
        required: false
        type: string
        default: ""
    secrets:
      VECTRAS_RELEASE_KEYSTORE_B64:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false
      VECTRAS_GOOGLE_SERVICES_JSON_B64:
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: android-build-manual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      JAVA_VERSION: ${{ inputs.java_version || '17' }}
      COMPILE_API: ${{ inputs.android_api || '35' }}
      TARGET_API: ${{ inputs.android_api || '35' }}
      TOOLS_VERSION: ${{ inputs.build_tools || '35.0.0' }}
      NDK_VERSION: ${{ inputs.ndk_version || '27.2.12479018' }}
      CMAKE_VERSION: ${{ inputs.cmake_version || '3.22.1' }}
      SUPPORTED_ABIS: arm64-v8a
      MODE: ${{ inputs.mode || 'moderado' }}
      GRADLE_EXTRA_ARGS: ${{ inputs.gradle_extra_args || '' }}
      GRADLE_ARGS: >-
        -PCOMPILE_API=${{ inputs.android_api || '35' }} -PTARGET_API=${{ inputs.android_api || '35' }} -PRELEASE_MIN_TARGET_API=${{ inputs.android_api || '35' }}
        -PTOOLS_VERSION=${{ inputs.build_tools || '35.0.0' }} -PJAVA_LANGUAGE_VERSION=${{ inputs.java_version || '17' }}
        -PCMAKE_VERSION=${{ inputs.cmake_version || '3.22.1' }} -PNDK_VERSION=${{ inputs.ndk_version || '27.2.12479018' }}
        -PAPP_ABI_POLICY=arm64-only -PSUPPORTED_ABIS=arm64-v8a

    steps:
      - uses: actions/checkout@v5

      - name: Validate provenance chain-of-custody
        if: ${{ github.event_name == 'workflow_call' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROVENANCE_RUN_ID: ${{ inputs.provenance_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_MANIFEST_HASH: ${{ inputs.provenance_manifest_hash }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" == "$CURRENT_SHA" ]] || { echo "SHA mismatch: expected=$EXPECTED_SHA current=$CURRENT_SHA" >&2; exit 1; }
          python3 - <<'PY'
          import hashlib, io, json, os, urllib.request, zipfile
          token = os.environ["GITHUB_TOKEN"]; repo = os.environ["REPO"]; run_id = os.environ["PROVENANCE_RUN_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]; expected_hash = os.environ["EXPECTED_MANIFEST_HASH"]
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as r: artifacts = json.load(r).get("artifacts", [])
          artifact = next((a for a in artifacts if a.get("name") == "chain-of-custody"), None)
          if not artifact: raise SystemExit("Artifact chain-of-custody not found")
          with urllib.request.urlopen(urllib.request.Request(artifact["archive_download_url"], headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})) as r: blob = r.read()
          with zipfile.ZipFile(io.BytesIO(blob)) as zf: raw = zf.read("provenance.json")
          got_hash = hashlib.sha256(raw).hexdigest()
          if got_hash != expected_hash: raise SystemExit(f"Manifest hash mismatch: expected={expected_hash} got={got_hash}")
          data = json.loads(raw)
          if data["github"]["sha"] != expected_sha: raise SystemExit("Manifest SHA differs from expected SHA")
          if str(data["github"]["run_id"]) != str(run_id): raise SystemExit("Manifest run_id differs from provenance_run_id")
          print("Provenance validation passed")
          PY

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Build local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Materialize Firebase config (debug/tests)
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_google_services_placeholder.sh

      - name: Resolve diagnostic profile
        id: mode
        run: |
          set -euo pipefail
          case "${MODE}" in
            fast)
              echo "run_repo_checks=false" >> "$GITHUB_OUTPUT"
              echo "run_connected_tests=false" >> "$GITHUB_OUTPUT"
              ;;
            moderado)
              echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
              echo "run_connected_tests=false" >> "$GITHUB_OUTPUT"
              ;;
            profundo|ultra_minucioso|interoperabilidade|confiabilidade|diagnostico|release_ready|hardware_focus|matrix_total|holistico)
              echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
              echo "run_connected_tests=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Modo inválido: ${MODE}" >&2
              exit 1
              ;;
          esac

      - name: Enforce ABI contract gate (mandatory)
        uses: ./.github/actions/abi-contract-gate
        with:
          abi_policy: arm64-only
          supported_abis: ${{ env.SUPPORTED_ABIS }}

      - name: Bootstrap shell-loader asset (mandatory)
        run: ./tools/gradle_with_jdk21.sh :app:syncShellLoaderBootstrap ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Verify bootstrap assets script
        run: python3 tools/verify_bootstrap_assets.py

      - name: Verify Gradle baseline gates
        if: steps.mode.outputs.run_repo_checks == 'true'
        run: |
          ./tools/gradle_with_jdk21.sh \
            verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility \
            verifyBootstrapAssets verifyRepoFileDependencies \
            ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Run optional lint/tests
        run: |
          set -euo pipefail
          tasks=()
          if [[ "${{ inputs.run_lint }}" == 'true' ]]; then
            tasks+=(":app:lintDebug")
          fi
          if [[ "${{ inputs.run_unit_tests }}" == 'true' ]]; then
            tasks+=(":app:testDebugUnitTest")
          fi
          if [[ ${#tasks[@]} -gt 0 ]]; then
            ./tools/gradle_with_jdk21.sh "${tasks[@]}" ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}
          fi

      - name: Run native matrix
        if: inputs.run_native_matrix
        run: ./tools/gradle_with_jdk21.sh checkNativeAllMatrix -PbuildStrict=true ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Assemble Debug
        if: inputs.build_debug
        run: ./tools/gradle_with_jdk21.sh :app:assembleDebug --stacktrace ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Build unsigned internal release/perfRelease
        if: inputs.build_release && !inputs.sign_release
        run: |
          ./tools/gradle_with_jdk21.sh :app:assembleRelease :app:assemblePerfRelease --stacktrace \
            -PALLOW_UNSIGNED_RELEASE=true \
            -PALLOW_PLACEHOLDER_FIREBASE_FOR_RELEASE=true \
            -PCI_INTERNAL_VALIDATION=true \
            ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Decode release keystore
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_KEYSTORE_B64:-}" ]]; then
            echo "Assinatura solicitada, mas segredo VECTRAS_RELEASE_KEYSTORE_B64 não foi fornecido." >&2
            exit 1
          fi
          mkdir -p .ci-keystore
          echo "${VECTRAS_RELEASE_KEYSTORE_B64}" | base64 -d > .ci-keystore/release.jks

      - name: Build signed release/perfRelease
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_STORE_PASSWORD:-}" || -z "${VECTRAS_RELEASE_KEY_ALIAS:-}" || -z "${VECTRAS_RELEASE_KEY_PASSWORD:-}" ]]; then
            echo "Signing requested, but signing secrets are missing." >&2
            exit 1
          fi
          ./tools/gradle_with_jdk21.sh :app:assembleRelease :app:assemblePerfRelease --stacktrace \
            -Pandroid.injected.signing.store.file="$PWD/.ci-keystore/release.jks" \
            -Pandroid.injected.signing.store.password="${VECTRAS_RELEASE_STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${VECTRAS_RELEASE_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${VECTRAS_RELEASE_KEY_PASSWORD}" \
            ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Verify delivered compiled artifacts
        if: inputs.build_debug || inputs.build_release
        run: |
          set -euo pipefail
          variants=()
          if [[ "${{ inputs.build_debug }}" == 'true' ]]; then variants+=("debug"); fi
          if [[ "${{ inputs.build_release }}" == 'true' ]]; then variants+=("release" "perfRelease"); fi
          artifact_variants=$(IFS=,; echo "${variants[*]}")
          ./tools/gradle_with_jdk21.sh :app:verifyDeliveredCompiledArtifacts \
            -PartifactVariants="${artifact_variants}" \
            ${{ env.GRADLE_ARGS }} ${GRADLE_EXTRA_ARGS}

      - name: Validate expected delivery artifacts
        if: always()
        run: |
          set -euo pipefail
          variants=()
          if [[ "${{ inputs.build_debug }}" == 'true' ]]; then variants+=("debug"); fi
          if [[ "${{ inputs.build_release }}" == 'true' ]]; then variants+=("release" "perfRelease"); fi
          artifact_variants=$(IFS=,; echo "${variants[*]}")
          ./tools/ci/validate_expected_android_artifacts.sh "${artifact_variants}"

      - name: Upload compiled artifacts report (required)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-compiled-artifacts-report
          path: app/build/reports/artifacts/compiled-artifacts-report.json
          if-no-files-found: error

      - name: Upload compiled outputs bundle
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-${{ inputs.sign_release && 'official-signed' || 'internal-unsigned' }}-compiled-outputs
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/outputs/mapping/**
          if-no-files-found: error

      - name: Upload diagnostics and logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: android-manual-diagnostics-${{ github.run_number }}
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/*.log
          if-no-files-found: warn

      - name: Cleanup signing material
        if: always()
        run: rm -rf .ci-keystore
