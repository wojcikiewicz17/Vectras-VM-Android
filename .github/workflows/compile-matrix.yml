name: Compilation Matrix

on:
  workflow_call:
    inputs:
      run_workfile:
        type: string
        default: compat_matrix_debug
      build_variant:
        type: string
        default: debug
      signing_mode:
        type: string
        default: auto
      abi_profile:
        type: string
        default: internal_4abi
      native_matrix_profile:
        type: string
        default: android8_16plus_allarch
      log_level:
        type: string
        default: lifecycle
      run_lint:
        type: boolean
        default: false
      run_native_checks:
        type: boolean
        default: true


jobs:
  abi-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate lowlevel ABI contract (mandatory gate)
        run: ./tools/ci/validate_lowlevel_abi.sh

  matrix-contract:
    runs-on: ubuntu-latest
    needs: abi-contract-gate
    outputs:
      matrix_abis: ${{ steps.contract.outputs.matrix_abis }}
    steps:
      - uses: actions/checkout@v4
      - id: contract
        shell: bash
        run: |
          set -euo pipefail
          matrix_abis="$(python3 -c 'import json; from pathlib import Path; c=json.loads(Path("tools/ci/abi_profiles_contract.json").read_text()); print(json.dumps(c["profiles"]["internal_4abi"]["supported_abis"]))')"
          echo "matrix_abis=${matrix_abis}" >> "$GITHUB_OUTPUT"

  android-matrix:
    runs-on: ubuntu-latest
    needs: [abi-contract-gate, matrix-contract]
    strategy:
      fail-fast: true
      matrix:
        include:
          - abi: arm64-v8a
            variant: Debug
            profile: official_arm64
            profile_channel: official
          - abi: arm64-v8a
            variant: Release
            profile: official_arm64
            profile_channel: official
          - abi: armeabi-v7a
            variant: Debug
            profile: internal_arm32_arm64
            profile_channel: internal
          - abi: x86
            variant: Debug
            profile: internal_4abi
            profile_channel: internal
          - abi: x86_64
            variant: Debug
            profile: internal_4abi
            profile_channel: internal
    steps:
      - uses: actions/checkout@v4


      - name: Resolve canonical build versions
        shell: bash
        run: |
          set -euo pipefail
          declare -A key_map=(
            ["compile.api"]="COMPILE_API"
            ["tools.version"]="TOOLS_VERSION"
            ["ndk.version"]="NDK_VERSION"
            ["cmake.version"]="CMAKE_VERSION"
          )
          for key in "${!key_map[@]}"; do
            env_key="${key_map[$key]}"
            value="$(awk -F= -v key="$key" '$1==key {print $2; exit}' gradle.properties | tr -d '[:space:]')"
            if [[ -z "${value}" ]]; then
              echo "Missing '${key}' in gradle.properties" >&2
              exit 1
            fi
            echo "${env_key}=${value}" >> "$GITHUB_ENV"
          done

      - name: Validate external integration sources (androidx_RmR/qemu_rafaelia)
        run: ./tools/ci/verify_external_sources.sh --check-remote

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK components
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Validate matrix lane policy (fail-fast config)
        shell: bash
        run: |
          set -euo pipefail
          profile="${{ matrix.profile }}"
          variant="${{ matrix.variant }}"

          if [[ "${variant}" == "Release" && "${profile}" != "official_arm64" && "${profile}" != "official_arm32_arm64" ]]; then
            echo "Invalid matrix lane: Release requires official_arm64 or official_arm32_arm64 profile." >&2
            exit 1
          fi

          case "${{ matrix.abi }}" in
            armeabi-v7a|x86|x86_64)
              if [[ "${variant}" != "Debug" || "${profile}" != internal_* ]]; then
                echo "Invalid matrix lane: internal ABI (${{ matrix.abi }}) must run Debug with internal_* profile." >&2
                exit 1
              fi
              ;;
          esac

      - name: Build ABI lane
        shell: bash
        run: |
          set -euo pipefail
          profile="${{ matrix.profile }}"
          eval "$(python3 ./tools/ci/resolve_abi_profile.py --profile "${profile}" --allow-generic-fallback)"

          ./tools/gradle_with_jdk21.sh \
            -PAPP_ABI_POLICY="${app_abi_policy}" \
            -PSUPPORTED_ABIS="${supported_abis}" \
            -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" \
            :app:assemble${{ matrix.variant }}

      - name: Upload lane outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-matrix-${{ matrix.abi }}-${{ matrix.variant }}-${{ matrix.profile_channel }}
          path: |
            app/build/outputs/apk/**
            app/build/reports/**
          if-no-files-found: warn
