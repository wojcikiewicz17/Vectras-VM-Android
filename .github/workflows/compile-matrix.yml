name: Compilation Matrix

on:
  workflow_call:
    inputs:
      run_workfile:
        type: string
        default: compat_matrix_debug
      build_variant:
        type: string
        default: debug
      signing_mode:
        type: string
        default: auto
      abi_profile:
        type: string
        default: internal_4abi
      native_matrix_profile:
        type: string
        default: android8_16plus_allarch
      log_level:
        type: string
        default: lifecycle
      run_lint:
        type: boolean
        default: false
      run_native_checks:
        type: boolean
        default: true

jobs:
  android-matrix:
    name: Android Matrix (canonical delegation)
    uses: ./.github/workflows/android-ci.yml
    with:
      run_workfile: ${{ inputs.run_workfile }}
      build_variant: ${{ inputs.build_variant }}
      signing_mode: ${{ inputs.signing_mode }}
      abi_profile: ${{ inputs.abi_profile }}
      native_matrix_profile: ${{ inputs.native_matrix_profile }}
      log_level: ${{ inputs.log_level }}
      run_lint: ${{ inputs.run_lint }}
      run_native_checks: ${{ inputs.run_native_checks }}
    secrets: inherit
