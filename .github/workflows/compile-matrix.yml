name: Compilation Matrix

on:
  workflow_call:
    inputs:
      run_workfile:
        type: string
        default: smoke_debug
      abi_profile:
        type: string
        default: official_arm64

jobs:
  android-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]
        variant: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build ABI lane
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.abi }}" in
            arm64-v8a)
              ABI_POLICY="arm64-only"
              SUPPORTED_ABIS="arm64-v8a"
              CI_INTERNAL_VALIDATION=false
              ;;
            armeabi-v7a)
              ABI_POLICY="arm32-arm64"
              SUPPORTED_ABIS="arm64-v8a,armeabi-v7a"
              CI_INTERNAL_VALIDATION=true
              ;;
            x86|x86_64)
              ABI_POLICY="internal-4abi"
              SUPPORTED_ABIS="arm64-v8a,armeabi-v7a,x86,x86_64"
              CI_INTERNAL_VALIDATION=true
              ;;
          esac

          ./tools/gradle_with_jdk21.sh \
            -PAPP_ABI_POLICY="$ABI_POLICY" \
            -PSUPPORTED_ABIS="$SUPPORTED_ABIS" \
            -PCI_INTERNAL_VALIDATION="$CI_INTERNAL_VALIDATION" \
            :app:assemble${{ matrix.variant }}
