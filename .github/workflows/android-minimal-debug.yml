name: android-minimal-debug

on:
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string
  workflow_dispatch:
permissions:
  contents: read
  actions: read

concurrency:
  group: android-minimal-debug-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      JAVA_VERSION: '17'
      COMPILE_API: '35'
      TARGET_API: '35'
      MIN_API: '23'
      TOOLS_VERSION: '35.0.0'
      NDK_VERSION: '27.2.12479018'
      CMAKE_VERSION: '3.22.1'
      SUPPORTED_ABIS: 'arm64-v8a'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate provenance chain-of-custody
        if: ${{ github.event_name == 'workflow_call' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROVENANCE_RUN_ID: ${{ inputs.provenance_run_id }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          EXPECTED_MANIFEST_HASH: ${{ inputs.provenance_manifest_hash }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" == "$CURRENT_SHA" ]] || { echo "SHA mismatch: expected=$EXPECTED_SHA current=$CURRENT_SHA" >&2; exit 1; }
          python3 - <<'PY'
          import hashlib, io, json, os, urllib.request, zipfile
          token = os.environ["GITHUB_TOKEN"]; repo = os.environ["REPO"]; run_id = os.environ["PROVENANCE_RUN_ID"]
          expected_sha = os.environ["EXPECTED_SHA"]; expected_hash = os.environ["EXPECTED_MANIFEST_HASH"]
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100", headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as r: artifacts = json.load(r).get("artifacts", [])
          artifact = next((a for a in artifacts if a.get("name") == "chain-of-custody"), None)
          if not artifact: raise SystemExit("Artifact chain-of-custody not found")
          with urllib.request.urlopen(urllib.request.Request(artifact["archive_download_url"], headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})) as r: blob = r.read()
          with zipfile.ZipFile(io.BytesIO(blob)) as zf: raw = zf.read("provenance.json")
          got_hash = hashlib.sha256(raw).hexdigest()
          if got_hash != expected_hash: raise SystemExit(f"Manifest hash mismatch: expected={expected_hash} got={got_hash}")
          data = json.loads(raw)
          if data["github"]["sha"] != expected_sha: raise SystemExit("Manifest SHA differs from expected SHA")
          if str(data["github"]["run_id"]) != str(run_id): raise SystemExit("Manifest run_id differs from provenance_run_id")
          print("Provenance validation passed")
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses (non-interactive)
        shell: bash
        run: |
          set -euo pipefail
          licenses_input_file="$(mktemp)"
          trap 'rm -f "${licenses_input_file}"' EXIT
          for _ in $(seq 1 200); do
            echo 'y'
          done > "${licenses_input_file}"
          sdkmanager --licenses < "${licenses_input_file}" > /dev/null

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "cmake;${CMAKE_VERSION}" \
            "ndk;${NDK_VERSION}"

      - name: Materialize Firebase config (optional fallback for debug/tests)
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: ./tools/ci/materialize_firebase_config.sh --policy internal

      - name: Enforce ABI contract gate (mandatory)
        uses: ./.github/actions/abi-contract-gate
        with:
          abi_policy: arm64-only
          supported_abis: ${{ env.SUPPORTED_ABIS }}

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          # Wrapper is the source of truth for JVM policy (17/21) and local.properties bootstrap.
          ./tools/gradle_with_jdk21.sh --no-daemon --stacktrace \
            :app:assembleDebug \
            -PbuildStrict=false \
            -PcheckVariant=debug \
            -PAPP_ABI_POLICY=arm64-only \
            -PSUPPORTED_ABIS=${SUPPORTED_ABIS} \
            -Pcompile.api=${COMPILE_API} \
            -Ptarget.api=${TARGET_API} \
            -Pmin.api=${MIN_API} \
            -Ptools.version=${TOOLS_VERSION} \
            -Pndk.version=${NDK_VERSION} \
            -Pcmake.version=${CMAKE_VERSION} \
            -Pjava.language.version=${JAVA_VERSION}

      - name: Validate expected delivery artifacts (debug)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ./tools/ci/validate_expected_android_artifacts.sh "debug"

      - name: Upload compiled artifacts report (required)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-compiled-artifacts-report
          path: app/build/reports/artifacts/compiled-artifacts-report.json
          if-no-files-found: error

      - name: Upload compiled outputs bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-internal-unsigned-debug-compiled-outputs
          path: |
            app/build/outputs/apk/**
            app/build/outputs/bundle/**
            app/build/outputs/mapping/**
          if-no-files-found: error

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-internal-unsigned-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload debug diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-diagnostics-${{ github.run_id }}
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: warn
