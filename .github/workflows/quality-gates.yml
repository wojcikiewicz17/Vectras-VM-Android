name: Quality Gates

on:
  workflow_call:
    inputs:
      run_host:
        type: boolean
        required: true
      run_android:
        type: boolean
        required: true
      host_result:
        type: string
        required: true
      android_result:
        type: string
        required: true
      profile:
        type: string
        required: true
      base_sha:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      perf_margin:
        type: number
        default: 0.03

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate canonical workflow ownership and overlapping Android lanes
        run: python3 tools/ci/validate_build_matrix.py

      - name: Validate CMake layout
        run: ./tools/ci/verify_cmake_config.sh

      - name: Validate consolidated lowlevel ABI guard
        run: ./tools/ci/validate_lowlevel_abi.sh

      - name: Validate compilation ordering hints
        run: python3 tools/ci/check_compilation_order.py

      - name: Install perf gate dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential make python3

      - name: Resolve perf runs contract
        run: |
          set -euo pipefail
          python3 tools/perf/resolve_contract.py --require-consistency --github-output "$GITHUB_ENV"

      - name: Run perf suite and compare to versioned baseline
        run: |
          set -euo pipefail
          python3 tools/perf/run_suite.py --runs "$perf_runs"
          python3 tools/perf/compare_baseline.py --margin "${{ inputs.perf_margin }}"
          python3 tools/perf/derive_flag_decisions.py

      - name: Enforce low-level perf neutrality/gain gate
        run: |
          set -euo pipefail
          python3 tools/perf/enforce_lowlevel_gate.py \
            --base-sha "${{ inputs.base_sha }}" \
            --head-sha "${{ inputs.head_sha }}"

      - name: Upload perf gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-perf-${{ github.run_id }}
          path: |
            bench/results/perf/**
            bench/baseline/*.json
          if-no-files-found: warn

      - name: Final status gate
        shell: bash
        run: |
          set -euo pipefail
          echo "profile=${{ inputs.profile }}"
          echo "host(enabled=${{ inputs.run_host }}) result=${{ inputs.host_result }}"
          echo "android(enabled=${{ inputs.run_android }}) result=${{ inputs.android_result }}"

          if [[ "${{ inputs.run_host }}" == "true" && "${{ inputs.host_result }}" != "success" ]]; then
            echo "Host job failed or was cancelled" >&2
            exit 1
          fi

          if [[ "${{ inputs.run_android }}" == "true" && "${{ inputs.android_result }}" != "success" ]]; then
            echo "Android job failed or was cancelled" >&2
            exit 1
          fi
