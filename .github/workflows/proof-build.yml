name: proof-build-process

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proof-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  host-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            make \
            pkg-config \
            python3 \
            graphviz ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 dot rg)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Print build config
        run: make print-build-config

      - name: Export Make resolved build config
        run: make print-build-config-env

      - name: Make build
        run: make clean && make -j"$(nproc)"

      - name: Selftests
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/proof-selftest.log

      - name: Root CMake configure + build
        run: |
          set -euo pipefail
          mkdir -p bench/results
          cmake -S . -B build-cmake -G Ninja -DRMR_JNI_BUILD=ON -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake -j"$(nproc)"
          cmake --build build-cmake --target run_selftest 2>&1 | tee bench/results/proof-cmake-selftest.log

      - name: Assert Make/CMake macro parity
        run: bash tools/ci/assert_make_cmake_build_config.sh

      - name: Upload host logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: host-proof-logs
          path: |
            build
            build-cmake
            bench/results
            bench/results/proof-cmake-selftest.log
            reports
