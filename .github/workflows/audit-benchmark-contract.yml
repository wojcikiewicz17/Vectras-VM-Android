name: audit-benchmark-contract
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  audit-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Validate audit claims
        run: ./scripts/validate_audit_claims.sh
      - name: Collect vectra-grade benchmarks
        run: ./scripts/collect_vectra_grade_benchmarks.sh
      - name: Validate RMR equivalence
        run: ./scripts/rmr_equivalence_check.sh
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-benchmark-reports
          path: reports/*.{json,csv,md,txt}
          if-no-files-found: warn
