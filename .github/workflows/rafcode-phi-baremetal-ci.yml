name: rafcode-phi-baremetal-ci

on:
  push:
    paths:
      - 'tools/baremetal/rafcode_phi/**'
      - '.github/workflows/rafcode-phi-baremetal-ci.yml'
  pull_request:
    paths:
      - 'tools/baremetal/rafcode_phi/**'
      - '.github/workflows/rafcode-phi-baremetal-ci.yml'

jobs:
  rafcode-phi-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + regression CRC32C/token table/layout
        run: |
          bash tools/baremetal/rafcode_phi/test_regression_crc32c.sh
