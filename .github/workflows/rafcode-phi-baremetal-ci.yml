name: rafcode-phi-baremetal-ci

on:
  workflow_call:
  push:
    paths:
      - 'tools/baremetal/rafcode_phi/**'
      - '.github/workflows/rafcode-phi-baremetal-ci.yml'
  pull_request:
    paths:
      - 'tools/baremetal/rafcode_phi/**'
      - '.github/workflows/rafcode-phi-baremetal-ci.yml'

permissions:
  contents: read

concurrency:
  group: rafcode-phi-baremetal-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  rafcode-phi-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build + regression CRC32C/token table/layout
        run: |
          bash tools/baremetal/rafcode_phi/test_regression_crc32c.sh
