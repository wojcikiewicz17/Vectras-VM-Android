name: zipdrop-overlay

on:
  # ✅ Drop a zip into _incoming/ and push.
  # This workflow will safely apply it and self-commit the extracted delta.
  push:
    # Don't lock to a single default branch: many repos still use master/dev.
    paths:
      - "_incoming/**/*.zip"
      - "*.zip"
  workflow_dispatch:

concurrency:
  group: zipdrop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, '[zipdrop]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # keep auth so we can push back using GITHUB_TOKEN
          persist-credentials: true

      - name: Apply incoming zip(s)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          zips=( _incoming/**/*.zip ./*.zip )
          for z in "${zips[@]}"; do
            [[ -f "$z" ]] || continue

            python - "$z" <<'PY'
import pathlib, sys, zipfile

zip_path = pathlib.Path(sys.argv[1])
with zipfile.ZipFile(zip_path) as zf:
    for info in zf.infolist():
        name = pathlib.PurePosixPath(info.filename)
        if name.is_absolute() or ".." in name.parts:
            raise SystemExit(f"Unsafe archive path in {zip_path}: {info.filename}")
PY

            echo ">> Applying $z"
            unzip -o "$z" -d .

            python - <<'PY'
import pathlib, shutil

base = pathlib.Path(".")

dl = base/"__DELTA__"/"DELETE_LIST.txt"
if dl.exists():
    for line in dl.read_text(encoding="utf-8", errors="ignore").splitlines():
        line = line.strip()
        if not line or line.startswith("#"):
            continue
        p = pathlib.Path(line)
        if p.is_absolute() or ".." in p.parts:
            print("SKIP unsafe delete path:", line)
            continue
        target = base/p
        if target.is_symlink() or target.is_file():
            target.unlink(missing_ok=True)
        elif target.is_dir():
            shutil.rmtree(target, ignore_errors=True)

# limpa metadados pra não poluir o repo
shutil.rmtree(base/"__DELTA__", ignore_errors=True)
PY

            rm -f "$z"
          done

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes after zipdrop."
            exit 0
          fi
          git config user.name  "zipdrop-bot"
          git config user.email "zipdrop-bot@users.noreply.github.com"
          git add -A
          git commit -m "[zipdrop] apply delta"

          # Avoid non-fast-forward if multiple zips land close together.
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
