name: Android Native CI

on:
  workflow_call:
  pull_request:
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/android-native-ci.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/android-native-ci.yml'

permissions:
  contents: read

concurrency:
  group: android-native-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-native:
    name: Build ${{ matrix.abi }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Lint (Debug)
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:testReleaseUnitTest

      - name: Assemble Debug
        run: ./gradlew --no-daemon -PSUPPORTED_ABIS=${{ matrix.abi }} :app:assembleDebug

      - name: Assemble Release
        run: ./gradlew --no-daemon -PSUPPORTED_ABIS=${{ matrix.abi }} :app:assembleRelease

      - name: Prepare Debug artifact (${{ matrix.abi }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/debug/${{ matrix.abi }}
          mapfile -t files < <(find app/build/outputs/apk/debug -type f -name "*.apk" | grep -E "${{ matrix.abi }}|universal" || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No ABI-specific debug APK found for ${{ matrix.abi }}" >&2
            exit 1
          fi
          cp "${files[@]}" ci-artifacts/debug/${{ matrix.abi }}/

      - name: Prepare Release artifact (${{ matrix.abi }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/release/${{ matrix.abi }}
          mapfile -t files < <(find app/build/outputs/apk/release -type f -name "*.apk" | grep -E "${{ matrix.abi }}|universal" || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No ABI-specific release APK found for ${{ matrix.abi }}" >&2
            exit 1
          fi
          cp "${files[@]}" ci-artifacts/release/${{ matrix.abi }}/

      - name: Upload Debug APK (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ matrix.abi }}
          path: ci-artifacts/debug/${{ matrix.abi }}/*.apk
          if-no-files-found: error

      - name: Upload Release APK (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ matrix.abi }}
          path: ci-artifacts/release/${{ matrix.abi }}/*.apk
          if-no-files-found: error
