name: Android Native CI

on:
  workflow_call:
  pull_request:
    paths:
      - 'app/**'
      - 'engine/**'
      - 'terminal-emulator/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-native-ci.yml'
  push:
    branches: [main, master, develop, 'release/**']
    paths:
      - 'app/**'
      - 'engine/**'
      - 'terminal-emulator/**'
      - 'shell-loader/**'
      - 'gradle/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-native-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-native-ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  GRADLE_OPTS: -Xmx4g -Dfile.encoding=UTF-8

jobs:
  build-android:
    name: Android ${{ matrix.variant }} • ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        profile: [official_arm64, official_arm32_arm64]
        variant: [debug, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve canonical build versions
        shell: bash
        run: |
          set -euo pipefail
          declare -A key_map=(
            ["compile.api"]="COMPILE_API"
            ["tools.version"]="TOOLS_VERSION"
            ["ndk.version"]="NDK_VERSION"
            ["cmake.version"]="CMAKE_VERSION"
            ["java.language.version"]="JAVA_VERSION"
          )
          for key in "${!key_map[@]}"; do
            env_key="${key_map[$key]}"
            value="$(awk -F= -v key="$key" '$1==key {print $2; exit}' gradle.properties | tr -d '[:space:]')"
            if [[ -z "${value}" ]]; then
              echo "Missing '${key}' in gradle.properties" >&2
              exit 1
            fi
            echo "${env_key}=${value}" >> "$GITHUB_ENV"
          done

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve ABI profile contract
        shell: bash
        run: |
          set -euo pipefail
          eval "$(python3 ./tools/ci/resolve_abi_profile.py --profile "${{ matrix.profile }}" --allow-generic-fallback)"
          echo "app_abi_policy=${app_abi_policy}" >> "$GITHUB_ENV"
          echo "supported_abis=${supported_abis}" >> "$GITHUB_ENV"
          echo "ci_internal_validation=${ci_internal_validation}" >> "$GITHUB_ENV"

      - name: Install Android dependencies
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"

      - name: Lint Debug
        shell: bash
        run: ./gradlew --no-daemon -PAPP_ABI_POLICY="${app_abi_policy}" -PSUPPORTED_ABIS="${supported_abis}" -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" :app:lintDebug

      - name: Unit tests (${{ matrix.variant }})
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.variant }}" == "debug" ]]; then
            ./gradlew --no-daemon -PAPP_ABI_POLICY="${app_abi_policy}" -PSUPPORTED_ABIS="${supported_abis}" -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" :app:testDebugUnitTest
          else
            ./gradlew --no-daemon -PAPP_ABI_POLICY="${app_abi_policy}" -PSUPPORTED_ABIS="${supported_abis}" -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" :app:testReleaseUnitTest
          fi

      - name: Assemble APK (${{ matrix.variant }})
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.variant }}" == "debug" ]]; then
            ./gradlew --no-daemon -PAPP_ABI_POLICY="${app_abi_policy}" -PSUPPORTED_ABIS="${supported_abis}" -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" :app:assembleDebug
          else
            ./gradlew --no-daemon -PAPP_ABI_POLICY="${app_abi_policy}" -PSUPPORTED_ABIS="${supported_abis}" -PCI_INTERNAL_VALIDATION="${ci_internal_validation}" :app:assembleRelease
          fi

      - name: Stage APK artifacts
        shell: bash
        run: |
          set -euo pipefail
          lane_dir="ci-artifacts/apk/${{ matrix.variant }}/${{ matrix.profile }}"
          mkdir -p "${lane_dir}"
          apk_dir="app/build/outputs/apk/${{ matrix.variant }}"
          find "${apk_dir}" -type f -name "*.apk" -exec cp {} "${lane_dir}/" \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.variant }}-${{ matrix.profile }}
          path: ci-artifacts/apk/${{ matrix.variant }}/${{ matrix.profile }}/**/*.apk
          if-no-files-found: error
