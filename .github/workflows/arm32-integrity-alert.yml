name: ARM32 Integrity Alert Lane

on:
  workflow_dispatch:
    inputs:
      acknowledge_arm32_warning:
        description: "Digite IMUTAVEL para confirmar ciência do alerta ARM32"
        required: true
        default: "IMUTAVEL"
      run_workfile:
        description: "Perfil Android para lane ARM32"
        required: false
        default: "compat_matrix_debug"
      log_level:
        description: "Nível de log Gradle"
        required: false
        default: "lifecycle"

permissions:
  contents: read

env:
  ARM32_ALERT_WATERMARK: "IMMUTABLE-ARM32-ALERT-DO-NOT-REMOVE-v1"

jobs:
  watermark-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate immutable ARM32 acknowledgement
        shell: bash
        run: |
          set -euo pipefail
          expected="IMUTAVEL"
          provided="${{ github.event.inputs.acknowledge_arm32_warning }}"
          if [[ "${provided}" != "${expected}" ]]; then
            echo "Confirmação inválida: use exatamente '${expected}'." >&2
            exit 1
          fi
          if [[ "${ARM32_ALERT_WATERMARK}" != "IMMUTABLE-ARM32-ALERT-DO-NOT-REMOVE-v1" ]]; then
            echo "Watermark ARM32 foi alterada. Bloqueando execução." >&2
            exit 1
          fi
          mkdir -p reports/arm32-watermark
          {
            echo "ARM32_ALERT_WATERMARK=${ARM32_ALERT_WATERMARK}"
            echo "acknowledged_by=${{ github.actor }}"
            echo "run_id=${{ github.run_id }}"
            echo "intent=arm32_experimental_lane_with_immutable_warning"
          } > reports/arm32-watermark/WATERMARK.txt
          cat reports/arm32-watermark/WATERMARK.txt

      - name: Upload ARM32 watermark evidence
        uses: actions/upload-artifact@v4
        with:
          name: arm32-watermark-${{ github.run_id }}
          path: reports/arm32-watermark/**
          if-no-files-found: error

  arm32-ci:
    needs: watermark-guard
    uses: ./.github/workflows/android-ci.yml
    with:
      ci_lane: debug-internal-arm32-arm64
      run_workfile: ${{ github.event.inputs.run_workfile || 'compat_matrix_debug' }}
      build_variant: debug
      signing_mode: unsigned
      abi_profile: internal_arm32_arm64
      native_matrix_profile: universal_hardening
      log_level: ${{ github.event.inputs.log_level || 'lifecycle' }}
      run_lint: true
      run_native_checks: true
    secrets: inherit
