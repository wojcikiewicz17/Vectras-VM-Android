// Top-level build file where you can add configuration options common to all sub-projects/modules.
def defaultSupportedAbisByPolicy = [
    'arm64-only': 'arm64-v8a',
    'with-32bit': 'arm64-v8a,armeabi-v7a'
]

buildscript {
    ext {
        kotlin_version = properties.get('KOTLIN_VERSION', '2.0.21')
        agp_version = properties.get('AGP_VERSION', '8.5.2')
    }
    repositories {
        mavenCentral()
        google()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:$agp_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}
task clean(type: Delete) {
    delete rootProject.buildDir
}

allprojects {
    repositories {
        mavenCentral()
        google()
    }
}

ext {
    toolsVersion = properties.get('TOOLS_VERSION', '35.0.0')
    sdkBaselineApi = Integer.parseInt(properties.get('SDK_BASELINE_API', '35').toString())
    compileApi = Integer.parseInt(properties.get('COMPILE_API', sdkBaselineApi.toString()).toString())
    targetApi = Integer.parseInt(properties.get('TARGET_API', sdkBaselineApi.toString()).toString())
    // Política atual: ARM64-only com baseline coerente para ABIs 64-bit.
    minApi = Integer.parseInt(properties.get('MIN_API', '23').toString())
    releaseMinTargetApi = Integer.parseInt(properties.get('RELEASE_MIN_TARGET_API', sdkBaselineApi.toString()).toString())
    javaLanguageVersion = Integer.parseInt(properties.get('JAVA_LANGUAGE_VERSION', '17').toString())
    ndkVersion = properties.get('NDK_VERSION', '27.2.12479018')
    cmakeVersion = properties.get('CMAKE_VERSION', '3.22.1')
    appAbiPolicy = properties.get('APP_ABI_POLICY', 'arm64-only')
    supportedAbis = properties.get('SUPPORTED_ABIS', defaultSupportedAbisByPolicy.get(appAbiPolicy, 'arm64-v8a'))
        .split(',')
        .collect { it.trim() }
        .findAll { !it.isEmpty() }
}





def validateReleaseTargetApi() {
    if (targetApi < releaseMinTargetApi) {
        throw new GradleException("TARGET_API (${targetApi}) must be >= RELEASE_MIN_TARGET_API (${releaseMinTargetApi}) and aligned with official SDK baseline (${sdkBaselineApi}) for release builds.")
    }
}

def validateMinApiAbiCompatibility() {
    def abiMinApiRequirements = [
        'armeabi-v7a': 16,
        'x86': 16,
        'arm64-v8a': 21,
        'x86_64': 21
    ]
    def supportedPolicyNames = ['arm64-only', 'with-32bit'] as Set

    if (!supportedPolicyNames.contains(appAbiPolicy)) {
        throw new GradleException("APP_ABI_POLICY (${appAbiPolicy}) inválida. Use uma entre ${supportedPolicyNames}.")
    }

    if (supportedAbis.isEmpty()) {
        throw new GradleException('SUPPORTED_ABIS não pode ficar vazia.')
    }

    def unknownAbis = supportedAbis.findAll { !abiMinApiRequirements.containsKey(it) }
    if (!unknownAbis.isEmpty()) {
        throw new GradleException("SUPPORTED_ABIS contém ABIs não reconhecidas: ${unknownAbis}.")
    }

    if (appAbiPolicy == 'arm64-only' && supportedAbis != ['arm64-v8a']) {
        throw new GradleException("APP_ABI_POLICY=arm64-only exige SUPPORTED_ABIS=arm64-v8a (atual: ${supportedAbis}).")
    }

    if (appAbiPolicy == 'with-32bit' && !supportedAbis.any { it in ['armeabi-v7a', 'x86'] }) {
        throw new GradleException("APP_ABI_POLICY=with-32bit exige ao menos uma ABI 32-bit em SUPPORTED_ABIS (atual: ${supportedAbis}).")
    }

    def requiredMinApi = supportedAbis.collect { abiMinApiRequirements[it] }.max()
    if (minApi < requiredMinApi) {
        throw new GradleException("MIN_API (${minApi}) incompatível com SUPPORTED_ABIS (${supportedAbis}). Mínimo requerido: ${requiredMinApi}.")
    }
}

tasks.register("verifyTargetApiBaseline") {
    group = "verification"
    description = "Falha quando TARGET_API está abaixo do baseline oficial de SDK para release"
    doLast {
        validateReleaseTargetApi()
        println "TARGET_API=${targetApi} atende ao baseline oficial de SDK (${sdkBaselineApi}) e ao mínimo de release (${releaseMinTargetApi})."
    }
}

tasks.register("verifyMinApiAbiCompatibility") {
    group = "verification"
    description = "Falha quando MIN_API e SUPPORTED_ABIS ficam incompatíveis"
    doLast {
        validateMinApiAbiCompatibility()
        println "MIN_API=${minApi}, APP_ABI_POLICY=${appAbiPolicy}, SUPPORTED_ABIS=${supportedAbis} estão coerentes."
    }
}

gradle.taskGraph.whenReady { graph ->
    def requestedTaskNames = graph.allTasks.collect { it.name.toLowerCase() }
    def hasAndroidPackagingTask = requestedTaskNames.any { name ->
        name.contains('assemble') || name.contains('bundle') || name.contains('package')
    }

    if (hasAndroidPackagingTask) {
        validateMinApiAbiCompatibility()
    }

    if (graph.allTasks.any { it.name.toLowerCase().contains('release') }) {
        validateReleaseTargetApi()
    }

    def hasBuildOrVerificationTask = graph.allTasks.any { task ->
        def n = task.name.toLowerCase()
        n.contains('assemble') || n.contains('bundle') || n.contains('build') || n.contains('test') || n.contains('lint') || n.contains('verify')
    }
    if (hasBuildOrVerificationTask) {
        validateGradleRuntimeJavaVersion()
    }
}


def validateArm64ToolchainCompatibility() {
    def ndkMajor = ndkVersion.tokenize('.')[0] as Integer
    if (ndkMajor < 23) {
        throw new GradleException("NDK_VERSION (${ndkVersion}) does not support required arm64 toolchain baseline (-march=armv8-a). Use NDK r23+.")
    }
    println "NDK_VERSION=${ndkVersion} validated for arm64-v8a toolchain flags (-march=armv8-a)."
}

tasks.register("verifyArm64ToolchainCompatibility") {
    group = "verification"
    description = "Valida compatibilidade do NDK com flags nativas arm64 explícitas"
    doLast {
        validateArm64ToolchainCompatibility()
    }
}


def validateGradleRuntimeJavaVersion() {
    def currentJava = JavaVersion.current()
    def configuredRuntime = Integer.parseInt(properties.get('GRADLE_JAVA_RUNTIME_VERSION', properties.get('JAVA_LANGUAGE_VERSION', '17')).toString())
    def maxSupportedRuntime = Integer.parseInt(properties.get('GRADLE_MAX_RUNTIME_JAVA_VERSION', '21').toString())

    def configuredJavaVersion = JavaVersion.toVersion(configuredRuntime)
    if (currentJava != configuredJavaVersion) {
        throw new GradleException("Gradle runtime JVM incompatível. Esperado Java ${configuredRuntime} (JAVA_HOME/org.gradle.java.home), detectado ${currentJava}. Configure JAVA_HOME ou org.gradle.java.home para JDK ${configuredRuntime}.")
    }

    def maxSupportedJavaVersion = JavaVersion.toVersion(maxSupportedRuntime)
    if (currentJava > maxSupportedJavaVersion) {
        throw new GradleException("Gradle runtime JVM acima do máximo suportado para este baseline. Detectado ${currentJava}, máximo suportado ${maxSupportedRuntime}. Use JDK ${configuredRuntime} ou atualize wrapper/AGP para suportar oficialmente esta JVM.")
    }

    println "Gradle runtime JVM validada: ${currentJava} (esperado=${configuredRuntime}, máximo=${maxSupportedRuntime})."
}

tasks.register("verifyGradleRuntimeJvm") {
    group = "verification"
    description = "Valida JVM runtime usada pelo Gradle (versão fixa e limite máximo suportado)"
    doLast {
        validateGradleRuntimeJavaVersion()
    }
}


tasks.register("verifyBootstrapAssets", Exec) {
    group = "verification"
    description = "Valida presença e integridade básica dos bootstraps versionados no app"
    workingDir rootDir
    commandLine "python3", "tools/verify_bootstrap_assets.py"
}


tasks.register("verifyRepoFileDependencies", Exec) {
    group = "verification"
    description = "Verifica se dependências locais de arquivos/módulos existem no repositório"
    workingDir rootDir
    commandLine "python3", "tools/verify_repo_file_dependencies.py"
}


tasks.register("auditNonMdInventory", Exec) {
    group = "verification"
    description = "Gera inventário forense de arquivos não-Markdown"
    workingDir rootDir
    commandLine "python3", "tools/audit_non_md_inventory.py"
}
